function renderOriginStep() {
  const c = state.character;
  let cards = '';

  Object.entries(DM_DATA.origins).forEach(([key, org]) => {
    const sel = c.origin === key ? 'selected' : '';
    const stats = `
      <div class="option-stats">
        <div class="stat-pill">TL ${org.techLevel}</div>
        <div class="stat-pill">+${org.spiritBonus} Spirit</div>
        <div class="stat-pill">+${org.supplyBonus} Supply</div>
        <div class="stat-pill">${org.attributeBonus ? 'Attr Boost' : 'Fixed Attrs'}</div>
      </div>`;

    cards += `<div class="option-card ${sel}" onclick="selectOrigin('${key}')">
      <div class="option-card-header">
        <div class="option-code">${org.code}</div>
        <div class="option-name">${org.name}</div>
      </div>
      <div class="option-desc">${org.description}</div>
      ${stats}
    </div>`;
  });

  return wrapStep('Step 1 — Origin', 'Choose your character\'s origin. This determines your base attributes, starting skills, Tech Level, and special abilities.',
    `<div class="option-grid">${cards}</div>`,
    { showNext: true, showPrev: false }
  );
}

function renderOriginOptionsStep() {
  const c = state.character;
  const originData = DM_DATA.origins[c.origin];
  let html = '';

  // Show origin summary
  html += `<div class="stat-block mb-20">
    <div class="stat-block-title">// Origin: ${originData.name}</div>
    <div class="stats-row">
      ${['might','quickness','insight','resolve'].map(a =>
        `<div class="stat-box"><div class="stat-box-label">${a.substring(0,3).toUpperCase()}</div><div class="stat-box-val">${originData.attributes[a]}</div></div>`
      ).join('')}
    </div>
  </div>`;

  // ATTRIBUTE BOOSTS
  if (c.origin === 'everan') {
    html += `<div class="section-label">Attribute Boost — Choose 2</div>`;
    html += `<div class="alert alert-info">Pick two attributes to increase from 6 → 7</div>`;
    html += `<div class="attr-boost-grid">`;
    ['might','quickness','insight','resolve'].forEach(attr => {
      const sel = (c.originAttrBoosts || []).includes(attr);
      const current = originData.attributes[attr] + (sel ? 1 : 0);
      html += `<div class="attr-boost-btn ${sel ? 'selected' : ''}" onclick="toggleOriginAttrBoost('${attr}')">
        <div class="attr-boost-name">${attr}</div>
        <div class="attr-boost-val ${sel ? 'boosted' : ''}">${current}</div>
      </div>`;
    });
    html += '</div>';
  }

  if (c.origin === 'spear') {
    html += `<div class="section-label">Attribute Boost — Choose 1</div>`;
    html += `<div class="alert alert-info">Choose Might or Quickness to increase to 8</div>`;
    html += `<div class="attr-boost-grid" style="grid-template-columns:1fr 1fr;">`;
    ['might','quickness'].forEach(attr => {
      const sel = c.originAttrBoostChoice === attr;
      html += `<div class="attr-boost-btn ${sel ? 'selected' : ''}" onclick="state.character.originAttrBoostChoice='${attr}';renderAll();">
        <div class="attr-boost-name">${attr}</div>
        <div class="attr-boost-val ${sel ? 'boosted' : ''}">${sel ? 8 : originData.attributes[attr]}</div>
      </div>`;
    });
    html += '</div>';
  }

  // SPECIAL ABILITIES
  html += `<div class="section-label" style="margin-top:20px;">Special Abilities</div>`;

  // Forced abilities
  Object.entries(originData.specialAbilities || {}).forEach(([key, ab]) => {
    if (ab.forced) {
      html += `<div class="ability-card forced mb-12">
        <div class="ability-name">${ab.name}</div>
        <div class="ability-desc">${ab.description}</div>
      </div>`;
    }
  });

  // Choose 1 (everan, spear)
  if (originData.chooseOneAbility) {
    html += `<div class="alert alert-info mt-12 mb-12">Choose ONE of the following special abilities:</div>`;
    originData.chooseOneAbility.forEach(key => {
      const ab = originData.specialAbilities[key];
      const sel = c.originAbilityChoice === key;
      html += `<div class="ability-card ${sel ? 'selected' : ''} mb-12" onclick="state.character.originAbilityChoice='${key}';renderAll();">
        <div class="ability-name">${ab.name}</div>
        <div class="ability-desc">${ab.description}</div>
      </div>`;
    });
  }

  // Choose 2 (dreamer, river)
  if (originData.chooseTwoAbilities) {
    html += `<div class="alert alert-info mt-12 mb-12">Choose TWO of the following special abilities:</div>`;
    originData.chooseTwoAbilities.forEach(key => {
      const ab = originData.specialAbilities[key];
      const sel = (c.originAbilitiesChoice || []).includes(key);
      html += `<div class="ability-card ${sel ? 'selected' : ''} mb-12" onclick="toggleOriginAbilityMulti('${key}',2)">
        <div class="ability-name">${ab.name}</div>
        <div class="ability-desc">${ab.description}</div>
      </div>`;
    });
  }

  return wrapStep('Step 1b — Origin Options', 'Configure the specific choices for your origin.',
    html,
    { showNext: true, showPrev: true }
  );
}

    <div class="option-grid">${advancedCards}</div>
  `;

  return wrapStep('Step 2 — Archetype', 'What has your character been doing with their life? Your archetype defines your specialist skills, equipment, and talent options.',
    html,
    { showNext: true, showPrev: true }

function renderArchetypeDistributeStep() {
  const c = state.character;
  const archetypeData = DM_DATA.archetypes[c.archetype] || DM_DATA.advancedArchetypes[c.archetype];
  const dist = archetypeData.attributeBonus.distribution; // [3,2,1]
  const skillDist = archetypeData.skillBonus.distribution; // [2,1,1]

  const attrChoices = c.archetypeAttrChoice || [null, null, null];
  const skillChoices = c.archetypeSkillChoice || [null, null, null];

  let html = '';

  // Stats preview
  const stats = computeStats();
  if (stats) {
    html += `<div class="stat-block mb-20">
      <div class="stat-block-title">// Current Attribute Totals (with all bonuses)</div>
      <div class="stats-row">
        ${['might','quickness','insight','resolve'].map(a =>
          `<div class="stat-box"><div class="stat-box-label">${a.substring(0,3).toUpperCase()}</div><div class="stat-box-val">${stats.attrs[a]||6}</div></div>`
        ).join('')}
      </div>
    </div>`;
  }

  // Attribute distribution
  html += `<div class="section-label">Distribute Attribute Points</div>`;
  html += `<div class="alert alert-info">Assign +${dist[0]}, +${dist[1]}, and +${dist[2]} to three different attributes from: ${archetypeData.attributeBonus.choices.join(', ')}</div>`;

  dist.forEach((bonus, i) => {
    const label = `+${bonus} to:`;
    const available = archetypeData.attributeBonus.choices;
    html += `<div style="margin-bottom:10px;">
      <div class="input-label" style="margin-bottom:6px;">${label}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">`;
    available.forEach(attr => {
      const disabled = attrChoices.some((a, j) => a === attr && j !== i);
      const sel = attrChoices[i] === attr;
      html += `<div class="attr-boost-btn ${sel ? 'selected' : ''} ${disabled ? 'disabled' : ''}"
        style="min-width:100px;padding:10px;"
        onclick="${disabled ? '' : `setAttrChoice(${i},'${attr}')`}">
        <div class="attr-boost-name">${attr}</div>
        <div class="attr-boost-val">${bonus > 0 ? '+'+bonus : bonus}</div>
      </div>`;
    });
    html += '</div></div>';
  });

  // Skill distribution
  html += `<div class="section-label" style="margin-top:24px;">Distribute Skill Points</div>`;
  html += `<div class="alert alert-info">Assign +${skillDist[0]}, +${skillDist[1]}, and +${skillDist[2]} to three different skills from: ${archetypeData.skillBonus.choices.join(', ')}</div>`;

  skillDist.forEach((bonus, i) => {
    const available = archetypeData.skillBonus.choices;
    html += `<div style="margin-bottom:10px;">
      <div class="input-label" style="margin-bottom:6px;">+${bonus} to:</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">`;
    available.forEach(skill => {
      const disabled = skillChoices.some((s, j) => s === skill && j !== i);
      const sel = skillChoices[i] === skill;
      html += `<div class="attr-boost-btn ${sel ? 'selected' : ''} ${disabled ? 'disabled' : ''}"
        style="min-width:100px;padding:10px;"
        onclick="${disabled ? '' : `setSkillChoice(${i},'${skill}')`}">
        <div class="attr-boost-name">${skill}</div>
        <div class="attr-boost-val">${bonus > 0 ? '+'+bonus : bonus}</div>
      </div>`;
    });
    html += '</div></div>';
  });

  // Goals & equipment
  html += `<div class="section-label" style="margin-top:24px;">Archetype Details</div>`;
  html += `<div class="stat-block">
    <div class="stat-block-title">// Goals</div>
    <div style="font-size:0.85rem;color:var(--text-dim);margin-bottom:12px;">${archetypeData.goals}</div>
    <div class="stat-block-title">// Starting Equipment</div>
    <div style="font-size:0.85rem;color:var(--text-dim);">${archetypeData.equipment}</div>
  </div>`;

  return wrapStep('Step 2b — Distribute Points', 'Assign your archetype\'s attribute and skill point bonuses.',
    html,
    { showNext: true, showPrev: true }
  );
}

function renderTalentStep() {
  const c = state.character;
  const archetypeData = DM_DATA.archetypes[c.archetype] || DM_DATA.advancedArchetypes[c.archetype];
  let html = '';

  // Forced talent
  if (archetypeData.forcedTalent && archetypeData.talents[archetypeData.forcedTalent]) {
    const t = archetypeData.talents[archetypeData.forcedTalent];
    html += `<div class="section-label">Automatic Talent</div>`;
    html += `<div class="talent-card forced mb-20">
      <div class="talent-name">${t.name}</div>
      <div class="talent-desc">${t.description}</div>
    </div>`;
  }

  // For firebrand: choose 2
  if (archetypeData.chooseTwoTalents) {
    html += `<div class="section-label">Choose 2 Starting Talents</div>`;
    const chosenTalents = c.talent ? (Array.isArray(c.talent) ? c.talent : [c.talent]) : [];
    Object.entries(archetypeData.talents).forEach(([key, t]) => {
      if (t.forced) return;
      const sel = chosenTalents.includes(key);
      html += `<div class="talent-card ${sel ? 'selected' : ''} mb-12" onclick="toggleFirebrandTalent('${key}')">
        <div class="talent-name">${t.name}</div>
        <div class="talent-desc">${t.description}</div>
      </div>`;
    });
  } else {
    // Choose 1
    const choosable = Object.entries(archetypeData.talents).filter(([k, t]) => !t.forced);
    if (choosable.length) {
      html += `<div class="section-label">Choose 1 Starting Talent</div>`;
      choosable.forEach(([key, t]) => {
        const sel = c.talent === key;
        html += `<div class="talent-card ${sel ? 'selected' : ''} mb-12" onclick="state.character.talent='${key}';renderAll();">
          <div class="talent-name">${t.name}</div>
          <div class="talent-desc">${t.description}</div>
        </div>`;
      });
    }
  }

  return wrapStep('Step 3 — Talent', 'Choose your character\'s starting talent — the mechanical edge that sets you apart.',
    html,
    { showNext: true, showPrev: true }
  );
}

  const c = state.character;

  // Temperament selection

    return `<div class="option-card ${sel}" onclick="selectTemperament('${key}')">
      <div class="option-card-header">
        <div class="option-code">${temp.code}</div>
        <div class="option-name">${temp.name}</div>

  html += `<div class="option-grid">${cards}</div>`;

          <div style="color:var(--text-dim);">${tempData.exhaustion}</div>

          <div class="input-label mb-12">Attitude</div>
          <div style="color:var(--text-dim);">${tempData.attitude}</div>
        </div>
      </div>
    </div>`;

    // Attr boost: forced one + pick one more
    html += `<div class="section-label">Attribute Bonus — +1 ${tempData.attributeBonus.forced} (automatic) + choose 1 more</div>`;
    html += `<div class="attr-boost-grid">`;
    ['might','quickness','insight','resolve'].forEach(attr => {
      const isForced = attr === tempData.attributeBonus.forced;

      if (isForced) {
        html += `<div class="attr-boost-btn selected" style="cursor:default;opacity:0.7;">
          <div class="attr-boost-name">${attr} (auto)</div>
          <div class="attr-boost-val boosted">+1</div>
        </div>`;
      } else {
        html += `<div class="attr-boost-btn ${isSel ? 'selected' : ''}" onclick="state.character.temperamentAttrBoost='${attr}';renderAll();">
          <div class="attr-boost-name">${attr}</div>
          <div class="attr-boost-val">+1?</div>
        </div>`;
      }
    });
    html += '</div>';

    // Skill boost
    html += `<div class="section-label" style="margin-top:16px;">Skill Bonus — Choose 1 from: ${tempData.skillBonus.choices.join(', ')}</div>`;
    html += `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;">`;
    tempData.skillBonus.choices.forEach(skill => {
      const sel = skillBoost === skill;
      html += `<div class="attr-boost-btn ${sel ? 'selected' : ''}" style="min-width:120px;" onclick="state.character.temperamentSkillBoost='${skill}';renderAll();">
        <div class="attr-boost-name">${skill}</div>
        <div class="attr-boost-val">+1</div>
      </div>`;
    });
    html += '</div>';

    // Bond requirement note
    html += `<div class="alert alert-info">Bond requirement: at least one bond must be a <strong>${tempData.bondRequirement}</strong> bond. You'll set up bonds in the next step.</div>`;
  }

  return wrapStep('Step 4 — Temperament', 'Every character is a unique person. Your temperament describes how you behave and what drives you.',
    html,
    { showNext: true, showPrev: true }
  );
}

      <div class="input-group">
        <div class="input-label">Pronouns</div>
        <input class="dm-input" id="charPronouns" value="${escHtml(c.pronouns || '')}" placeholder="they/them, she/her, ..." oninput="state.character.pronouns=this.value">
      </div>
    </div>
    <div class="portrait-input-layout">
      <div class="input-group">
        <div class="input-label">Character Portrait Web Address</div>
        <input class="dm-input" id="charPortraitUrl" value="${escHtml(c.portraitUrl || '')}" placeholder="https://example.com/portrait.jpg" oninput="updatePortraitUrl(this.value)">
        <div class="portrait-help">Paste a public image address. The sheet displays it in a fixed portrait frame and crops the visible area to fit.</div>
        <button class="btn btn-secondary" type="button" onclick="clearPortraitUrl()" style="margin-top:10px;align-self:flex-start;">Clear Portrait</button>
        <div class="validation-msg" id="portraitUrlError">${escHtml(portraitUrlMessage)}</div>
      </div>
      <div>
        ${renderPortraitPreview(c.portraitUrl)}
        <div class="validation-msg" id="portraitPreviewError"></div>
      </div>
    </div>
    <div class="input-group mb-20">
      <div class="input-label">Short-Term Ambition</div>
      <input class="dm-input" id="shortGoal" value="${escHtml(c.shortTermGoal || '')}" placeholder="Something you want to accomplish soon..." oninput="state.character.shortTermGoal=this.value">
    </div>
    <div class="input-group mb-20">
      <div class="input-label">Long-Term Ambition</div>
      <input class="dm-input" id="longGoal" value="${escHtml(c.longTermGoal || '')}" placeholder="Your character's greatest goal..." oninput="state.character.longTermGoal=this.value">
    </div>`,
    { showNext: true, showPrev: true }
  );
}

function renderBondsStep() {
  const c = state.character;
  const tempData = c.temperament ? DM_DATA.temperaments[c.temperament] : null;
  const bondRequirement = tempData ? tempData.bondRequirement : null;

  // Number of bonds: for typical group of 4 = 2 bonds
  const numBonds = Math.max(1, c.bonds.length);

  let html = '';
  if (bondRequirement) {
    html += `<div class="alert alert-info mb-20">Your temperament (${DM_DATA.temperaments[c.temperament].name}) requires at least one <strong>${bondRequirement}</strong> bond.</div>`;
  }

  html += `<div class="bond-list" id="bondList">`;
  c.bonds.forEach((bond, i) => {
    html += renderBondEntry(bond, i, bondRequirement);
  });
  html += `</div>`;
  html += `<button class="btn btn-secondary" onclick="addBond()" style="margin-bottom:20px;">+ Add Bond</button>`;

  html += `<div class="stat-block">
    <div class="stat-block-title">// Bond Types</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;font-size:0.82rem;color:var(--text-dim);">
      <div><strong style="color:var(--text);">Supportive Bond:</strong> When you help a supported ally regain Spirit by spending Momentum or giving up your own Spirit during a rest, the ally regains +1 Spirit.</div>
      <div><strong style="color:var(--text);">Rivalry Bond:</strong> When your rival regains one or more Spirit by adding to Threat, you recover one Spirit as well.</div>
    </div>
  </div>`;

  return wrapStep('Step 6 — Bonds', 'Every character has connections to other members of their group. Characters don\'t exist in isolation.',
    html,
    { showNext: true, showPrev: true }
  );
}

function renderBondEntry(bond, i, requirement) {
  const isRequired = i === 0 && requirement;
  return `<div class="bond-entry">
    <div class="input-group">
      <div class="input-label">Character Name</div>
      <input class="dm-input" value="${escHtml(bond.name || '')}" placeholder="Bond partner name..." oninput="state.character.bonds[${i}].name=this.value">
    </div>
    <div class="input-group">
      <div class="input-label">Bond Type${isRequired ? ` (must be ${requirement})` : ''}</div>
      <div style="display:flex;gap:6px;">
        <button class="bond-type-btn dm-tip ${bond.type === 'supportive' ? 'selected' : ''}" onclick="state.character.bonds[${i}].type='supportive';renderAll();">Supportive<span class="dm-tip-body"><span class="dm-tip-title">${DM_DATA.bondInfo.supportive.name}</span><span class="dm-tip-desc">${DM_DATA.bondInfo.supportive.desc}</span></span></button>
        <button class="bond-type-btn rivalry dm-tip ${bond.type === 'rivalry' ? 'selected' : ''}" onclick="state.character.bonds[${i}].type='rivalry';renderAll();">Rivalry<span class="dm-tip-body"><span class="dm-tip-title">${DM_DATA.bondInfo.rivalry.name}</span><span class="dm-tip-desc">${DM_DATA.bondInfo.rivalry.desc}</span></span></button>
      </div>
    </div>
    <button class="growth-item-remove" onclick="removeBond(${i})" style="align-self:flex-end;">✕</button>
  </div>`;
}

function renderGrowthStep() {
  const c = state.character;
  const spent = getGrowthSpent();
  const remaining = getGrowthRemaining();

  let html = `
    <div class="alert alert-info mb-20">Growth is optional — skip this step if you're creating a fresh starting character. Use it to represent advancement between sessions or for experienced characters.</div>

    <div class="growth-pool">
      <div class="growth-label">Available Growth</div>
      <input type="number" class="dm-input" value="${remaining}" min="0" max="10" style="width:80px;text-align:center;"
        oninput="setResource('growth', this.value);">
      <div class="growth-spent">${spent} spent / ${remaining} available / max 10</div>
    </div>
  `;

  if ((c.growthPool || 0) < spent) {
    html += `<div class="alert alert-error">⚠ You have spent more Growth than you have available!</div>`;
  }

  // Show purchases
  if (c.growthPurchases.length) {
    html += `<div class="section-label">Purchases</div>`;
    html += `<div class="growth-item-list">`;
    c.growthPurchases.forEach((p, i) => {
      html += `<div class="growth-item">
        <div class="growth-item-text">${p.label}${p.detail ? ': ' + p.detail : ''}</div>
        <div class="growth-item-cost">${p.cost} Growth</div>
        <button class="growth-item-remove" onclick="removeGrowthPurchase(${i})">✕</button>
      </div>`;
    });
    html += '</div>';
  }

  // Growth options
  html += `<div class="section-label">Add Growth Purchase</div>`;

  // Spirit increase
  html += growthOptionHTML('Increase Maximum Spirit +1', 1, `addGrowthSimple('increaseSpirit','Increase Maximum Spirit +1',1,'spirit')`);

  // Supply increase
  html += growthOptionHTML('Increase Starting Supply Points +1', 1, `addGrowthSimple('increaseSupply','Increase Starting Supply Points +1',1,'supply')`);

  // New bond
  html += growthOptionHTML('Create a new bond (supportive or rivalry)', 2, `addGrowthBond()`);

  // Tech level
  html += growthOptionHTML('Increase Tech Level +1 (max 6)', 2, `addGrowthSimple('increaseTech','Increase Tech Level +1',2,'tech')`);

  // Skill increase (show skill picker)
  html += `<div class="growth-option" style="flex-direction:column;align-items:flex-start;gap:8px;">
    <div style="display:flex;width:100%;align-items:center;gap:8px;">
      <div class="growth-option-label">Increase a Skill +1 (max 6)</div>
      <div class="growth-cost-badge">2 Growth</div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;">
      ${['move','fight','sneak','talk','operate','study','survive'].map(s =>
        `<div class="attr-boost-btn" style="min-width:80px;padding:8px;" onclick="addGrowthSkill('${s}')">
          <div class="attr-boost-name">${s}</div>
        </div>`
      ).join('')}
    </div>
  </div>`;

  // Attribute increase ≤9
  html += `<div class="growth-option" style="flex-direction:column;align-items:flex-start;gap:8px;">
    <div style="display:flex;width:100%;align-items:center;gap:8px;">
      <div class="growth-option-label">Increase Attribute (rated ≤9) +1</div>
      <div class="growth-cost-badge">2 Growth</div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;">
      ${['might','quickness','insight','resolve'].map(a => {
        const stats = computeStats();
        const val = stats ? stats.attrs[a] : '?';
        return `<div class="attr-boost-btn" style="min-width:90px;padding:8px;" onclick="addGrowthAttr('${a}',${val<=9?2:3})">
          <div class="attr-boost-name">${a} (${val})</div>
          <div class="attr-boost-val" style="font-size:0.9rem;">${val<=9?'2g':'3g'}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;

  // Second archetype
  html += `<div class="growth-option" style="flex-direction:column;align-items:flex-start;gap:8px;">
    <div style="display:flex;width:100%;align-items:center;gap:8px;">
      <div class="growth-option-label">Learn a Second Archetype (requires teacher)</div>
      <div class="growth-cost-badge">3 Growth</div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;">
      ${Object.entries(DM_DATA.archetypes)
        .filter(([k]) => k !== c.archetype)
        .map(([k, arc]) =>
          `<div class="attr-boost-btn" style="min-width:100px;padding:8px;" onclick="addGrowthArchetype('${k}','${arc.name}')">
            <div class="attr-boost-name">${arc.name}</div>
          </div>`
        ).join('')}
    </div>
  </div>`;

  // Add truth
  html += growthOptionHTML('Add, change, or remove a Character Truth (min 2)', 3, `addGrowthSimple('addTruth','Change a Character Truth',3,'truth')`);

  // Extra talents
  html += `<div class="section-label" style="margin-top:20px;">Extra Talents (via Growth)</div>`;
  html += `<div class="alert alert-info mb-12">Cost = number of talents already known. General talents are also available.</div>`;

  const archetypeData = DM_DATA.archetypes[c.archetype] || DM_DATA.advancedArchetypes[c.archetype];
  const currentTalentCount = 1 + (c.growthExtraTalents || []).length;
  const nextTalentCost = currentTalentCount;

  // Show all archetype talents
  Object.entries(archetypeData.talents).forEach(([key, t]) => {
    if (!t.forced && c.talent !== key && !(c.growthExtraTalents || []).includes(key)) {
      html += `<div class="talent-card mb-12" onclick="addGrowthTalent('${key}','${escHtml(t.name)}','archetype',${nextTalentCost})">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div class="talent-name">${t.name}</div>
          <div class="growth-cost-badge">${nextTalentCost}g</div>
        </div>
        <div class="talent-desc">${t.description}</div>
      </div>`;
    }
  });

  // General talents
  html += `<div class="section-label" style="margin-top:12px;">General Talents</div>`;
  Object.entries(DM_DATA.generalTalents).forEach(([key, t]) => {
    if (!(c.growthExtraTalents || []).includes(key)) {
      html += `<div class="talent-card mb-12" onclick="addGrowthTalent('${key}','${escHtml(t.name)}','general',${nextTalentCost})">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div class="talent-name">${t.name}</div>
          <div class="growth-cost-badge">${nextTalentCost}g</div>
        </div>
        <div class="talent-desc">${t.description}</div>
      </div>`;
    }
  });

  return wrapStep('Step 7 — Growth & Advancement', 'Optionally spend Growth to advance your character. Set your pool size, then purchase improvements.',
    html,
    { showNext: true, showPrev: true, nextLabel: 'View Character Sheet →' }
  );
}

function growthOptionHTML(label, cost, onclick) {
  return `<div class="growth-option" onclick="${onclick}">
    <div class="growth-option-label">${label}</div>
    <div class="growth-cost-badge">${cost} Growth</div>
  </div>`;
}

// ============================================================
// SHEET SECTION RENDERERS (v1.09)
// ------------------------------------------------------------
// Extracted out of renderSummaryStep so that the sheet's reading order is legible at
// a glance in one place rather than being implied by 200 lines of inline template
// strings. Each function returns a complete <div class="sheet-section"> block.

// The identity band: name and tags on the left, the three Goals & Archetype boxes in
// the middle, portrait / Tech Level / play controls on the right.
function renderSheetIdentityBand(c, stats, originData, archetypeData, temperamentData, sheetPortrait) {
  const goalBox = (label, text) => `<div class="sheet-header-goal-box">
    <div class="sheet-header-goal-label">${escHtml(label)}</div>
    <div class="sheet-header-goal-text">${text}</div>
  </div>`;

  return `<div class="sheet-header">
    <div class="sheet-name-row">
      <div class="sheet-name-block">
        <div class="sheet-name">${escHtml(c.name || 'Unnamed Wanderer')}</div>
        ${c.pronouns ? `<div style="font-family:var(--font-mono);font-size:0.7rem;color:var(--text-dim);margin-top:4px;">${escHtml(c.pronouns)}</div>` : ''}
      </div>
      <div class="sheet-techlevel dm-tip" tabindex="0">
        <div class="sheet-techlevel-label">TECH LEVEL</div>
        <div class="sheet-techlevel-value">${stats.techLevel}</div>
        <span class="dm-tip-body"><span class="dm-tip-title">Tech Level ${stats.techLevel}</span><span class="dm-tip-desc">${escHtml((TECH_LEVEL_INFO[stats.techLevel] || DM_DATA.equipmentPropertyInfo.techLevel.desc))}</span></span>
      </div>
    </div>
    <div class="sheet-header-content">
      <div class="sheet-header-main">
        <div class="sheet-tags">
          ${originData ? renderSheetTagTooltip(originData.name, 'Origin', originData.description) : ''}
          ${archetypeData ? renderSheetTagTooltip(archetypeData.name, 'Archetype', archetypeData.description) : ''}
          ${temperamentData ? renderSheetTagTooltip(temperamentData.name, 'Temperament', temperamentData.description) : ''}
        </div>
      </div>
      <div class="sheet-header-goals">
        ${goalBox('Archetype Goal', archetypeData ? archetypeData.goals : '—')}
        ${goalBox('Short-Term Ambition', escHtml(c.shortTermGoal || '—'))}
        ${goalBox('Long-Term Ambition', escHtml(c.longTermGoal || '—'))}
      </div>
      <div class="sheet-header-side">
        ${sheetPortrait}
        <div class="sheet-state-column">
          ${renderPlayControls()}
        </div>
      </div>
    </div>
  </div>`;
}

// Bonds and Temperament share a row. A character with no bonds is legal, and in that
// case Temperament takes the full width rather than leaving a hole.
function renderSheetBondsTemperamentRow(c, temperamentData) {
  const hasBonds = (c.bonds || []).length > 0;

  const bondsHtml = hasBonds ? `<div class="sheet-section">
    <div class="sheet-section-title">Bonds</div>
    ${c.bonds.map(b => `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
        ${renderTooltipTag((b.type||'?').toUpperCase(), DM_DATA.bondInfo?.[b.type], `cat-tag ${b.type==='rivalry'?'dmg':''}`)}
        <div style="font-size:0.88rem;color:var(--text);">${escHtml(b.name)}</div>
      </div>
    `).join('')}
  </div>` : '';

  const temperamentHtml = temperamentData ? `<div class="sheet-section">
    <div class="sheet-section-title">Temperament: ${escHtml(temperamentData.name)}</div>
    <div style="font-size:0.8rem;color:var(--text-dim);line-height:1.5;margin-bottom:8px;"><strong style="color:var(--text);">Drive:</strong> ${temperamentData.drive}</div>
    <div style="font-size:0.8rem;color:var(--text-dim);line-height:1.5;margin-bottom:8px;"><strong style="color:var(--text);">Exhaustion Trigger:</strong> ${temperamentData.exhaustion}</div>
    <div style="font-size:0.8rem;color:var(--text-dim);line-height:1.5;"><strong style="color:var(--text);">Attitude:</strong> ${temperamentData.attitude}</div>
  </div>` : '';

  if (!bondsHtml && !temperamentHtml) return '';
  return `<div class="sheet-duo ${hasBonds && temperamentHtml ? '' : 'single'}">${bondsHtml}${temperamentHtml}</div>`;
}

// Four exhaustion cards across, deliberately matching the four Attribute boxes
// directly beneath them: each exhaustion state shuts down one Attribute, so the
// columns line up with what they disable.
function renderSheetExhaustionSection(c) {
  return `<div class="sheet-section">
    <div class="sheet-section-title">Exhaustion States — click to toggle</div>
    <div class="exhaustion-row">
      ${Object.entries(DM_DATA.exhaustionTypes).map(([key, ex]) => {
        const attrName = DM_DATA.attributeInfo[ex.attr].name;
        const active = (c.activeExhaustion || []).includes(key);
        return `<div class="exhaustion-card ${active ? 'active' : ''}" onclick="toggleExhaustion('${key}')" tabindex="0">
          <div class="exhaustion-name" style="font-family:var(--font-display);font-weight:600;font-size:0.85rem;color:var(--text-bright);">${ex.name} <span style="font-family:var(--font-mono);font-size:0.58rem;color:var(--accent);">→ ${attrName.toUpperCase()}</span></div>
          <div style="font-size:0.72rem;color:var(--text-dim);line-height:1.4;margin-top:3px;">Shuts down <strong style="color:var(--text);">${attrName}</strong>. You auto-fail ${attrName} tests; all other tests take +1 Difficulty.</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function renderSheetTruthsInjuriesRow() {
  return `<div class="sheet-duo">
    <div class="sheet-section">
      <div class="sheet-section-title dm-tip" tabindex="0">Truths<span class="dm-tip-body"><span class="dm-tip-title">${TRUTH_RULE_INFO.name}</span><span class="dm-tip-desc">${TRUTH_RULE_INFO.desc}</span></span></div>
      ${renderEditableTruths()}
    </div>
    <div class="sheet-section">
      <div class="sheet-section-title dm-tip" tabindex="0">Injuries<span class="dm-tip-body"><span class="dm-tip-title">${INJURY_RULE_INFO.name}</span><span class="dm-tip-desc">${INJURY_RULE_INFO.desc}</span></span></div>
      ${renderEditableInjuries()}
    </div>
  </div>`;
}

function renderSheetAttributesSection(stats) {
  return `<div class="sheet-section">
    <div class="sheet-section-title">Attributes</div>
    <div class="stats-row">
      ${['might','quickness','insight','resolve'].map(a => {
        const info = DM_DATA.attributeInfo[a];
        const exhausted = isAttrExhausted(a);
        const itemNotes = getEquippedSituationalEffectsForAttribute(a);
        return `<div class="stat-box dm-tip ${exhausted ? 'exhausted' : ''}" tabindex="0">
          <div class="stat-box-label">${info.name}${exhausted ? ' ⚠' : ''}</div>
          <div class="stat-box-val">${stats.attrs[a]||6}</div>
          ${itemNotes.length ? `<div class="sheet-note-pill">${itemNotes.length} item note${itemNotes.length===1?'':'s'}</div>` : ''}
          <div class="dm-tip-body"><div class="dm-tip-title">${info.name}</div><div class="dm-tip-desc">${info.desc}${renderEffectTooltipNotes(itemNotes)}</div></div>
        </div>`;
      }).join('')}
    </div>
  </div>`;

function renderSheetSkillsSection(stats) {
  return `<div class="sheet-section">
    <div class="sheet-section-title">Skills</div>
    <div class="skills-row">
      ${['fight','move','operate','sneak','study','survive','talk'].map(s => {
        const info = DM_DATA.skillInfo[s];
        const itemNotes = getEquippedSituationalEffectsForSkill(s);
        return `<div class="skill-box dm-tip" tabindex="0">
          <div class="skill-box-label">${info.name}</div>
          <div class="skill-box-val">${stats.skills[s]||1}</div>
          ${itemNotes.length ? `<div class="sheet-note-pill">${itemNotes.length} item note${itemNotes.length===1?'':'s'}</div>` : ''}
          <div class="dm-tip-body"><div class="dm-tip-title">${info.name}</div><div class="dm-tip-desc">${info.desc}${renderEffectTooltipNotes(itemNotes)}</div></div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// v1.09: Skills now precede Resources. Resources are the pools you spend during play,
// so they sit closest to the Actions section that spends them.
function renderSheetResourcesSection(c) {
  const maxes = getResourceMaxes();
  const stats = computeStats();

  // The Supply reset button restores the starting value only. It is a confirm-countdown
  // button because it overwrites a number the player may have spent down deliberately.
  const supplyReset = stats ? `<button class="confirm-btn resource-footer-btn dm-tip" tabindex="0" style="margin-top:8px;" onclick="confirmClick(this, () => resetSupplyPoints(), 'Reset?')">Reset to ${stats.startingSupplyPoints}<span class="dm-tip-body"><span class="dm-tip-title">Reset Supply Points</span><span class="dm-tip-desc">Restores Supply Points to your starting total of ${stats.startingSupplyPoints}: Operate ${stats.skills.operate || 1}, plus any Origin and Archetype modifiers. Growth-purchased Supply increases and the equipped Handy armor bonus raise your maximum but are not part of the reset target.</span></span></button>` : '';

  return `<div class="sheet-section">
    <div class="sheet-section-title">Resources</div>
    <div class="resource-grid">
      ${renderResourceCounter('spirit', 'Spirit', getEffectiveResource('spirit'), maxes.spirit)}
      ${renderResourceCounter('supply', 'Supply Points', getEffectiveResource('supply'), maxes.supply, '', renderResourceBonusBreakdown('supplyPoints'), supplyReset)}
      ${renderResourceCounter('coin', 'Coin', c.currentCoin, maxes.coin)}
      ${renderResourceCounter('growth', 'Growth', getGrowthRemaining(), maxes.growth)}
      ${renderResourceCounter('momentum', 'Momentum', c.currentMomentum, maxes.momentum)}
      ${renderKnowledgeFragmentsCounter()}
    </div>
  </div>`;
}
