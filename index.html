  items: [{"id":"bomb-blast","name":"Bomb (Blast)","category":"weapon","techLevel":2,"atomaCategory":"Hand-Made","type":"Ranged","injury":"Shrapnel","damage":4,"qualities":["Ammo","Breaker","Burst","Loud"],"quantity":3,"cost":2,"rarity":2,"bookPage":139,"pdfPage":11,"description":"Thrown explosive bomb that scatters hardened shrapnel over an area. Bought or made in batches of three.","fullDescription":"A simple ranged weapon, comprising a hard outer shell filled with a reactive payload, and an explosive charge to break the shell and set off the payload after a brief delay. Blast bombs contain a more powerful explosive charge along with hardened metal and ceramic shrapnel which is hurled at high speed by the blast."},{"id":"bomb-incendiary","name":"Bomb (Incendiary)","category":"weapon","techLevel":2,"atomaCategory":"Hand-Made","type":"Ranged","injury":"Burned","damage":4,"qualities":["Ammo","Burst"],"quantity":3,"cost":2,"rarity":2,"bookPage":139,"pdfPage":11,"description":"Thrown bomb that spreads burning liquid over an area. Bought or made in batches of three.","fullDescription":"A simple ranged weapon, comprising a hard outer shell filled with a reactive payload, and an explosive charge to break the shell and set off the payload after a brief delay. Incendiary bombs ignite a flammable liquid and spread it over an area."},{"id":"bomb-tangle","name":"Bomb (Tangle)","category":"weapon","techLevel":2,"atomaCategory":"Hand-Made","type":"Ranged","injury":"Entangled","damage":4,"qualities":["Ammo","Burst","Non-Lethal"],"quantity":3,"cost":2,"rarity":2,"bookPage":139,"pdfPage":11,"description":"Thrown bomb that releases fast-hardening adhesive to restrain nearby targets. Bought or made in batches of three.","fullDescription":"A simple ranged weapon, comprising a hard outer shell filled with a reactive payload, and an explosive charge to break the shell and set off the payload after a brief delay. Tangle bombs contain an adhesive chemical mixture that rapidly expands and hardens when the bomb detonates, entangling anyone nearby."},{"id":"bow","name":"Bow","category":"weapon","techLevel":1,"atomaCategory":"Hand-Made","type":"Ranged","injury":"Impale","damage":1,"qualities":["Long-Ranged","Quiet"],"supplyPointCost":1,"cost":1,"rarity":1,"bookPage":139,"pdfPage":11,"description":"Simple ranged weapon using arrows; can use ordinary or special arrowheads.","fullDescription":"A simple ranged weapon, normally made from lengths of flexible wood or metal, sometimes using pulleys to amplify the user's effort. Bows are effective and versatile weapons, able to use arrows with a variety of different arrowheads. Blast head arrows have a simple explosive charge in the arrowhead, designed to detonate upon impact. Spark heads contain an electrical charge which discharges upon impact. Tangle heads contain an adhesive chemical mixture that rapidly expands and hardens when the arrowhead breaks open on impact, entangling the target. A bow has a basic profile for normal arrows, and then several profiles for special types of arrows, depending on which are being used, which can be found in the Hand-Made Weapons Table at the start of this section. Choose which type of arrow is being used before rolling for an attack. Arrows with the ammo quality are limited in number, with one shot consumed by each attack. Special arrows are bought or made in batches of 3."},{"id":"bow-blast-heads","name":"Bow (Blast Heads)","category":"weapon","techLevel":2,"atomaCategory":"Hand-Made","type":"Ranged","injury":"Burned","damage":4,"qualities":["Ammo","Long-Ranged","Breaker"],"quantity":3,"cost":2,"rarity":2,"bookPage":139,"pdfPage":11,"description":"Special explosive arrowheads for a bow. Bought or made in batches of three.","fullDescription":"Bows are effective and versatile weapons, able to use arrows with a variety of different arrowheads. Blast head arrows have a simple explosive charge in the arrowhead, designed to detonate upon impact. Choose which type of arrow is being used before rolling for an attack. Arrows with the ammo quality are limited in number, with one shot consumed by each attack. Special arrows are bought or made in batches of 3.","parentWeapon":"Bow"},{"id":"bow-spark-heads","name":"Bow (Spark Heads)","category":"weapon","techLevel":2,"atomaCategory":"Hand-Made","type":"Ranged","injury":"Shocked","damage":4,"qualities":["Ammo","Long-Ranged"],"quantity":3,"cost":2,"rarity":2,"bookPage":139,"pdfPage":11,"description":"Special arrowheads for a bow that discharge electricity on impact. Bought or made in batches of three.","fullDescription":"Bows are effective and versatile weapons, able to use arrows with a variety of different arrowheads. Spark heads contain an electrical charge which discharges upon impact. Choose which type of arrow is being used before rolling for an attack. Arrows with the ammo quality are limited in number, with one shot consumed by each attack. Special arrows are bought or made in batches of 3.","parentWeapon":"Bow"},{"id":"bow-tangle-heads","name":"Bow (Tangle Heads)","category":"weapon","techLevel":2,"atomaCategory":"Hand-Made","type":"Ranged","injury":"Entangled","damage":4,"qualities":["Ammo","Long-Ranged","Non-Lethal","Quiet"],"quantity":3,"cost":2,"rarity":2,"bookPage":139,"pdfPage":11,"description":"Special arrowheads for a bow that spread hardening adhesive on impact. Bought or made in batches of three.","fullDescription":"Bows are effective and versatile weapons, able to use arrows with a variety of different arrowheads. Tangle heads contain an adhesive chemical mixture that rapidly expands and hardens when the arrowhead breaks open on impact, entangling the target. Choose which type of arrow is being used before rolling for an attack. Arrows with the ammo quality are limited in number, with one shot consumed by each attack. Special arrows are bought or made in batches of 3.","parentWeapon":"Bow"},{"id":"club","name":"Club","category":"weapon","techLevel":0,"atomaCategory":"Hand-Made","type":"Melee","injury":"Bludgeoned","damage":1,"qualities":[],"supplyPointCost":1,"cost":1,"rarity":1,"bookPage":139,"pdfPage":11,"description":"Sturdy length of wood or metal used to batter enemies; easily improvised but purpose-built versions last longer.","fullDescription":"A sturdy length of wood or metal, used to batter and bludgeon enemies. Easy to improvise, but improvised clubs are prone to break from use. Deliberately-made clubs tend to be reinforced to withstand repeated impacts. The profile for the club can be found in the Hand-Made Weapons Table at the start of this section."},{"id":"crossbow","name":"Crossbow","category":"weapon","techLevel":2,"atomaCategory":"Hand-Made","type":"Ranged","injury":"Impale","damage":2,"qualities":["Long-Ranged","Quiet"],"supplyPointCost":2,"cost":2,"rarity":2,"bookPage":140,"pdfPage":12,"description":"High-tension bow on a stock that stores tension and launches projectiles with greater force and accuracy.","fullDescription":"An evolution of the bow, a crossbow is a small, high-tension bow affixed to a sturdy stock, which can hold the bowstring in tension without requiring the user to hold it themselves. This allows the crossbow to hurl projectiles with much greater force and to be aimed more precisely. The profile for the crossbow can be found in the Hand-Made Weapons Table at the start of this section."},{"id":"electrospear","name":"Electrospear","category":"weapon","techLevel":3,"atomaCategory":"Hand-Made","type":"Melee","injury":"Shocked","damage":4,"qualities":["Breaker","Powered (Breather)","Scary"],"cost":6,"rarity":5,"bookPage":140,"pdfPage":12,"description":"Traditional Spear weapon, effectively an overcharged shock-prod built into a spear; can function as a normal spear while recharging.","fullDescription":"A potent hand-made weapon, Electrospears are used almost exclusively by Spears, who revere them as a symbol of their way of life and a legacy of their ancestors. Electrospears from fallen comrades are recovered and stored in Spear encampments, and each Spear will meditate surrounded by these weapons until they choose, or are chosen by, the weapon they will bear. Each Spear modifies and repairs their weapon throughout their lives, adding to their legacy. Each Electrospear is, essentially, an overcharged shock-prod with an extended, sharpened head; not especially sophisticated, but potent even against tough enemies such as mechs. The profile for an Electrospear can be found in the Hand-Made Weapons Table at the start of this section. An Electrospear is a powered weapon, which recharges after a Breather rest. While recharging, the weapon may still be used as a normal spear. Electrospears cannot be purchased. Spears do not part with their traditional arms, but they will pay for weapons to be returned to them.","availabilityNote":"Not normally sold by Spears, though they may pay to recover one.","situationalEffects":[{"id":"scary-social-reaction","type":"socialContext","appliesWhen":"equipped","attributeKeys":["resolve"],"skillKeys":["talk"],"label":"Scary: affects reactions","rulesText":"Powerful, intimidating, and overkill against most foes. Carrying or wearing it affects how people react to you both in and out of combat.","source":"quality:Scary"}]},{"id":"knife","name":"Knife","category":"weapon","techLevel":0,"atomaCategory":"Hand-Made","type":"Melee/Ranged","injury":"Bleeding","damage":1,"qualities":["Quiet"],"supplyPointCost":1,"cost":1,"rarity":1,"bookPage":143,"pdfPage":15,"description":"Short sharpened blade useful as both tool and weapon.","fullDescription":"A sharpened metal blade with a short handle. Knives are more often made as tools than as weapons, but any knife can serve as a weapon in desperate times. A well-made fighting knife can stand up to heavy use, while also functioning as a useful tool for hunting and scavenging. The profile for a knife can be found in the Hand-Made Weapons Table at the start of this section."},{"id":"poisoned-blade","name":"Poisoned Blade","category":"weapon","techLevel":2,"atomaCategory":"Hand-Made","type":"Melee","injury":"Poisoned","damage":3,"qualities":["Quiet"],"cost":3,"rarity":3,"bookPage":144,"pdfPage":16,"description":"Needle-like or grooved blade designed to deliver toxins. Cannot injure machine enemies.","fullDescription":"Long knives, often needle-like, hollow, or with a specially-shaped fuller to allow a toxic substance to run easily along the blade's length, these blades are carefully designed and made to deliver a toxic substance with a sharp stab or deep scratch. These toxins are often extracted from dangerous animals or concocted from plant extracts by experts in Dreamer communities. The profile for poisoned blades can be found in the Hand-Made Weapons Table at the start of this section. A poisoned blade cannot inflict Injuries on machine enemies."},{"id":"sling","name":"Sling","category":"weapon","techLevel":1,"atomaCategory":"Hand-Made","type":"Ranged","injury":"Bludgeoned","damage":1,"qualities":["Quiet"],"supplyPointCost":1,"cost":1,"rarity":1,"bookPage":146,"pdfPage":18,"description":"Simple projectile weapon for hurling stones or bullets over distance.","fullDescription":"A simple ranged weapon, normally made from strips of leather or cloth. For their apparent simplicity, they can be a highly effective weapon, allowing the wielder to hurl heavy stones or metal bullets over long distances. Inventive users replace the normal blunt projectiles with hollow shells containing explosives or chemicals. Blast sling bullets are a simple explosive, designed to detonate upon impact. Tangle bullets contain an adhesive chemical mixture that rapidly expands and hardens when the bullet breaks open on impact, entangling the target. A Sling has a basic profile for normal bullets, and then several profiles for special types of bullets, depending on which are being used, which can be found in the Hand-Made Weapons Table at the start of this section. Choose which type of bullet is being used before rolling for an attack. Bullets with the ammo quality are limited in number, with one shot consumed by each attack."},{"id":"sling-blast","name":"Sling (Blast)","category":"weapon","techLevel":2,"atomaCategory":"Hand-Made","type":"Ranged","injury":"Burned","damage":4,"qualities":["Ammo","Breaker"],"quantity":3,"rarity":2,"bookPage":146,"pdfPage":18,"description":"Special sling ammunition with an explosive payload. Consumed when fired.","fullDescription":"A Sling has a basic profile for normal bullets, and then several profiles for special types of bullets, depending on which are being used, which can be found in the Hand-Made Weapons Table at the start of this section. Blast sling bullets are a simple explosive, designed to detonate upon impact. Choose which type of bullet is being used before rolling for an attack. Bullets with the ammo quality are limited in number, with one shot consumed by each attack.","costNotListed":true,"parentWeapon":"Sling"},{"id":"sling-tangle","name":"Sling (Tangle)","category":"weapon","techLevel":2,"atomaCategory":"Hand-Made","type":"Ranged","injury":"Entangled","damage":4,"qualities":["Ammo","Non-Lethal","Quiet"],"quantity":3,"rarity":2,"bookPage":146,"pdfPage":18,"description":"Special sling ammunition that releases a hardening adhesive. Consumed when fired.","fullDescription":"A Sling has a basic profile for normal bullets, and then several profiles for special types of bullets, depending on which are being used, which can be found in the Hand-Made Weapons Table at the start of this section. Tangle bullets contain an adhesive chemical mixture that rapidly expands and hardens when the bullet breaks open on impact, entangling the target. Choose which type of bullet is being used before rolling for an attack. Bullets with the ammo quality are limited in number, with one shot consumed by each attack.","costNotListed":true,"parentWeapon":"Sling"},{"id":"spark-thrower","name":"Spark Thrower","category":"weapon","techLevel":3,"atomaCategory":"Hand-Made","type":"Ranged","injury":"Shocked","damage":3,"qualities":["Powered (Break)"],"supplyPointCost":3,"cost":3,"rarity":2,"bookPage":147,"pdfPage":19,"description":"Short-ranged electrical weapon used to injure or drive off attackers.","fullDescription":"A short-ranged weapon which projects a brief-but-intense electrical charge to injure and dissuade attackers. There are a number of different designs for the weapon, and many communities have their own versions. The profile for a Spark Thrower can be found in the Hand-Made Weapons Table at the start of this section. A Spark Thrower is a powered weapon, which recharges after a Break rest."},{"id":"spear","name":"Spear","category":"weapon","techLevel":1,"atomaCategory":"Hand-Made","type":"Melee","injury":"Impale","damage":2,"qualities":[],"supplyPointCost":1,"cost":1,"rarity":1,"bookPage":147,"pdfPage":19,"description":"Sharpened spike or blade on a long haft; cheap, old, and common.","fullDescription":"A sharpened metal spike or blade affixed to a long haft. Spears are one of the oldest and most common forms of weapon ever devised by humans; they are relatively easy and take relatively few resources to make, and require only a small amount of training to teach someone how to wield them. The profile for a Spear can be found in the Hand-Made Weapons Table at the start of this section."},{"id":"sword","name":"Sword","category":"weapon","techLevel":2,"atomaCategory":"Hand-Made","type":"Melee","injury":"Lacerated","damage":3,"qualities":[],"cost":2,"rarity":2,"bookPage":147,"pdfPage":19,"description":"Salvaged or purpose-made edged weapon honed for cutting or thrusting.","fullDescription":"Swords have existed in most human cultures for thousands of years. This form is likely made of salvaged materials, repurposed, and honed to a sharp edge or stabbing point. The profile for a Sword can be found in the Hand-Made Weapons Table at the start of this section."},{"id":"thrall-spear-mono-edge","name":"Thrall Spear Mono-edge","category":"weapon","techLevel":3,"atomaCategory":"Hand-Made","type":"Melee","injury":"Impale","damage":4,"qualities":["Scary"],"cost":5,"rarity":5,"bookPage":148,"pdfPage":20,"description":"Cruel hooked or barbed Thrall spear with a monomolecular cutting edge.","fullDescription":"The long hooked or barbed spears carried by Thralls. These cruel weapons are rarely found outside the hands of a Thrall. Many Thralls carry ordinary spears in this design, but more advanced forms have occasionally been identified. Some versions have a monomolecular edge that cuts more easily than any blade manufactured without machine assistance. The profile for Thrall Spears can be found in the Security Weapons Table at the start of this section.","situationalEffects":[{"id":"scary-social-reaction","type":"socialContext","appliesWhen":"equipped","attributeKeys":["resolve"],"skillKeys":["talk"],"label":"Scary: affects reactions","rulesText":"Powerful, intimidating, and overkill against most foes. Carrying or wearing it affects how people react to you both in and out of combat.","source":"quality:Scary"}]},{"id":"thrall-electrospear","name":"Thrall Electrospear","category":"weapon","techLevel":3,"atomaCategory":"Hand-Made","type":"Melee/Ranged","injury":"Shocked","damage":4,"qualities":["Breaker","Powered (Special)","Scary"],"cost":5,"rarity":5,"bookPage":148,"pdfPage":20,"description":"Thrall spear that can also discharge a short-ranged electrical shock by drawing power from the wielder's implants.","fullDescription":"The long hooked or barbed spears carried by Thralls. These cruel weapons are rarely found outside the hands of a Thrall. Some versions contain strange electro-conductive elements, similar to an Electrospear, but designed to draw upon implants in the wielder's body. These Thrall 'Electrospears' can be used in melee but can also discharge a short-ranged electrical shock. The profile for Thrall Spears can be found in the Security Weapons Table at the start of this section. Thrall Electrospears are powered weapons, but they do not recharge normally: they draw power from the user's body.","situationalEffects":[{"id":"scary-social-reaction","type":"socialContext","appliesWhen":"equipped","attributeKeys":["resolve"],"skillKeys":["talk"],"label":"Scary: affects reactions","rulesText":"Powerful, intimidating, and overkill against most foes. Carrying or wearing it affects how people react to you both in and out of combat.","source":"quality:Scary"}]},{"id":"hunting-pulser","name":"Hunting Pulser","category":"weapon","techLevel":3,"atomaCategory":"Security","type":"Ranged","injury":"Burned","damage":3,"qualities":["Long-Ranged","Powered (Break)"],"cost":4,"rarity":2,"bookPage":143,"pdfPage":15,"description":"Long-ranged laser weapon intended for hunting and precision shots.","fullDescription":"Pulsers are high-intensity laser weapons, projecting an intense, brief laser pulse at the target. Hunting Pulsers are a variant designed for use at longer ranges, able to adjust the focal length of the pulse to a few hundred meters. They are useful for hunting game, but also for precision attacks. The profile for the Hunting Pulser can be found in the Security Weapons Table at the start of this section. A Hunting Pulser is a powered weapon, which recharges after a Break rest."},{"id":"security-pulser","name":"Security Pulser","category":"weapon","techLevel":3,"atomaCategory":"Security","type":"Ranged","damageOptions":[{"injury":"Burned","damage":2},{"injury":"Stunned","damage":2,"qualities":["Non-Lethal"]}],"qualities":["Burst","Powered (Break)"],"cost":4,"rarity":3,"bookPage":145,"pdfPage":17,"description":"Laser weapon for security personnel; can switch between lethal burn pulse and non-lethal stun pulse before attacking.","fullDescription":"Pulsers are high-intensity laser weapons, projecting an intense, brief laser pulse at the target. Security Pulsers are a variant designed for use by security personnel, and the weapon can adjust the pulse it generates to have a non-lethal effect. This 'stun' pulse is painful to those shot, but the incapacitation lasts only a few minutes and leaves no lingering effects. The profile for the Security Pulser can be found in the Security Weapons Table at the start of this section. It may replace its burned 2 Injury with stunned 2 on any attack, decided before any dice are rolled for the attack. A Security Pulser is a powered weapon, which recharges after a Break rest."},{"id":"shock-prod","name":"Shock Prod","category":"weapon","techLevel":3,"atomaCategory":"Security","type":"Melee","damageOptions":[{"injury":"Shocked","damage":3},{"injury":"Stunned","damage":3,"qualities":["Non-Lethal"]}],"qualities":["Powered (Breather)"],"cost":4,"rarity":2,"bookPage":146,"pdfPage":18,"description":"Electrical contact weapon used for crowd control, animal deterrence, or herding; can be set to stun.","fullDescription":"A sturdy scepter about the length of a forearm, topped with a metallic element which discharges electricity upon contact with an object or person. They were used as crowd control and riot-suppression tools previously, but most versions found these days are used instead to deter wild animals or herd livestock. Shock prods have an adjustable charge and can be set to inflict a short-lived shock that only really stuns the target. The effect is still painful, though. The profile for the Shock Prod can be found in the Security Weapons Table at the start of this section. It may replace its shocked 3 Injury with stunned 3 on any attack, decided before any dice are rolled for the attack. A Shock Prod is a powered weapon, which recharges after a Breather rest."},{"id":"snare-grenades","name":"Snare Grenades","category":"weapon","techLevel":2,"atomaCategory":"Security","type":"Ranged","injury":"Stuck","damage":2,"qualities":["Ammo","Breaker","Burst","Non-Lethal"],"quantity":3,"cost":3,"rarity":3,"bookPage":146,"pdfPage":18,"description":"Non-lethal grenades that release expanding foam to restrain targets. Produced in batches of three.","fullDescription":"These non-lethal grenades are used to restrain and subdue enemies. They expel a foam which expands rapidly and then hardens seconds later. Each grenade can only be used once. The profile for a Snare Grenade can be found in the Security Weapons Table at the start of this section. An Atoma device produces these grenades in batches of three."},{"id":"stun-grenades","name":"Stun Grenades","category":"weapon","techLevel":2,"atomaCategory":"Security","type":"Ranged","injury":"Stunned","damage":2,"qualities":["Ammo","Breaker","Burst","Loud","Non-Lethal"],"quantity":3,"cost":3,"rarity":3,"bookPage":147,"pdfPage":19,"description":"Non-lethal grenades that emit intense light and sound across multiple frequencies. Produced in batches of three.","fullDescription":"These non-lethal grenades produce a burst of intense light and loud noise to stun and disorient enemies. These are effects on multiple frequencies, and can affect machines as much as humans. Each grenade can only be used once. The profile for a Stun Grenade can be found in the Security Weapons Table at the start of this section. An Atoma device produces these grenades in batches of three."},{"id":"repulsor-glove","name":"Repulsor Glove","category":"weapon","techLevel":3,"atomaCategory":"Security","type":"Ranged","injury":"Concussed","damage":4,"qualities":["Non-Lethal"],"cost":4,"rarity":3,"bookPage":145,"pdfPage":17,"description":"Personal defense glove that projects a broad kinetic force pulse to knock down and disorient targets.","fullDescription":"Kinetic Pulse Gloves, commonly known as Repulser Gloves, merging the words 'Repulse' and 'Pulser,' are a personal defense armament that project a wave or bubble of kinetic force from a projector in the palm or on the knuckles. The force of this is considerable, but the weapon is normally non-lethal, spreading the impact over a wide enough area that the effect leaves a target knocked over, disoriented, and winded, but with no lasting injuries. The profile for a Repulser Glove can be found in the Security Weapons Table at the start of this section."},{"id":"thermal-staff","name":"Thermal Staff","category":"weapon","techLevel":4,"atomaCategory":"Security","type":"Melee","injury":"Burn","damage":3,"qualities":["Breaker","Powered (Break)"],"cost":4,"rarity":3,"bookPage":148,"pdfPage":20,"description":"Staff or rod with a heating element that can provide light, heat, ignition, signals, and intense cutting heat.","fullDescription":"A long staff, scepter, or rod with a heating element at the tip, which glows when in use, though shielding technology in the staff means that the heat does not affect the user. The staff can be used to generate light and heat, to ignite flammable materials, to illuminate an area or to send a signal, and in extremes can be heated to temperatures intense enough to melt through dense armor plating. The profile for the Thermal Staff can be found in the Security Weapons Table at the start of this section. A Thermal Staff is a powered weapon, which recharges after a Break rest.","rulesNote":"The table prints 'Burn (Break)' in qualities; the item description states it is powered and recharges after a Break rest."},{"id":"arc-weapon","name":"Arc Weapon","category":"weapon","techLevel":4,"atomaCategory":"Military","type":"Melee","injury":"Shocked","damage":4,"qualities":["Burst","Powered (Bed)","Scary"],"cost":6,"rarity":4,"bookPage":139,"pdfPage":11,"description":"Electrified mace, hammer, sword, or similar melee weapon that arcs a blast through nearby targets.","fullDescription":"A solid-looking melee weapon, commonly taking the form of a mace, hammer, sword, or similar weapon, with sparks of electricity playing around the head. Upon impact, the weapon discharges a powerful electrical blast which arcs between those nearby; the weapon absorbs any electricity from the attack which would arc back to the wielder. The profile for the Arc Weapon can be found in the Military Weapons Table at the start of this section. An Arc Weapon is a powered weapon, which recharges after a Bed rest.","situationalEffects":[{"id":"scary-social-reaction","type":"socialContext","appliesWhen":"equipped","attributeKeys":["resolve"],"skillKeys":["talk"],"label":"Scary: affects reactions","rulesText":"Powerful, intimidating, and overkill against most foes. Carrying or wearing it affects how people react to you both in and out of combat.","source":"quality:Scary"}]},{"id":"combat-sword","name":"Combat Sword","category":"weapon","techLevel":3,"atomaCategory":"Military","type":"Melee","injury":"Lacerated","damage":4,"qualities":[],"cost":4,"rarity":4,"bookPage":139,"pdfPage":11,"description":"Pre-war refined sword with advanced alloys and a razor edge.","fullDescription":"Swords have existed in many human cultures for thousands of years. This particular form is a modern refinement from before the War, using advanced alloys and honed to a razor-sharp edge. It is about as potent as a nonpowered melee weapon can be. The profile for the Combat Sword can be found in the Military Weapons Table at the start of this section."},{"id":"em-beamer","name":"EM Beamer","category":"weapon","techLevel":4,"atomaCategory":"Military","type":"Ranged","injury":"Overloaded","damage":4,"qualities":["Long-Ranged","Powered (Bed)","Breaker","Scary"],"cost":6,"rarity":5,"bookPage":141,"pdfPage":13,"description":"Long-ranged directed electromagnetic pulse weapon for disabling machines and other advanced targets.","fullDescription":"A long-ranged form of directed radiation weapon, these guns propel a focused electromagnetic pulse down a narrow channel of ionized air, striking a target at long distances. These weapons were heavily used during the War for destroying mechs and other technological foes, but are far less effective against living creatures. The profile for the EMP Beamer can be found in the Military Weapons Table at the start of this section. An EMP Beamer is a powered weapon, which recharges after a Bed rest. Non-robot characters cannot suffer an Injury from an EMP Weapon.","aliases":["EMP Beamer"],"targetRestriction":"Non-robot characters cannot suffer Injury from this weapon.","situationalEffects":[{"id":"scary-social-reaction","type":"socialContext","appliesWhen":"equipped","attributeKeys":["resolve"],"skillKeys":["talk"],"label":"Scary: affects reactions","rulesText":"Powerful, intimidating, and overkill against most foes. Carrying or wearing it affects how people react to you both in and out of combat.","source":"quality:Scary"}]},{"id":"em-repeater","name":"EM Repeater","category":"weapon","techLevel":4,"atomaCategory":"Military","type":"Ranged","injury":"Overloaded","damage":3,"qualities":["Burst","Powered (Break)","Breaker","Scary"],"cost":6,"rarity":5,"bookPage":142,"pdfPage":14,"description":"Rapid-firing electromagnetic pulse weapon with shorter effective range than a beamer.","fullDescription":"A common form of EMP weapon, these guns propel directed electromagnetic pulses. The weapon has a relatively high rate of fire, able to produce several pulses in quick succession, but their effective range is limited. These weapons were used for destroying mechs and other high-tech targets. The profile for the EMP Repeater can be found in the Military Weapons Table at the start of this section. An EMP Repeater is a powered weapon, which recharges after a Bed rest. Non-robot characters cannot suffer Injury from EMP weapons.","aliases":["EMP Repeater"],"targetRestriction":"Non-robot characters cannot suffer Injury from this weapon.","situationalEffects":[{"id":"scary-social-reaction","type":"socialContext","appliesWhen":"equipped","attributeKeys":["resolve"],"skillKeys":["talk"],"label":"Scary: affects reactions","rulesText":"Powerful, intimidating, and overkill against most foes. Carrying or wearing it affects how people react to you both in and out of combat.","source":"quality:Scary"}]},{"id":"emp-grenades","name":"EMP Grenades","category":"weapon","techLevel":4,"atomaCategory":"Military","type":"Ranged","injury":"Overloaded","injuryCount":2,"damage":3,"qualities":["Ammo","Burst","Breaker"],"quantity":3,"cost":6,"rarity":5,"bookPage":141,"pdfPage":13,"description":"Single-use electromagnetic pulse grenades that harm machines. Produced in batches of three.","fullDescription":"These grenades produce an intense electromagnetic pulse, which harms only machines. Each grenade can only be used once. The profile for an EMP Grenade can be found in the Military Weapons Table at the start of this section. Non-robot characters cannot suffer Injury from EMP grenades. An Atoma device produces these grenades in batches of three.","targetRestriction":"Non-robot characters cannot suffer Injury from this weapon."},{"id":"emp-mines","name":"EMP Mines","category":"weapon","techLevel":4,"atomaCategory":"Military","type":"Mine","injury":"Overloaded","injuryCount":2,"damage":4,"qualities":["Ammo","Burst","Breaker","Mine"],"quantity":3,"cost":6,"rarity":5,"bookPage":141,"pdfPage":13,"description":"Placed electromagnetic pulse charges that trigger when a machine comes close. Produced in batches of three.","fullDescription":"These placed charges produce an intense electromagnetic pulse, which harms only machines. They are normally set to detonate when the mine detects a mech or other machine moving within a meter. Each mine can only be used once. The profile for an EMP Mine can be found in the Military Weapons Table at the start of this section. Non-robot characters cannot suffer Injury from EMP Mines. An Atoma device produces these mines in batches of three.","targetRestriction":"Non-robot characters cannot suffer Injury from this weapon."},{"id":"fragmentation-grenades","name":"Fragmentation Grenades","category":"weapon","techLevel":3,"atomaCategory":"Military","type":"Ranged","injury":"Shrapnel","injuryCount":2,"damage":3,"qualities":["Burst","Loud"],"quantity":3,"cost":5,"rarity":4,"bookPage":142,"pdfPage":14,"description":"Single-use explosive grenades that create a concussive blast and spray shrapnel. Produced in batches of three.","fullDescription":"These grenades contain a powerful explosive compound, producing a concussive blast and a shower of high-speed shrapnel. Each grenade can only be used once. The profile for an Explosive Grenade can be found in the Military Weapons Table at the start of this section. An Atoma device produces these grenades in batches of three."},{"id":"flamethrower","name":"Flamethrower","category":"weapon","techLevel":3,"atomaCategory":"Military","type":"Ranged","injury":"Burns","damage":4,"qualities":["Burst","Powered (Bed)","Scary"],"cost":4,"rarity":4,"bookPage":142,"pdfPage":14,"description":"Weapon that sprays ignited chemical fuel; Atoma-made versions refill the propellant over time.","fullDescription":"A weapon which sprays an ignited chemical fuel over a target. Atoma-made models contain a self-filling reservoir that synthesizes the propellant slowly over time. While restricted to Military Atoma devices, the majority of these weapons are used to clear invasive foliage, melt ice and snow, and to create firebreaks to prevent the spread of uncontrolled forest fires, rather than in actual combat. The profile for the Flamethrower can be found in the Military Weapons Table at the start of this section. A Flamethrower is a powered weapon, which recharges after a Bed rest.","rulesNote":"The weapon table omits Powered, but the item description states it is powered and recharges after a Bed rest.","situationalEffects":[{"id":"scary-social-reaction","type":"socialContext","appliesWhen":"equipped","attributeKeys":["resolve"],"skillKeys":["talk"],"label":"Scary: affects reactions","rulesText":"Powerful, intimidating, and overkill against most foes. Carrying or wearing it affects how people react to you both in and out of combat.","source":"quality:Scary"}]},{"id":"plasma-beamer","name":"Plasma Beamer","category":"weapon","techLevel":4,"atomaCategory":"Military","type":"Ranged","injury":"Plasma Burn","damage":4,"qualities":["Long-Ranged","Powered (Bed)","Breaker","Scary"],"cost":6,"rarity":4,"bookPage":143,"pdfPage":15,"description":"Long-ranged plasma weapon for striking distant armored targets.","fullDescription":"A long-ranged form of military plasma weapon, these guns propel an intense bolt of high-energy plasma along an ionized path, or 'beam,' allowing them to strike distant targets effectively without the plasma dispersing. These weapons were used for destroying armored targets such as combat mechs and vehicles. The profile for the Plasma Beamer can be found in the Military Weapons Table at the start of this section. A Plasma Beamer is a powered weapon, which recharges after a Bed rest.","situationalEffects":[{"id":"scary-social-reaction","type":"socialContext","appliesWhen":"equipped","attributeKeys":["resolve"],"skillKeys":["talk"],"label":"Scary: affects reactions","rulesText":"Powerful, intimidating, and overkill against most foes. Carrying or wearing it affects how people react to you both in and out of combat.","source":"quality:Scary"}]},{"id":"plasma-grenades","name":"Plasma Grenades","category":"weapon","techLevel":4,"atomaCategory":"Military","type":"Ranged","injury":"Plasma Burn","injuryCount":2,"damage":3,"qualities":["Ammo","Burst","Breaker","Loud","Scary"],"quantity":3,"cost":6,"rarity":4,"bookPage":143,"pdfPage":15,"description":"Single-use grenades that release a burst of high-energy plasma. Produced in batches of three.","fullDescription":"These grenades generate a burst of high-energy plasma that burns everything in the immediate vicinity. They were often used for sabotage and demolitions, as the intense plasma could burn through most materials. Each grenade can only be used once. The profile for a Plasma Grenade can be found in the Military Weapons Table at the start of this section. An Atoma device produces these grenades in batches of three.","situationalEffects":[{"id":"scary-social-reaction","type":"socialContext","appliesWhen":"equipped","attributeKeys":["resolve"],"skillKeys":["talk"],"label":"Scary: affects reactions","rulesText":"Powerful, intimidating, and overkill against most foes. Carrying or wearing it affects how people react to you both in and out of combat.","source":"quality:Scary"}]},{"id":"plasma-mines","name":"Plasma Mines","category":"weapon","techLevel":4,"atomaCategory":"Military","type":"Ranged","injury":"Plasma Burn","injuryCount":2,"damage":4,"qualities":["Ammo","Burst","Breaker","Loud","Mine"],"quantity":3,"cost":6,"rarity":4,"bookPage":143,"pdfPage":15,"description":"Placed plasma charges set to trigger when someone passes nearby. Produced in batches of three.","fullDescription":"These mines generate a burst of high-energy plasma that burns everything in the immediate vicinity. They were often used to defeat heavy mechs and heavy vehicles, as the intense plasma could burn through most materials. They are set to trigger when someone passes within a meter. Each mine can only be used once. The profile for a Plasma Mine can be found in the Military Weapons Table at the start of this section. An Atoma device produces these mines in batches of three."},{"id":"plasma-mortar","name":"Plasma Mortar","category":"weapon","techLevel":5,"atomaCategory":"Military","type":"Ranged","injury":"Plasma Burn","injuryCount":2,"damage":4,"qualities":["Burst","Breaker","Long-Ranged","Loud","Powered (Special)","Heavy","Scary"],"cost":7,"rarity":5,"bookPage":144,"pdfPage":16,"description":"Heavy artillery-like plasma weapon requiring a generator or similar active power source.","fullDescription":"A heavy plasma weapon with devastating effects. This weapon uses an offshoot of nanogram field technology to project a magnetic 'bubble' which compresses a mass of plasma into an extremely small space. This bubble is propelled towards the target, collapsing moments before impact, allowing the plasma to expand explosively over a wide area. More akin to a small artillery piece than an infantry weapon, a plasma mortar requires a massive amount of power to operate. Conventional kinetic batteries alone cannot store enough charge. The profile for the Plasma Mortar can be found in the Military Weapons Table at the start of this section. A Plasma Mortar is a powered weapon, requiring an active power supply, a generator or similar, to operate.","situationalEffects":[{"id":"scary-social-reaction","type":"socialContext","appliesWhen":"equipped","attributeKeys":["resolve"],"skillKeys":["talk"],"label":"Scary: affects reactions","rulesText":"Powerful, intimidating, and overkill against most foes. Carrying or wearing it affects how people react to you both in and out of combat.","source":"quality:Scary"}]},{"id":"plasma-repeater","name":"Plasma Repeater","category":"weapon","techLevel":4,"atomaCategory":"Military","type":"Ranged","injury":"Plasma Burn","damage":3,"qualities":["Burst","Breaker","Powered (Break)","Scary"],"cost":6,"rarity":4,"bookPage":144,"pdfPage":16,"description":"Rapid-firing plasma weapon used against armored targets at moderate range.","fullDescription":"The most common form of military plasma weapon, these guns propel bolts of high-energy plasma. The weapon has a relatively high rate of fire, able to produce several bolts in quick succession, but their effective range is limited. These weapons were used for destroying armored targets such as combat mechs and vehicles. The profile for the Plasma Repeater can be found in the Military Weapons Table at the start of this section. A Plasma Repeater is a powered weapon, which recharges after a Bed rest.","rulesNote":"The weapon table lists Powered (Break); the item description says it recharges after a Bed rest.","situationalEffects":[{"id":"scary-social-reaction","type":"socialContext","appliesWhen":"equipped","attributeKeys":["resolve"],"skillKeys":["talk"],"label":"Scary: affects reactions","rulesText":"Powerful, intimidating, and overkill against most foes. Carrying or wearing it affects how people react to you both in and out of combat.","source":"quality:Scary"}]},{"id":"salvo-launcher","name":"Salvo Launcher","category":"weapon","techLevel":5,"atomaCategory":"Military","type":"Ranged","damageOptions":[{"mode":"Concussion","injury":"Concussed","injuryCount":3,"damage":2,"qualities":["Burst","Long-Ranged","Loud","Powered (Special)","Heavy"]},{"mode":"EMP","injury":"Overloaded","injuryCount":3,"damage":2,"qualities":["Burst","Breaker","Long-Ranged","Loud","Powered (Special)","Heavy"]},{"mode":"Fusion","injury":"Burned","injuryCount":3,"damage":2,"qualities":["Burst","Breaker","Long-Ranged","Loud","Powered (Special)","Heavy"]},{"mode":"Flechette","injury":"Lacerated","injuryCount":3,"damage":2,"qualities":["Burst","Long-Ranged","Loud","Powered (Special)","Heavy"]}],"qualities":["Powered (Special)","Heavy"],"cost":7,"rarity":5,"bookPage":145,"pdfPage":17,"description":"Vehicle, mech, or emplacement missile pod that fabricates multiple missile types. Requires an Atoma cube and active power source.","fullDescription":"A heavy weapon found mounted on vehicles, heavy mechs, and static emplacements, the Salvo Launcher is a rapid-firing multiple-missile launch pod which nano-fabricates a variety of missiles to use against an assortment of different types of target. These weapons require an Atoma cube to fabricate the ammunition, in addition to a large power supply. Sometimes called 'Weavers' Wrath,' as the weapon system responds well to the skills and lore of a Weaver. A Salvo Launcher has several profiles, depending on which missiles are being fired, which can be found in the Military Weapons Table at the start of this section. It takes an action to switch between missile types unless the user has a reader lens or tactical lens. A Salvo Launcher may be fired directly, or if the user has a reader lens or tactical lens, it may be guided, allowing the attack to seek the target even if they are not currently visible, or one d20 on the attack to be re-rolled. A Salvo Launcher is a powered weapon, requiring an active power supply, a generator or similar, to operate."},{"id":"thermal-blade","name":"Thermal Blade","category":"weapon","techLevel":4,"atomaCategory":"Military","type":"Melee","injury":"Cauterized","damage":4,"qualities":["Breaker","Powered (Bed)","Scary"],"cost":6,"rarity":3,"bookPage":148,"pdfPage":20,"description":"Heated cutting weapon that can slice or melt through hard substances and armor plating.","fullDescription":"This weapon appears to be an unusual form of sword, spear, or another cutting melee weapon. When activated, however, the blade heats up considerably, allowing it to cut and melt through harder substances and even armor plating. The heating elements on the blade glow when in use, though shielding technology in the hilt means that the heat does not affect the user or anyone not within a centimeter or so of the blade's edge. The profile for the Thermal Blade can be found in the Military Weapons Table at the start of this section. A Thermal Blade is a powered weapon, which recharges after a Bed rest.","situationalEffects":[{"id":"scary-social-reaction","type":"socialContext","appliesWhen":"equipped","attributeKeys":["resolve"],"skillKeys":["talk"],"label":"Scary: affects reactions","rulesText":"Powerful, intimidating, and overkill against most foes. Carrying or wearing it affects how people react to you both in and out of combat.","source":"quality:Scary"}]},{"id":"combat-armor-tl3","name":"Combat Armor (Tech Level 3)","category":"armor","techLevel":3,"atomaCategory":"Security","qualities":["Bulky","Scary"],"protection":4,"breakerProtection":2,"cost":5,"rarity":3,"bookPage":150,"pdfPage":22,"description":"Hard polymer plates over heat-resistant and insulated bodysuit; effective against most weapons but bulky and intimidating.","fullDescription":"In the years before the war, due to the prevalence of directed energy weapons, the typical forms of combat armor were normally made of hard polymer plates over a heat-resistant, electrically-insulated flexible bodysuit. This armor, while bulky and sometimes cumbersome, provides excellent protection against most weapons; someone wearing it is often assumed to be a person looking for trouble. Tech Level 3 Combat Armor is Armor which provides Protection of 4. This Protection is reduced to half, rounding up, by attacks with the breaker keyword. The armor is bulky and scary.","situationalEffects":[{"id":"bulky-threat-move-difficulty","type":"difficultyModifier","appliesWhen":"equipped","attributeKeys":["quickness"],"skillKeys":["move"],"modifier":1,"label":"Bulky: GM may hinder Move","rulesText":"The Game Master may spend 1 Threat to add 1 Difficulty when you make Quickness (Move) tests while wearing this armor.","source":"quality:Bulky"},{"id":"scary-social-reaction","type":"socialContext","appliesWhen":"equipped","attributeKeys":["resolve"],"skillKeys":["talk"],"label":"Scary: affects reactions","rulesText":"Powerful, intimidating, and overkill against most foes. Carrying or wearing it affects how people react to you both in and out of combat.","source":"quality:Scary"}]},{"id":"combat-armor-tl4","name":"Combat Armor (Tech Level 4)","category":"armor","techLevel":4,"atomaCategory":"Security","qualities":["Bulky","Scary"],"protection":5,"breakerProtection":3,"cost":6,"rarity":4,"bookPage":150,"pdfPage":22,"description":"Hard polymer plates over heat-resistant and insulated bodysuit; effective against most weapons but bulky and intimidating.","fullDescription":"In the years before the war, due to the prevalence of directed energy weapons, the typical forms of combat armor were normally made of hard polymer plates over a heat-resistant, electrically-insulated flexible bodysuit. This armor, while bulky and sometimes cumbersome, provides excellent protection against most weapons; someone wearing it is often assumed to be a person looking for trouble. Tech Level 4 Combat Armor provides Protection 5. This Protection is reduced to half, rounding up, by attacks with the breaker keyword. The armor is bulky and scary.","situationalEffects":[{"id":"bulky-threat-move-difficulty","type":"difficultyModifier","appliesWhen":"equipped","attributeKeys":["quickness"],"skillKeys":["move"],"modifier":1,"label":"Bulky: GM may hinder Move","rulesText":"The Game Master may spend 1 Threat to add 1 Difficulty when you make Quickness (Move) tests while wearing this armor.","source":"quality:Bulky"},{"id":"scary-social-reaction","type":"socialContext","appliesWhen":"equipped","attributeKeys":["resolve"],"skillKeys":["talk"],"label":"Scary: affects reactions","rulesText":"Powerful, intimidating, and overkill against most foes. Carrying or wearing it affects how people react to you both in and out of combat.","source":"quality:Scary"}]},{"id":"environment-suit-tl2","name":"Environment Suit (Tech Level 2)","category":"armor","techLevel":2,"atomaCategory":"Industrial","qualities":["Bulky","Environment"],"protection":1,"breakerProtection":0,"cost":3,"rarity":2,"bookPage":150,"pdfPage":22,"description":"Sealed suit with filters for gas, dust, radiation, smoke, fumes, and similar hazards.","fullDescription":"Sealed suits with air filters, designed to protect against contaminated atmospheres: environments filled with toxic gas or dust, with radiation, smoke, hazardous fumes, and similar dangers. They provide relatively little physical protection, but are useful for avoiding the worst of toxic environments, so they are prized by Grabbers and other explorers. More advanced versions have powered filter pumps that are far more effective. Tech Level 2 Environment Suits are Armor which provide Protection of 1. This Protection is reduced to 0 by attacks with the breaker keyword. The armor has the environment keyword. The Tech Level 2 version is bulky.","situationalEffects":[{"id":"environment-hazard-resistance-difficulty","type":"difficultyModifier","appliesWhen":"equipped","attributeKeys":["might","quickness","resolve"],"skillKeys":["survive","move"],"modifier":-1,"label":"Environment: easier hazard resistance","rulesText":"Reduce Difficulty by 1 to avoid or resist gas, toxic dust, smoke, chemical fumes, and similar hazards. Powered versions reduce it by 2.","source":"quality:Environment"},{"id":"bulky-threat-move-difficulty","type":"difficultyModifier","appliesWhen":"equipped","attributeKeys":["quickness"],"skillKeys":["move"],"modifier":1,"label":"Bulky: GM may hinder Move","rulesText":"The Game Master may spend 1 Threat to add 1 Difficulty when you make Quickness (Move) tests while wearing this armor.","source":"quality:Bulky"}]},{"id":"environment-suit-tl3","name":"Environment Suit (Tech Level 3)","category":"armor","techLevel":3,"atomaCategory":"Industrial","qualities":["Powered (Break)","Environment"],"protection":2,"breakerProtection":0,"cost":4,"rarity":3,"bookPage":150,"pdfPage":22,"description":"Sealed suit with filters for gas, dust, radiation, smoke, fumes, and similar hazards.","fullDescription":"Sealed suits with air filters, designed to protect against contaminated atmospheres: environments filled with toxic gas or dust, with radiation, smoke, hazardous fumes, and similar dangers. They provide relatively little physical protection, but are useful for avoiding the worst of toxic environments, so they are prized by Grabbers and other explorers. More advanced versions have powered filter pumps that are far more effective. Tech Level 3 Environment Suits provide Protection 2. This Protection is reduced to 0 by attacks with the breaker keyword. The armor has the environment keyword. The Tech Level 3 version is powered, and recharges after a Break rest.","situationalEffects":[{"id":"environment-hazard-resistance-difficulty","type":"difficultyModifier","appliesWhen":"equipped","attributeKeys":["might","quickness","resolve"],"skillKeys":["survive","move"],"modifier":-1,"label":"Environment: easier hazard resistance","rulesText":"Reduce Difficulty by 1 to avoid or resist gas, toxic dust, smoke, chemical fumes, and similar hazards. Powered versions reduce it by 2.","source":"quality:Environment"}]},{"id":"heavy-armor-tl3","name":"Heavy Armor (Tech Level 3)","category":"armor","techLevel":3,"atomaCategory":"Military","qualities":["Environment","Powered (Bed)","Scary"],"protection":5,"breakerProtection":3,"cost":6,"rarity":4,"bookPage":150,"pdfPage":22,"description":"Bulky powered combat armor with reinforced plates, self-repairing layers, and assisted movement.","fullDescription":"A bulky suit of hard combat armor, worn over a padded undersuit. The armor plates and ablative layers are reinforced by a nanotech self-repair mechanism that allows the armor to remain effective even during intensive combat. The armor contains servomotors to assist the wearer with movement, and the Tech Level 4 version even contains limited anti-grav suspensors designed to offset the weight of the armor, granting enhanced mobility. Someone wearing heavy armor is expecting heavy fighting, and is best avoided. Tech Level 3 Heavy Armor is Armor which provides Protection of 5. This Protection is reduced to half, rounding up, by attacks with the breaker keyword. Heavy Armor is a powered item, which recharges after a Bed rest. It is also scary.","situationalEffects":[{"id":"environment-hazard-resistance-difficulty","type":"difficultyModifier","appliesWhen":"equipped","attributeKeys":["might","quickness","resolve"],"skillKeys":["survive","move"],"modifier":-1,"label":"Environment: easier hazard resistance","rulesText":"Reduce Difficulty by 1 to avoid or resist gas, toxic dust, smoke, chemical fumes, and similar hazards. Powered versions reduce it by 2.","source":"quality:Environment"},{"id":"scary-social-reaction","type":"socialContext","appliesWhen":"equipped","attributeKeys":["resolve"],"skillKeys":["talk"],"label":"Scary: affects reactions","rulesText":"Powerful, intimidating, and overkill against most foes. Carrying
