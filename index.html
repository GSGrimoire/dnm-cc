function normalizeInventoryEntries() {
  const c = state.character;
  if (!Array.isArray(c.items)) c.items = [];
  c.items = c.items
    .filter(entry => entry && entry.id)
    .map(entry => ({
      id: entry.id,
      qty: Math.max(1, parseInt(entry.qty, 10) || 1),
      equipped: !!entry.equipped,
      discharged: !!entry.discharged
    }));
}

function getEquippedItemEntries() {
  normalizeInventoryEntries();
  return (state.character.items || [])
    .filter(entry => entry.equipped)
    .map(entry => ({ entry, item: getItemById(entry.id) }))
    .filter(x => x.item);
}

function getItemEquipEffects(item) {
  return Array.isArray(item?.equipEffects) ? item.equipEffects : [];
}

function getItemSituationalEffects(item) {
  return Array.isArray(item?.situationalEffects) ? item.situationalEffects : [];
}

function getItemActions(item) {
  return Array.isArray(item?.itemActions) ? item.itemActions : [];
}

function getEquippedResourceModifier(resource, property = 'max') {
  return getEquippedItemEntries().reduce((sum, { item }) => {
    return sum + getItemEquipEffects(item)
      .filter(effect =>
        effect.type === 'resourceModifier' &&
        effect.appliesWhen === 'equipped' &&
        effect.resource === resource &&
        effect.property === property &&
        effect.operation === 'add'
      )
      .reduce((inner, effect) => inner + (Number(effect.value) || 0), 0);
  }, 0);
}

function getResourceModifierSources(resource, property = 'max') {
  const sources = [];
  getEquippedItemEntries().forEach(({ item }) => {
    getItemEquipEffects(item)
      .filter(effect =>
        effect.type === 'resourceModifier' &&
        effect.appliesWhen === 'equipped' &&
        effect.resource === resource &&
        effect.property === property &&
        effect.operation === 'add'
      )
      .forEach(effect => sources.push({ item, effect }));
  });
  return sources;
}

function effectAppliesToAttribute(effect, attr) {
  return Array.isArray(effect.attributeKeys) && effect.attributeKeys.includes(attr);
}

function effectAppliesToSkill(effect, skill) {
  return Array.isArray(effect.skillKeys) && effect.skillKeys.includes(skill);
}

function getEquippedSituationalEffectsForAttribute(attr) {
  const matches = [];
  getEquippedItemEntries().forEach(({ item }) => {
    getItemSituationalEffects(item)
      .filter(effect => effect.appliesWhen === 'equipped' && effectAppliesToAttribute(effect, attr))
      .forEach(effect => matches.push({ item, effect }));
  });
  return matches;
}

function getEquippedSituationalEffectsForSkill(skill) {
  const matches = [];
  getEquippedItemEntries().forEach(({ item }) => {
    getItemSituationalEffects(item)
      .filter(effect => effect.appliesWhen === 'equipped' && effectAppliesToSkill(effect, skill))
      .forEach(effect => matches.push({ item, effect }));
  });
  return matches;
}

function getEquippedSituationalEffectsForRoll(attr, skill) {
  const matches = [];
  getEquippedItemEntries().forEach(({ item }) => {
    getItemSituationalEffects(item)
      .filter(effect => effect.appliesWhen === 'equipped')
      .filter(effect => {
        const attrMatch = !Array.isArray(effect.attributeKeys) || !effect.attributeKeys.length || effect.attributeKeys.includes(attr);
        const skillMatch = !Array.isArray(effect.skillKeys) || !effect.skillKeys.length || effect.skillKeys.includes(skill);
        return attrMatch && skillMatch;
      })
      .forEach(effect => matches.push({ item, effect }));
  });
  return matches;
}

function renderEffectTooltipNotes(matches) {
  if (!matches.length) return '';
  return `<div style="margin-top:8px;color:var(--warning);">Equipped item notes:</div><ul>${matches.map(({ item, effect }) => `<li><strong>${escHtml(item.name)}:</strong> ${escHtml(effect.label || effect.rulesText || '')}</li>`).join('')}</ul>`;
}

function renderDiceContextNotes(attr, skill) {
  const matches = getEquippedSituationalEffectsForRoll(attr, skill);
  if (!matches.length) return '';
  return `<div class="dice-context-notes">
    <strong>Applicable Equipped Item Notes</strong>
    ${matches.map(({ item, effect }) => `<div>◆ <strong>${escHtml(item.name)}:</strong> ${escHtml(effect.rulesText || effect.label || '')}</div>`).join('')}
  </div>`;
}

function renderItemEffectNotes(item) {
  const parts = [];
  getItemEquipEffects(item).forEach(effect => {
    parts.push(`<div class="owned-description"><strong>Equipped effect:</strong> ${escHtml(effect.rulesText || effect.label || '')}</div>`);
  });
  getItemSituationalEffects(item).forEach(effect => {
    parts.push(`<div class="owned-description"><strong>Situational:</strong> ${escHtml(effect.rulesText || effect.label || '')}</div>`);
  });
  getItemActions(item).forEach(action => {
    parts.push(`<div class="owned-description"><strong>Manual action:</strong> ${escHtml(action.rulesText || action.label || '')}</div>`);
  });
  if (!parts.length) return '';
  return `<div class="owned-effect-list">${parts.join('')}</div>`;
}

function renderResourceBonusBreakdown(resource) {
  const sources = getResourceModifierSources(resource, 'max');
  if (!sources.length) return '';
  const total = sources.reduce((sum, s) => sum + (Number(s.effect.value) || 0), 0);
  return `<div class="resource-breakdown">EQUIPPED +${total}: ${sources.map(s => escHtml(s.item.name)).join(', ')}</div>`;
}

  if (!Array.isArray(c.truths)) c.truths = ['', ''];

// ============================================================
// AUTO-GROWING TEXT LISTS (v1.09)
// ------------------------------------------------------------
// Injuries shipped in v1.08 with a "type in the blank row and a new blank row appears"
// behavior. v1.09 needs the same behavior for Custom Items and Knowledge Fragments, so
// the pattern is generalized here instead of being copied three times. Truths are NOT
// on this system: they keep an explicit Create Truth button because a Truth is created
// by a deliberate game action, not by drifting into an empty field.
//
// Contract: state.character[field] holds only non-empty strings. The trailing blank row
// is a render artifact, not stored data, which is why compactAutoList runs on render.
// ============================================================
const AUTO_LIST_FIELDS = {
  injuries: { placeholder: 'Add Injury or treated Injury...', label: 'Injury' },
  customItems: { placeholder: 'Add a custom item...', label: 'Custom Item' },
  knowledgeFragments: { placeholder: 'Add a Knowledge Fragment...', label: 'Knowledge Fragment' }
};

function compactAutoList(field) {
  normalizeEditableLists();
  state.character[field] = (state.character[field] || []).filter(x => String(x || '').trim());
}

function updateAutoList(field, index, value) {
  normalizeEditableLists();
  state.character[field][index] = value;
  saveCharacterLocal(true);
}

function removeAutoList(field, index) {
  normalizeEditableLists();
  state.character[field].splice(index, 1);
  saveCharacterLocal(true);
  renderAll();
}

// scrollClass lets the caller cap the height of a list that has to sit inside a fixed
// grid cell (Knowledge Fragments in the Resources row) without capping the others.
function renderAutoGrowList(field, scrollClass = '', showRemove = true) {
  compactAutoList(field);
  const cfg = AUTO_LIST_FIELDS[field] || { placeholder: 'Add...', label: 'Entry' };
  const entries = state.character[field];
  const visible = [...entries, ''];
  const rows = visible.map((entry, i) => {
    const isBlank = i >= entries.length;
    return `<div class="editable-line-row">
      <input class="dm-input inline-sheet-input" value="${escHtml(entry || '')}" placeholder="${isBlank ? escHtml(cfg.placeholder) : escHtml(cfg.label) + ' ' + (i + 1)}" oninput="updateAutoList('${field}', ${i}, this.value)" onchange="renderAll()">
      ${!isBlank && showRemove ? `<button class="mini-btn danger no-print" onclick="removeAutoList('${field}', ${i})">Remove</button>` : ''}
    </div>`;
  });
  return `<div class="editable-sheet-list ${scrollClass}">${rows.join('')}</div>`;
}

function updateTruth(index, value) {
  normalizeEditableLists();
  state.character.truths[index] = value;
  saveCharacterLocal(true);
}

function addTruthField() {
  normalizeEditableLists();
  state.character.truths.push('');
  saveCharacterLocal(true);
  renderAll();
}

function removeTruthField(index) {
  normalizeEditableLists();
  if (state.character.truths.length <= 2) {
    state.character.truths[index] = '';
  } else {
    state.character.truths.splice(index, 1);
  }
  saveCharacterLocal(true);
  renderAll();
}

// v1.09: injuries now run on the shared auto-list system. These wrappers are kept so
// that any older inline handler still in the wild resolves rather than throwing.
function updateInjury(index, value) { updateAutoList('injuries', index, value); }
function removeInjuryField(index) { removeAutoList('injuries', index); }
function compactInjuryList() { compactAutoList('injuries'); }

// v1.10: the tooltip used to print the type label twice ("Archetype / Archetype"),
// which told the reader nothing they could not already see on the tag. It now carries
// the origin / archetype / temperament description from DM_DATA. The desc span is
// omitted entirely when no description exists, rather than rendering an empty box,
// so the tooltip degrades to a bare title instead of a title over blank space.
function renderSheetTagTooltip(label, typeLabel, desc) {
  const descHtml = desc ? `<span class="dm-tip-desc">${escHtml(desc)}</span>` : '';
  return `<div class="sheet-tag dm-tip" tabindex="0">${escHtml(label)}<span class="dm-tip-body"><span class="dm-tip-title">${escHtml(typeLabel)}</span>${descHtml}</span></div>`;
}

function renderEditableTruths() {
  normalizeEditableLists();
  const truths = state.character.truths;
  const visibleCount = Math.max(2, truths.length);
  const rows = [];
  for (let i = 0; i < visibleCount; i++) {
    rows.push(`<div class="editable-line-row">
      <input class="dm-input inline-sheet-input" value="${escHtml(truths[i] || '')}" placeholder="Truth ${i + 1}" oninput="updateTruth(${i}, this.value)">
      <button class="mini-btn danger no-print" onclick="removeTruthField(${i})">Remove</button>
    </div>`);
  }
  return `<div class="editable-sheet-list">
    ${rows.join('')}
    <button class="mini-btn no-print" onclick="addTruthField()">Create Truth</button>
  </div>`;
}

function renderEditableInjuries() {
  compactAutoList('injuries');
  const entries = state.character.injuries;
  const visible = [...entries, ''];
  const activeRows = visible.map((entry, i) => {
    const isBlank = i >= entries.length;
    return `<div class="editable-line-row injury-line-row">
      <input class="dm-input inline-sheet-input" value="${escHtml(entry || '')}" placeholder="${isBlank ? 'Add Injury or treated Injury...' : 'Injury ' + (i + 1)}" oninput="updateInjury(${i}, this.value)" onchange="renderAll()">
      ${!isBlank ? `<button class="mini-btn heal-btn no-print" onclick="confirmClick(this, () => healInjury(${i}), 'Heal?')">Heal</button>
      <button class="mini-btn danger no-print" onclick="removeInjuryField(${i})">Remove</button>` : ''}
    </div>`;
  }).join('');

  const healed = state.character.healedInjuries || [];
  const healedRows = healed.length
    ? healed.map((injury, i) => `<div class="healed-injury-row">
        <span class="healed-injury-text">${escHtml(injury)}</span>
        <button class="mini-btn no-print" onclick="reopenHealedInjury(${i})">Reopen</button>
      </div>`).join('')
    : '<div class="healed-injuries-empty">No healed Injuries.</div>';

  return `<div class="editable-sheet-list">${activeRows}</div>
    <details class="healed-injuries">
      <summary>Healed Injuries <span>${healed.length}</span></summary>
      <div class="healed-injuries-list">${healedRows}</div>
    </details>`;
}

function healInjury(index) {
  normalizeEditableLists();
  const injury = String(state.character.injuries[index] || '').trim();
  if (!injury) return;
  state.character.injuries.splice(index, 1);
  state.character.healedInjuries.push(injury);
  saveCharacterLocal(true);
  renderAll();
  showToast(`${injury} moved to Healed Injuries.`, 'success');
}

function reopenHealedInjury(index) {
  normalizeEditableLists();
  const injury = String(state.character.healedInjuries[index] || '').trim();
  if (!injury) return;
  state.character.healedInjuries.splice(index, 1);
  state.character.injuries.push(injury);
  saveCharacterLocal(true);
  renderAll();
  showToast(`${injury} returned to active Injuries.`, 'warning');
}

// COMPUTED STATS
// ============================================================
function computeStats() {
  const c = state.character;
  if (!c.origin || !c.archetype) return null;

  const originData = DM_DATA.origins[c.origin];
  const archetypeData = DM_DATA.archetypes[c.archetype] || DM_DATA.advancedArchetypes[c.archetype];

  // Base attributes from origin
  const attrs = { ...originData.attributes };

  // Origin attr boosts
  if (c.origin === 'everan' && c.originAttrBoosts.length) {
    c.originAttrBoosts.forEach(a => { attrs[a] = Math.min(attrs[a] + 1, 7); });
  }
  if (c.origin === 'spear' && c.originAttrBoostChoice) {
    attrs[c.originAttrBoostChoice] = 8;
  }

  // Archetype attr distribution
  if (c.archetypeAttrDistribution && archetypeData.attributeBonus) {
    const dist = archetypeData.attributeBonus.distribution;
    c.archetypeAttrChoice.forEach((attr, i) => {
      if (attr && dist[i]) attrs[attr] = (attrs[attr] || 0) + dist[i];
    });
  }

  // Temperament attr boosts
  if (c.temperament) {
    const tempData = DM_DATA.temperaments[c.temperament];
    if (tempData.attributeBonus.forced) attrs[tempData.attributeBonus.forced] = (attrs[tempData.attributeBonus.forced] || 0) + 1;
    if (c.temperamentAttrBoost) attrs[c.temperamentAttrBoost] = (attrs[c.temperamentAttrBoost] || 0) + 1;
  }

  // Growth attr increases
  (c.growthAttrIncreases || []).forEach(inc => {
    attrs[inc.attr] = (attrs[inc.attr] || 0) + 1;
  });

  // Base skills from origin
  const skills = { ...originData.skills };

  // Archetype skill distribution
  if (archetypeData.skillBonus) {
    const dist = archetypeData.skillBonus.distribution;
    c.archetypeSkillChoice.forEach((skill, i) => {
      if (skill && dist[i] != null) skills[skill] = (skills[skill] || 0) + dist[i];
    });
  }

  // Temperament skill boost
  if (c.temperamentSkillBoost) {
    skills[c.temperamentSkillBoost] = (skills[c.temperamentSkillBoost] || 0) + 1;
  }

  // Growth skill increases
  (c.growthSkillIncreases || []).forEach(inc => {
    skills[inc.skill] = Math.min((skills[inc.skill] || 0) + 1, 6);
  });

  // Tech level
  let techLevel = originData.techLevel + (archetypeData.techBonus || 0) + (c.growthTechIncreases || 0);

  // Spirit pool: half of resolve (rounded up) + bonuses
  let spiritBase = Math.ceil(attrs.resolve / 2);
  let spiritBonus = (originData.spiritBonus || 0) + (archetypeData.spiritBonus || 0);

  // Temperament doesn't add to spirit pool directly (it adds to attributes)
  let spiritPool = spiritBase + spiritBonus + (c.growthSpiritIncreases || 0);

  // Supply points: operate skill + bonuses + passive equipped item effects
  const baseSupplyPoints = (skills.operate || 1) + (originData.supplyBonus || 0) + (archetypeData.supplyBonus || 0) + (c.growthSupplyIncreases || 0);
  const equippedSupplyBonus = getEquippedResourceModifier('supplyPoints', 'max');
  let supplyPoints = baseSupplyPoints + equippedSupplyBonus;

  // v1.09: the Supply Point reset target is deliberately NARROWER than the maximum.
  // Reset restores Operate + Origin + Archetype only. It excludes Growth-purchased
  // Supply increases and the equipped Handy armor bonus, because reset means "back to
  // what you set out with", not "top up to the current ceiling". The two numbers are
  // identical for a fresh character and only diverge after Growth is spent or Handy
  // armor is equipped, so the distinction matters mid-campaign.
  const startingSupplyPoints = (skills.operate || 1) + (originData.supplyBonus || 0) + (archetypeData.supplyBonus || 0);

  return {
    attrs,
    skills,
    techLevel,
    spiritPool,
    supplyPoints,
    startingSupplyPoints,
    itemBonuses: { supplyPoints: equippedSupplyBonus },
    resourceBreakdown: { supplyPoints: { base: baseSupplyPoints, equipped: equippedSupplyBonus } }
  };
}



function clampNumber(value, min, max) {
  const n = Number.isFinite(Number(value)) ? Number(value) : min;
  return Math.max(min, Math.min(max, Math.floor(n)));
}

function getResourceMaxes() {
  const stats = computeStats();
  return {
    spirit: stats ? stats.spiritPool : 0,
    supply: stats ? stats.supplyPoints : 0,
    coin: 20,
    growth: 10,
    momentum: Number.isFinite(Number(state.character.momentumMax)) ? Number(state.character.momentumMax) : 6
  };
}

// ============================================================
// CONFIRM-COUNTDOWN BUTTONS (v1.09)
// ------------------------------------------------------------
// First click arms the button and starts a 3 second window; a second click inside
// that window commits the action; letting it lapse reverts the button. Modeled on the
// D&D Beyond pattern.
//
// Why this rather than window.confirm(): these buttons sit next to each other in
// clusters (Breather / Break / Bed, or +1 / +2 / +3), a native dialog is modal and
// heavy for an action taken several times per session, and the countdown communicates
// "you can just wait this out" better than a dialog with a Cancel button. It also
// keeps the confirmation on the same control the player already aimed at, which
// matters on touch.
//
// Only one button is armed at a time; arming a second disarms the first. The armed
// state deliberately lives in the DOM rather than in `state`, because it is transient
// UI, not character data, and must not survive a save or a share code.
// ============================================================
const CONFIRM_WINDOW_MS = 3000;
let _armedConfirmBtn = null;
let _armedConfirmTimer = null;
let _armedConfirmInterval = null;

function disarmConfirm() {
  if (_armedConfirmTimer) { clearTimeout(_armedConfirmTimer); _armedConfirmTimer = null; }
  if (_armedConfirmInterval) { clearInterval(_armedConfirmInterval); _armedConfirmInterval = null; }
  const el = _armedConfirmBtn;
  _armedConfirmBtn = null;
  if (!el) return;
  if (el.dataset.originalLabel != null) el.innerHTML = el.dataset.originalLabel;
  delete el.dataset.armed;
  delete el.dataset.originalLabel;
}

// Usage: onclick="confirmClick(this, () => doTheThing())"
// Optional third arg overrides the armed label, e.g. 'Spend 6?'.
function confirmClick(el, fn, armedLabel) {
  if (!el) return;
  if (el.dataset.armed === '1') {
    disarmConfirm();
    fn();
    return;
  }
  disarmConfirm();
  el.dataset.originalLabel = el.innerHTML;
  el.dataset.armed = '1';
  el.style.setProperty('--confirm-ms', CONFIRM_WINDOW_MS + 'ms');
  const confirmLabel = armedLabel || 'Confirm?';
  const startedAt = Date.now();
  const updateCountdown = () => {
    const remaining = Math.max(1, Math.ceil((CONFIRM_WINDOW_MS - (Date.now() - startedAt)) / 1000));
    el.textContent = `${confirmLabel} (${remaining})`;
  };
  updateCountdown();
  _armedConfirmInterval = setInterval(updateCountdown, 200);
  _armedConfirmBtn = el;
  _armedConfirmTimer = setTimeout(() => {
    // A re-render may detach the element, but disarming still clears both timers and
    // prevents a detached button from leaving a live countdown interval behind.
    if (_armedConfirmBtn === el) disarmConfirm();
  }, CONFIRM_WINDOW_MS);
}

// Clicking anywhere else, or pressing Escape, cancels a pending confirmation.
document.addEventListener('click', (e) => {
  if (_armedConfirmBtn && !_armedConfirmBtn.contains(e.target)) disarmConfirm();
}, true);
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && _armedConfirmBtn) disarmConfirm();
});

const RESOURCE_FIELD_MAP = { spirit: 'currentSpirit', supply: 'currentSupply', coin: 'currentCoin', momentum: 'currentMomentum' };

// v1.09: a null Spirit or Supply value means "never established yet", which happens
// while the character is still being built. The pre-finalize sheet preview shows the
// maximum in that case so the review step is not full of zeroes, but nothing is
// written to state until finalize.
function getEffectiveResource(key) {
  const c = state.character;
  const field = RESOURCE_FIELD_MAP[key];
  if (!field) return 0;
  const raw = c[field];
  if (raw != null) return raw;
  const maxes = getResourceMaxes();
  return key === 'spirit' ? maxes.spirit : key === 'supply' ? maxes.supply : 0;
}

// v1.09: called once, on finalize. Only fills fields that are still null, so a player
// who returns to editing mid-campaign keeps whatever Spirit and Supply they had.
// Supply seeds to the STARTING value (Operate + Origin + Archetype), matching the
// reset button, rather than to the equipped-inclusive maximum.
function seedResourcesOnFinalize() {
  const c = state.character;
  const stats = computeStats();
  if (!stats) return;
  if (c.currentSpirit == null) c.currentSpirit = stats.spiritPool;
  if (c.currentSupply == null) c.currentSupply = stats.startingSupplyPoints;
}

// v1.09: restores Supply Points to Operate + Origin + Archetype. Bound to the Reset
// button under the Supply counter.
function resetSupplyPoints() {
  const stats = computeStats();
  if (!stats) return;
  const maxes = getResourceMaxes();
  state.character.currentSupply = clampNumber(stats.startingSupplyPoints, 0, maxes.supply);
  saveCharacterLocal(true);
  renderAll();
  showToast(`Supply Points reset to ${stats.startingSupplyPoints}.`, 'success');
}

// ============================================================
// REST AND RECOVERY (v1.09)
// ------------------------------------------------------------
// Three rest tiers, each restoring a fixed amount of Spirit, clamped to the maximum.
// The tiers are ordered because the powered-item recharge cascade uses the same
// order: a Breather recharges Powered (Breather) items, a Break recharges Breather
// and Break items, and a Bed recharges all three normal recharge tiers.
// ============================================================
const REST_TYPES = {
  breather: {
    key: 'breather', tier: 1, name: 'Breather', spirit: 2,
    desc: 'The most basic form of rest, taking only a few minutes. Characters stop all strenuous activity and may grab a quick bite to eat or some water, check on their gear, look over treated injuries, or check any maps or other information they have. You regain 2 Spirit when you take a breather.'
  },
  break: {
    key: 'break', tier: 2, name: 'Break', spirit: 4,
    desc: 'A more significant rest, taking at least half an hour but no more than about an hour and a half. The group may set a campfire or find somewhere sheltered and comfortable. Some characters may take a quick nap or have a modest meal. Otherwise the same activities as a breather, with more time to do them. You regain 4 Spirit when you take a break.'
  },
  bed: {
    key: 'bed', tier: 3, name: 'Bed', spirit: 6,
    desc: 'An extended rest, taking several hours. Most or all of the group will spend at least some of this time sleeping, preferably somewhere safe and comfortable, with characters taking turns to keep watch in the wilderness. A meal before sleeping or upon waking is common, and most characters strip off heavy or bulky gear like armor while sleeping. You regain 6 Spirit when you go to bed.'
  }
};

const REST_RULE_INFO = {
  name: 'Rest and Recovery',
  desc: 'Characters regain Spirit through resting or sleeping and through eating and drinking. Rather than track all these details separately, recovery is broken into three categories: Breather, Break, and Bed. Each button restores its Spirit, up to your maximum.'
};

// Binary limited-use abilities with an authoritative reset boundary in DM_DATA.
// Nanobarrier is deliberately absent because its escalating Threat cost has no reset
// rule in the current data. GLIF-Pattern Clothing is also absent because its limit is
// per machine, not per character. Treating either as a single used flag would be
// mechanically wrong.
const LIMITED_USE_FEATURES = {
  haggler: {
    name: 'Haggler',
    reset: 'bed',
    readyBadge: 'Resets on Bed',
    usedBadge: 'Used Until Bed'
  },
  justWhatTheyNeed: {
    name: 'Just What They Need',
    reset: 'session',
    readyBadge: 'Once Per Session',
    usedBadge: 'Used This Session'
  },
  iKnowAGuy: {
    name: 'I Know a Guy',
    reset: 'adventure',
    readyBadge: 'Once Per Adventure',
    usedBadge: 'Used This Adventure'
  },
  ambush: {
    name: 'Ambush',
    reset: 'scene',
    readyBadge: 'First Time Each Scene',
    usedBadge: 'Triggered This Scene'
  },
  tough: {
    name: 'Tough',
    reset: 'scene',
    readyBadge: 'First Time Each Scene',
    usedBadge: 'Triggered This Scene'
  }
};

const LIMITED_USE_BOUNDARIES = ['scene', 'breather', 'break', 'bed', 'session', 'adventure'];

function normalizeLimitedUseAbilities() {
  const c = state.character;
  const source = c.limitedUseAbilities && typeof c.limitedUseAbilities === 'object'
    ? c.limitedUseAbilities
    : {};
  const normalized = {};
  LIMITED_USE_BOUNDARIES.forEach(boundary => {
    const values = Array.isArray(source[boundary]) ? source[boundary] : [];
    normalized[boundary] = [...new Set(values.map(String).filter(Boolean))];
  });
  c.limitedUseAbilities = normalized;
  return normalized;
}

function characterHasTalent(key) {
  const c = state.character;
  const starting = Array.isArray(c.talent) ? c.talent : (c.talent ? [c.talent] : []);
  return starting.includes(key) || (c.growthExtraTalents || []).includes(key);
}

function characterHasOriginAbility(key) {
  const c = state.character;
  return c.originAbilityChoice === key || (c.originAbilitiesChoice || []).includes(key);
}

function characterHasLimitedFeature(key) {
  if (key === 'haggler' || key === 'justWhatTheyNeed') return characterHasOriginAbility(key);
  return characterHasTalent(key);
}

function isLimitedFeatureUsed(key) {
  const feature = LIMITED_USE_FEATURES[key];
  if (!feature) return false;
  const limited = normalizeLimitedUseAbilities();
  return limited[feature.reset].includes(key);
}

function markLimitedFeatureUsed(key) {
  const feature = LIMITED_USE_FEATURES[key];
  if (!feature || !characterHasLimitedFeature(key)) return false;
  const limited = normalizeLimitedUseAbilities();
  if (!limited[feature.reset].includes(key)) limited[feature.reset].push(key);
  return true;
}

function limitedUseResetText(reset) {
  return {
    scene: 'End Scene',
    breather: 'a Breather rest',
    break: 'a Break rest',
    bed: 'a Bed rest',
    session: 'New Session',
    adventure: 'New Adventure'
  }[reset] || reset;
}

function useLimitedFeature(key, option = '') {
  const feature = LIMITED_USE_FEATURES[key];
  if (!feature || !characterHasLimitedFeature(key) || isLimitedFeatureUsed(key)) return;

  let detail = '';
  if (key === 'justWhatTheyNeed') {
    const spend = clampNumber(option, 0, 3);
    if (getEffectiveResource('supply') < spend) {
      showToast(`Just What They Need requires ${spend} Supply Point${spend === 1 ? '' : 's'}.`, 'error');
      return;
    }
    state.character.currentSupply = getEffectiveResource('supply') - spend;
    detail = spend
      ? ` Spent ${spend} Supply Point${spend === 1 ? '' : 's'} for an item worth up to ${spend * 2} Coin.`
      : ' No Supply Points were changed.';
  } else if (key === 'iKnowAGuy') {
    if (option === 'momentum') {
      if (getEffectiveResource('momentum') < 2) {
        showToast('I Know a Guy requires 2 Momentum for that option.', 'error');
        return;
      }
      state.character.currentMomentum = getEffectiveResource('momentum') - 2;
      detail = ' Spent 2 Momentum.';
    } else if (option === 'threat') {
      detail = ' Add 2 Threat at the table.';
    } else {
      return;
    }
  }

  if (!markLimitedFeatureUsed(key)) return;
  saveCharacterLocal(true);
  renderAll();
  showToast(`${feature.name} used.${detail} Refreshes with ${limitedUseResetText(feature.reset)}.`, 'success');
}

function clearLimitedUseBoundary(boundary) {
  const limited = normalizeLimitedUseAbilities();
  const ids = [...limited[boundary]];
  limited[boundary] = [];
  return ids.map(id => LIMITED_USE_FEATURES[id]?.name || id);
}

function resetLimitedUseOnRest(restTier) {
  const refreshed = [];
  Object.values(REST_TYPES).forEach(rest => {
    if (rest.tier <= restTier) refreshed.push(...clearLimitedUseBoundary(rest.key));
  });
  return [...new Set(refreshed)];
}

function getRestSpiritAmount(rest) {
  if (!rest) return 0;
  if (!characterHasTalent('wanderer')) return rest.spirit;
  return { breather: 3, break: 6, bed: 9 }[rest.key] || rest.spirit;
}

function showToast(message, type = 'info') {
  if (!message || typeof document === 'undefined' || !document.body) return;
  let stack = document.getElementById('toastStack');
  if (!stack) {
    stack = document.createElement('div');
    stack.id = 'toastStack';
    stack.className = 'toast-stack no-print';
    document.body.appendChild(stack);
  }
  const toast = document.createElement('div');
  toast.className = `sheet-toast ${type}`;
  toast.textContent = message;
  stack.appendChild(toast);
  setTimeout(() => {
    if (toast.parentNode) toast.parentNode.removeChild(toast);
    if (stack && !stack.children.length && stack.parentNode) stack.parentNode.removeChild(stack);
  }, 4200);
}

function getPoweredQuality(item) {
  const quality = (item?.qualities || []).find(q => /^Powered(?: \((Breather|Break|Bed|Special)\))?$/i.test(String(q)));
  if (!quality) return null;
  const match = String(quality).match(/^Powered(?: \((Breather|Break|Bed|Special)\))?$/i);
  const recharge = match && match[1] ? match[1].toLowerCase() : 'continuous';
  return {
    label: quality,
    recharge,
    tier: { breather: 1, break: 2, bed: 3 }[recharge] || null,
    trackDischarge: recharge !== 'continuous'
  };
}

function toggleItemDischarged(id) {
  normalizeInventoryEntries();
  const entry = (state.character.items || []).find(x => x.id === id);
  const item = getItemById(id);
  const powered = getPoweredQuality(item);
  if (!entry || !powered?.trackDischarge) return;
  entry.discharged = !entry.discharged;
  saveCharacterLocal(true);
  renderAll();
  showToast(`${item.name} is now ${entry.discharged ? 'discharged' : 'charged'}.`, entry.discharged ? 'warning' : 'success');
}

function rechargePoweredItems(restTier) {
  normalizeInventoryEntries();
  const recharged = [];
  (state.character.items || []).forEach(entry => {
    if (!entry.discharged) return;
    const item = getItemById(entry.id);
    const powered = getPoweredQuality(item);
    if (!powered?.tier || powered.tier > restTier) return;
    entry.discharged = false;
    recharged.push(item.name);
  });
  return recharged;
}

function takeRest(key) {
  const rest = REST_TYPES[key];
  if (!rest) return;
  const stats = computeStats();
  if (!stats) return;
  const maxes = getResourceMaxes();
  const spiritRestored = getRestSpiritAmount(rest);
  const before = getEffectiveResource('spirit');
  state.character.currentSpirit = clampNumber(before + spiritRestored, 0, maxes.spirit);
  const gained = state.character.currentSpirit - before;
  const recharged = rechargePoweredItems(rest.tier);
  const refreshedAbilities = resetLimitedUseOnRest(rest.tier);
  saveCharacterLocal(true);
  renderAll();
  const rechargeText = recharged.length ? ` Recharged: ${recharged.join(', ')}.` : '';
  const abilityText = refreshedAbilities.length ? ` Refreshed abilities: ${refreshedAbilities.join(', ')}.` : '';
  showToast(`${rest.name}: regained ${gained} Spirit.${rechargeText}${abilityText}`, recharged.length || refreshedAbilities.length ? 'success' : 'info');
  return gained;
}

// End Scene resets once-per-scene actions and scene-length effects only. Resources,
// injuries, Truths, and other character state remain untouched.
function endScene() {
  const refreshed = clearLimitedUseBoundary('scene');
  state.character.oncePerSceneUsed = [];
  state.character.activeSceneEffects = [];
  saveCharacterLocal(true);
  renderAll();
  const names = refreshed.length ? ` Refreshed: ${refreshed.join(', ')}.` : '';
  showToast(`Scene ended. Once-per-scene actions and scene effects are ready again.${names}`, 'success');
}

function startNewSession() {
  const refreshed = [
    ...clearLimitedUseBoundary('scene'),
    ...clearLimitedUseBoundary('session')
  ];
  state.character.oncePerSceneUsed = [];
  state.character.activeSceneEffects = [];
  saveCharacterLocal(true);
  renderAll();
  const names = refreshed.length ? ` Refreshed: ${[...new Set(refreshed)].join(', ')}.` : '';
  showToast(`New session started. Scene and session limits are ready again.${names}`, 'success');
}

function startNewAdventure() {
  const refreshed = [
    ...clearLimitedUseBoundary('scene'),
    ...clearLimitedUseBoundary('session'),
    ...clearLimitedUseBoundary('adventure')
  ];
  state.character.oncePerSceneUsed = [];
  state.character.activeSceneEffects = [];
  saveCharacterLocal(true);
  renderAll();
  const names = refreshed.length ? ` Refreshed: ${[...new Set(refreshed)].join(', ')}.` : '';
  showToast(`New adventure started. Scene, session, and adventure limits are ready again.${names}`, 'success');
}

function renderPlayControls() {
  const restBtns = Object.values(REST_TYPES).map(r => {
    const amount = getRestSpiritAmount(r);
    const wandererNote = amount !== r.spirit ? ` Wanderer increases this recovery to ${amount} Spirit.` : '';
    return `<button class="confirm-btn dm-tip" tabindex="0" onclick="confirmClick(this, () => takeRest('${r.key}'), 'Confirm?')">${escHtml(r.name)} +${amount}<span class="dm-tip-body"><span class="dm-tip-title">${escHtml(r.name)} — regain ${amount} Spirit</span><span class="dm-tip-desc">${escHtml(r.desc + wandererNote)} Powered items and limited-use abilities with a recharge time no longer than this rest are also refreshed.</span></span></button>`;
  }
  ).join('');
  return `<div class="play-controls no-print">
    <div class="play-controls-label dm-tip" tabindex="0">Boundaries &amp; Rest<span class="dm-tip-body"><span class="dm-tip-title">Recovery and Refresh</span><span class="dm-tip-desc">${escHtml(REST_RULE_INFO.desc)} End Scene, New Session, and New Adventure refresh limited-use features at their matching boundaries.</span></span></div>
    <div class="play-controls-buttons">
      <button class="confirm-btn end-scene dm-tip" tabindex="0" onclick="confirmClick(this, () => endScene(), 'Confirm?')">End Scene<span class="dm-tip-body"><span class="dm-tip-title">End Scene</span><span class="dm-tip-desc">Refreshes every once-per-scene action and clears scene-length effects such as Spear's Blend. It does not change Spirit, Momentum, or any other resource.</span></span></button>
      <button class="confirm-btn boundary-control dm-tip" tabindex="0" onclick="confirmClick(this, () => startNewSession(), 'Confirm?')">New Session<span class="dm-tip-body"><span class="dm-tip-title">New Session</span><span class="dm-tip-desc">Refreshes once-per-session and once-per-scene features, and clears scene-length effects. It does not refresh rest- or adventure-limited abilities.</span></span></button>
      <button class="confirm-btn boundary-control dm-tip" tabindex="0" onclick="confirmClick(this, () => startNewAdventure(), 'Confirm?')">New Adventure<span class="dm-tip-body"><span class="dm-tip-title">New Adventure</span><span class="dm-tip-desc">Refreshes once-per-adventure, once-per-session, and once-per-scene features, and clears scene-length effects. It does not substitute for a rest.</span></span></button>
      ${restBtns}
    </div>
  </div>`;
}

// v1.09 BUGFIX — Spirit and Supply Points were permanently seeded to zero.
//
// The v1.08 fault: renderAll() calls normalizeCurrentValues() on every render,
// including at step 0 of character creation. At that point computeStats() returns
// null because there is no Origin or Archetype yet, so getResourceMaxes() reports
// spirit: 0 and supply: 0. The old seeding line `if (c.currentSpirit == null)
// c.currentSpirit = maxes.spirit` therefore wrote 0 into the field on the very first
// render. Because the value was then no longer null, it never re-seeded once Operate
// and Resolve existed, and the clamp on the following line pinned it at 0 forever.
//
// The fix has two halves:
//   1. Never seed and never clamp while stats are unavailable. A null current value
//      means "not yet established", which is different from zero.
//   2. Seed on finalize instead (see seedResourcesOnFinalize), and only into fields
//      that are still null. Returning to editing after play must not overwrite a
//      Spirit or Supply value the character earned or spent at the table.
function normalizeCurrentValues() {
  normalizeInventoryEntries();
  const c = state.character;
  const statsReady = !!computeStats();
  const maxes = getResourceMaxes();
  if (c.currentCoin == null) c.currentCoin = maxes.coin;
  if (c.currentGrowth == null) c.currentGrowth = getGrowthRemaining();
  if (c.currentMomentum == null) c.currentMomentum = 0;
  if (statsReady) {
    // Seeding is gated on `finalized` rather than living in finalizeCharacter() alone,
    // so that imported characters and local loads land here too. It is still a no-op
    // for anything that already holds a value.
    if (c.finalized) seedResourcesOnFinalize();
    if (c.currentSpirit != null) c.currentSpirit = clampNumber(c.currentSpirit, 0, maxes.spirit);
    if (c.currentSupply != null) c.currentSupply = clampNumber(c.currentSupply, 0, maxes.supply);
  }
  c.currentCoin = clampNumber(c.currentCoin, 0, maxes.coin);
  c.currentGrowth = clampNumber(getGrowthRemaining(), 0, maxes.growth);
  c.currentMomentum = clampNumber(c.currentMomentum, 0, maxes.momentum);
  if (!Array.isArray(c.activeExhaustion)) c.activeExhaustion = [];
  if (!Array.isArray(c.oncePerSceneUsed)) c.oncePerSceneUsed = [];
  if (!Array.isArray(c.activeSceneEffects)) c.activeSceneEffects = [];
  normalizeLimitedUseAbilities();
  normalizeEditableLists();
  if (typeof c.portraitUrl !== 'string') c.portraitUrl = '';
}


function sanitizeImageUrl(value) {
  const raw = String(value || '').trim();
  if (!raw) return '';
  try {
    const url = new URL(raw);
    if (url.protocol !== 'http:' && url.protocol !== 'https:') return '';
    return url.href;
  } catch (e) {
    return '';
  }
}

function renderPortraitPreview(url) {
  const safeUrl = sanitizeImageUrl(url);
  if (!safeUrl) return '<div class="portrait-preview empty" id="portraitPreview"><span>No Portrait</span></div>';
  return `<div class="portrait-preview" id="portraitPreview"><img src="${escHtml(safeUrl)}" alt="Character portrait preview" referrerpolicy="no-referrer" onerror="handlePortraitImageError(this, 'portraitPreviewError')"></div>`;
}

function renderSheetPortrait(url) {
  const safeUrl = sanitizeImageUrl(url);
  if (!safeUrl) return '';
  return `<div class="sheet-portrait"><img src="${escHtml(safeUrl)}" alt="Character portrait" referrerpolicy="no-referrer" onerror="this.parentElement.style.display='none';"></div>`;
}

function updatePortraitUrl(value) {
  state.character.portraitUrl = value;
  const safeUrl = sanitizeImageUrl(value);
  const preview = document.getElementById('portraitPreview');
  const error = document.getElementById('portraitUrlError');
  const loadError = document.getElementById('portraitPreviewError');

  if (error) {
    const hasValue = String(value || '').trim().length > 0;
    error.textContent = hasValue && !safeUrl ? 'Use a full http:// or https:// image address.' : '';
  }
  if (loadError) loadError.textContent = '';
  if (!preview) return;

  if (!safeUrl) {
    preview.classList.add('empty');
    preview.innerHTML = '<span>No Portrait</span>';
    return;
  }

  preview.classList.remove('empty');
  preview.innerHTML = `<img src="${escHtml(safeUrl)}" alt="Character portrait preview" referrerpolicy="no-referrer" onerror="handlePortraitImageError(this, 'portraitPreviewError')">`;
}

function clearPortraitUrl() {
  state.character.portraitUrl = '';
  const input = document.getElementById('charPortraitUrl');
  if (input) input.value = '';
  updatePortraitUrl('');
}

function handlePortraitImageError(img, errorId) {
  const frame = img && img.parentElement ? img.parentElement : null;
  if (frame) {
    frame.classList.add('empty');
    frame.innerHTML = '<span>Image Not Loaded</span>';
  }
  const error = document.getElementById(errorId);
  if (error) error.textContent = 'The image could not be loaded. Check that the address points directly to a public image.';
}

// v1.09: footerHtml carries an optional control below the MAX line. Only Supply Points
// uses it so far, for the reset button.
function renderResourceCounter(key, label, current, max, colorStyle = '', noteHtml = '', footerHtml = '') {
  const info = getResourceInfo(key);
  return `<div class="resource-counter dm-tip" tabindex="0">
    <div class="stat-box-label">${escHtml(label)}</div>
    <div class="counter-line no-print">
      <button onclick="adjustResource('${key}',-1)">−</button>
      <input type="number" class="resource-value-input" min="0" max="${max}" value="${current}" onchange="setResource('${key}', this.value)" aria-label="${escHtml(label)} current value">
      <button onclick="adjustResource('${key}',1)">+</button>
    </div>
    <div class="resource-max">MAX ${max}</div>
    ${noteHtml || ''}
    ${footerHtml || ''}
    <div class="dm-tip-body"><div class="dm-tip-title">${escHtml(info.name)}</div><div class="dm-tip-desc">${escHtml(info.desc)}</div></div>
  </div>`;
}

// v1.09: the Knowledge Fragments cell. It sits in the Resources grid but is a list
// rather than a counter, because a fragment is a specific piece of recovered knowledge
// and the identity of each one matters. The list scrolls at a fixed height so the
// Resources row keeps a consistent baseline no matter how many fragments a Weaver
// hoards.
function renderKnowledgeFragmentsCounter() {
  const info = getResourceInfo('knowledgeFragments');
  compactAutoList('knowledgeFragments');
  const count = (state.character.knowledgeFragments || []).length;
  return `<div class="resource-counter kf-counter dm-tip" tabindex="0">
    <div class="stat-box-label">Knowledge Fragments${count ? ` <span style="color:var(--teal);">${count}</span>` : ''}</div>
    ${renderAutoGrowList('knowledgeFragments', 'kf-scroll', false)}
    <div class="dm-tip-body"><div class="dm-tip-title">${escHtml(info.name)}</div><div class="dm-tip-desc">${escHtml(info.desc)}</div></div>
  </div>`;
}

function setResource(key, value) {
  const maxes = getResourceMaxes();
  const map = { spirit: 'currentSpirit', supply: 'currentSupply', coin: 'currentCoin', momentum: 'currentMomentum' };
  if (key === 'growth') {
    const spent = getGrowthSpent();
    const available = clampNumber(value, 0, maxes.growth);
    state.character.growthPool = spent + available;
    state.character.currentGrowth = available;
    saveCharacterLocal(true);
    renderAll();
    return;
  }
  const maxMap = { spirit: maxes.spirit, supply: maxes.supply, coin: maxes.coin, momentum: maxes.momentum };
  if (!map[key]) return;
  state.character[map[key]] = clampNumber(value, 0, maxMap[key]);
  saveCharacterLocal(true);
  renderAll();
}

function adjustResource(key, delta) {
  if (key === 'growth') {
    setResource('growth', getGrowthRemaining() + delta);
    return;
  }
  if (!RESOURCE_FIELD_MAP[key]) return;
  // v1.09: read through getEffectiveResource so that nudging Spirit or Supply on the
  // pre-finalize preview starts from the shown value rather than from null-as-zero.
  setResource(key, getEffectiveResource(key) + delta);
}

function toggleExhaustion(key) {
  const arr = state.character.activeExhaustion || [];
  state.character.activeExhaustion = arr.includes(key) ? arr.filter(x => x !== key) : [...arr, key];
  saveCharacterLocal(true);
  renderAll();
}

function isAttrExhausted(attr) {
  return (state.character.activeExhaustion || []).some(k => DM_DATA.exhaustionTypes[k] && DM_DATA.exhaustionTypes[k].attr === attr);
}

function getAbilities() {
  const c = state.character;
  if (!c.origin) return [];
  const originData = DM_DATA.origins[c.origin];
  const abilities = [];

  // Forced abilities
  Object.entries(originData.specialAbilities || {}).forEach(([key, ab]) => {
    if (ab.forced) abilities.push({ ...ab, key, source: 'origin' });
  });

  // Chosen single ability (everan, spear)
  if (c.originAbilityChoice && originData.specialAbilities[c.originAbilityChoice]) {
    abilities.push({ ...originData.specialAbilities[c.originAbilityChoice], key: c.originAbilityChoice, source: 'origin' });
  }

  // Chosen two abilities (dreamer, river)
  (c.originAbilitiesChoice || []).forEach(key => {
    if (originData.specialAbilities[key]) abilities.push({ ...originData.specialAbilities[key], key, source: 'origin' });
  });

  return abilities;
}

function getGrowthSpent() {
  return state.character.growthPurchases.reduce((sum, p) => sum + p.cost, 0);
}

function getGrowthRemaining() {
  return clampNumber((state.character.growthPool || 0) - getGrowthSpent(), 0, 10);
}

// ============================================================
// CHARACTER CODE
// ============================================================
function getArchetypeTalentKeys(archetypeKey) {
  const archetypeData = archetypeKey ? (DM_DATA.archetypes[archetypeKey] || DM_DATA.advancedArchetypes[archetypeKey]) : null;
  return archetypeData && archetypeData.talents ? Object.keys(archetypeData.talents) : [];
}

function encodeTalentSelection(talent, archetypeKey) {
  const values = Array.isArray(talent) ? talent : (talent ? [talent] : []);
  if (!values.length) return 'XXX';

  const talentKeys = getArchetypeTalentKeys(archetypeKey);
  return values.map(raw => {
    const key = String(raw).trim();
    const directMatch = talentKeys.find(k => k.toLowerCase() === key.toLowerCase());
    if (directMatch) return directMatch.substring(0, 3).toUpperCase();
    return key.substring(0, 3).toUpperCase();
  }).join(',');
}

function parseTalentSelection(value, archetypeKey) {
  if (!value || value === 'XXX') return null;

  const values = value.split(',').map(v => v.trim()).filter(Boolean);
  const talentKeys = getArchetypeTalentKeys(archetypeKey);

  const resolved = values.map(raw => {
    const normalized = raw.toLowerCase();
    const directMatch = talentKeys.find(k => k.toLowerCase() === normalized);
    if (directMatch) return directMatch;

    const prefixMatch = talentKeys.find(k => k.toLowerCase().substring(0, 3) === normalized.substring(0, 3));
    if (prefixMatch) return prefixMatch;

    return normalized;
  });

  if (resolved.length > 1) return resolved;
  return resolved[0] || null;
}

// ---------------------------------------------------------------
// v1.11: Owlbear Rodeo snapshot (the SN segment of a character code)
//
// WHY THIS EXISTS:
// The Owlbear extension cannot compute a character's stats. Deriving Might
// from origin + archetype + temperament + growth requires DM_DATA, which is
// roughly half of this file. Shipping a copy of DM_DATA to the extension
// would mean maintaining the same rules data in two places and letting the
// two drift apart the first time either is edited.
//
// Instead the creator, which already computes all of this, writes the
// finished numbers into the code. The extension reads values and never needs
// to know the rules that produced them. The creator stays the single source
// of truth.
//
// The snapshot is DERIVED and read-only. Live session values (currentSpirit,
// injuries, equipped and discharged state) are deliberately NOT duplicated
// here, because they already ride along in the CP payload. Keeping mutable
// state in exactly one place is what makes an Owlbear round trip lossless:
// the extension can edit CP and re-emit the code without SN going stale.
// ---------------------------------------------------------------
function buildOwlbearSnapshot() {
  const c = state.character;
  const stats = computeStats();
  if (!stats) return null;

  const originData = c.origin ? DM_DATA.origins[c.origin] : null;
  const archetypeData = c.archetype
    ? (DM_DATA.archetypes[c.archetype] || DM_DATA.advancedArchetypes[c.archetype])
    : null;
  const temperamentData = c.temperament ? DM_DATA.temperaments[c.temperament] : null;

  // Talents live on the archetype, with the general list available to everyone.
  // Same merge order the talent picker uses, so a general talent that shares a
  // key with an archetype talent resolves identically in both places.
  const allTalents = {
    ...(archetypeData && archetypeData.talents ? archetypeData.talents : {}),
    ...DM_DATA.generalTalents
  };
  const talentKeys = [c.talent, ...(c.growthExtraTalents || [])].filter(Boolean);
  const talents = talentKeys.map(k => {
    const t = allTalents[k];
    return t
      ? { key: k, name: t.name || k, desc: t.description || t.desc || '' }
      : { key: k, name: k, desc: '' };
  });

  // Catalogue items are stored on the character as {id, qty, equipped,
  // discharged} references. Resolve them to the fields a play sheet actually
  // shows. fullDescription is dropped on purpose: it is by far the largest
  // field per item and the extension is a play aid, not a rules encyclopedia.
  const catalogue = DM_DATA.items || [];
  const items = (c.items || []).map(ref => {
    const it = catalogue.find(x => x.id === ref.id);
    if (!it) {
      return { id: ref.id, name: ref.id, qty: ref.qty || 1, equipped: !!ref.equipped };
    }
    return {
      id: it.id,
      name: it.name,
      category: it.category || null,
      type: it.type || null,
      qty: ref.qty || 1,
      equipped: !!ref.equipped,
      discharged: !!ref.discharged,
      techLevel: it.techLevel != null ? it.techLevel : null,
      damage: it.damage != null ? it.damage : null,
      injury: it.injury || null,
      protection: it.protection != null ? it.protection : null,
      qualities: it.qualities || [],
      description: it.description || ''
    };
  });

  // v1.12: everything the Owlbear sheet needs to reproduce the creator's own
  // sheet layout. Descriptions are included because the sheet shows rules text
  // inline; without them the extension would have to carry DM_DATA.
  const abilities = (typeof getAbilities === 'function' ? getAbilities() : []).map(ab => ({
    key: ab.key, name: ab.name || ab.key, desc: ab.desc || ab.description || '', source: ab.source || 'origin'
  }));

  const exhaustionTypes = Object.entries(DM_DATA.exhaustionTypes || {}).map(([key, ex]) => ({
    key, name: ex.name, attr: ex.attr,
    attrName: DM_DATA.attributeInfo[ex.attr] ? DM_DATA.attributeInfo[ex.attr].name : ex.attr,
    desc: ex.desc || ''
  }));

  const bonds = (c.bonds || []).map(b => ({
    name: b.name, type: b.type,
    typeName: DM_DATA.bondInfo?.[b.type]?.name || b.type,
    desc: DM_DATA.bondInfo?.[b.type]?.desc || ''
  }));

  return {
    v: 2,
    from: APP_VERSION,
    name: c.name || '',
    pronouns: c.pronouns || '',
    portraitUrl: c.portraitUrl || '',
    origin: originData ? originData.name : null,
    originDesc: originData ? (originData.description || '') : '',
    archetype: archetypeData ? archetypeData.name : null,
    archetypeDesc: archetypeData ? (archetypeData.description || '') : '',
    temperament: temperamentData ? temperamentData.name : null,
    temperamentDesc: temperamentData ? (temperamentData.description || '') : '',
    temperamentExhaustion: temperamentData ? (temperamentData.exhaustion || '') : '',
    abilities,
    exhaustionTypes,
    attrs: stats.attrs,
    skills: stats.skills,
    techLevel: stats.techLevel,
    spiritMax: stats.spiritPool,
    supplyMax: stats.supplyPoints,
    talents,
    items,
    truths: c.truths || [],
    bonds,
    shortTermGoal: c.shortTermGoal || '',
    longTermGoal: c.longTermGoal || '',
    customItems: c.customItems || [],
    knowledgeFragments: c.knowledgeFragments || []
  };
}

function buildCharacterCode() {
  const c = state.character;
  const originData = c.origin ? DM_DATA.origins[c.origin] : null;
  const archetypeData = c.archetype ? (DM_DATA.archetypes[c.archetype] || DM_DATA.advancedArchetypes[c.archetype]) : null;
  const temperamentData = c.temperament ? DM_DATA.temperaments[c.temperament] : null;

  const parts = [];
  parts.push('DM1'); // version
  parts.push(originData ? originData.code : 'XXX');
  parts.push(archetypeData ? archetypeData.code : 'XXX');
  parts.push(temperamentData ? temperamentData.code : 'XXX');

  // Talent
  parts.push(encodeTalentSelection(c.talent, c.archetype));

  // Origin choices (attr boosts encoded as comma list)
  if (c.origin === 'everan') parts.push('AB' + (c.originAttrBoosts || []).map(a => a[0].toUpperCase()).join(''));
  else if (c.origin === 'spear') parts.push('AB' + (c.originAttrBoostChoice ? c.originAttrBoostChoice[0].toUpperCase() : 'X'));
  else parts.push('AB0');

  // Archetype attr choice
  const attrChoiceStr = (c.archetypeAttrChoice || []).map(a => a ? a.substring(0,2).toUpperCase() : 'XX').join('');
  parts.push('AA' + attrChoiceStr);

  // Archetype skill choice
  const skillChoiceStr = (c.archetypeSkillChoice || []).map(s => s ? s.substring(0,2).toUpperCase() : 'XX').join('');
  parts.push('AS' + skillChoiceStr);

  // Origin ability choices
  if (c.originAbilityChoice) parts.push('OA' + c.originAbilityChoice.substring(0,3).toUpperCase());
  else if (c.originAbilitiesChoice && c.originAbilitiesChoice.length) parts.push('OA' + c.originAbilitiesChoice.map(a => a.substring(0,3).toUpperCase()).join(''));
  else parts.push('OA0');

  // Temperament choices
  parts.push('TA' + (c.temperamentAttrBoost ? c.temperamentAttrBoost.substring(0,2).toUpperCase() : 'XX'));
  parts.push('TS' + (c.temperamentSkillBoost ? c.temperamentSkillBoost.substring(0,2).toUpperCase() : 'XX'));

  // Name (base64 encoded to avoid breaking code)
  const nameEncoded = btoa(encodeURIComponent(c.name || '')).replace(/=/g,'');
  parts.push('NM' + nameEncoded);

  // Goals
  const stEncoded = btoa(encodeURIComponent(c.shortTermGoal || '')).replace(/=/g,'');
  const ltEncoded = btoa(encodeURIComponent(c.longTermGoal || '')).replace(/=/g,'');
  parts.push('SG' + stEncoded);
  parts.push('LG' + ltEncoded);

  // Full character payload (restores all current fields)
  const characterPayload = btoa(encodeURIComponent(JSON.stringify({
    ...c,
    bonds: c.bonds || [],
    growthPurchases: c.growthPurchases || [],
    growthExtraTalents: c.growthExtraTalents || [],
    growthAttrIncreases: c.growthAttrIncreases || [],
    growthSkillIncreases: c.growthSkillIncreases || [],
    growthBonds: c.growthBonds || [],
    truths: c.truths || ['', ''],
    injuries: c.injuries || [],
    healedInjuries: c.healedInjuries || [],
    // v1.09. The payload spreads ...c so these ride along regardless, but they are
    // named here for the same reason the others are: the explicit default is what
    // stops an older character with a missing key from arriving as undefined.
    customItems: c.customItems || [],
    knowledgeFragments: c.knowledgeFragments || [],
    oncePerSceneUsed: c.oncePerSceneUsed || [],
    activeSceneEffects: c.activeSceneEffects || [],
    limitedUseAbilities: c.limitedUseAbilities || {},
    items: c.items || []
  }))).replace(/=/g,'');
  parts.push('CP' + characterPayload);

  // Growth pool
  parts.push('GW' + (c.growthPool || 0));

  // v1.11: computed snapshot for the Owlbear Rodeo extension. Appended last so
  // it cannot disturb anything: parseCharacterCode reads segments by prefix
  // from index 5 onward and silently ignores prefixes it does not recognise,
  // so a code carrying SN still loads correctly in an older build of this file.
  const snapshot = buildOwlbearSnapshot();
  if (snapshot) {
    parts.push('SN' + btoa(encodeURIComponent(JSON.stringify(snapshot))).replace(/=/g, ''));
  }

  return parts.join('-');
}

function b64decodeSafe(val) {
  // Restore correct base64 padding (codes strip '=' to stay tidy).
  let s = String(val).replace(/-/g, '+').replace(/_/g, '/');
  const pad = s.length % 4;
  if (pad === 2) s += '==';
  else if (pad === 3) s += '=';
  else if (pad === 1) s += '==='; // invalid but avoids throwing on junk
  return decodeURIComponent(atob(s));
}

function parseCharacterCode(code) {
  try {
    const parts = code.split('-');
    if (parts[0] !== 'DM1') return { error: 'Invalid character code version.' };

    const c = getDefaultCharacter();

    // Origin
    const originKey = Object.keys(DM_DATA.origins).find(k => DM_DATA.origins[k].code === parts[1]);
    if (!originKey) return { error: 'Unknown origin code: ' + parts[1] };
    c.origin = originKey;

    // Archetype
    const arcKey = Object.keys(DM_DATA.archetypes).find(k => DM_DATA.archetypes[k].code === parts[2]) ||
                   Object.keys(DM_DATA.advancedArchetypes).find(k => DM_DATA.advancedArchetypes[k].code === parts[2]);
    if (!arcKey) return { error: 'Unknown archetype code: ' + parts[2] };
    c.archetype = arcKey;

    // Temperament
    const tempKey = Object.keys(DM_DATA.temperaments).find(k => DM_DATA.temperaments[k].code === parts[3]);
    if (!tempKey) return { error: 'Unknown temperament code: ' + parts[3] };
    c.temperament = tempKey;

    // Talent
    c.talent = parseTalentSelection(parts[4], c.archetype);

    // Parse remaining parts as key-value
    for (let i = 5; i < parts.length; i++) {
      const raw = parts[i];
      if (raw.startsWith('AB')) {
        const val = raw.substring(2);
        if (c.origin === 'everan') {
          c.originAttrBoosts = val.split('').map(ch => ({'M':'might','Q':'quickness','I':'insight','R':'resolve'}[ch])).filter(Boolean);
        } else if (c.origin === 'spear') {
          c.originAttrBoostChoice = {'M':'might','Q':'quickness'}[val] || null;
        }
      } else if (raw.startsWith('AA')) {
        const val = raw.substring(2);
        // pairs of 2-char codes
        const pairs = [];
        for (let j = 0; j < val.length; j += 2) {
          const chunk = val.substring(j, j+2);
          const attrMap = {MI:'might',QU:'quickness',IN:'insight',RE:'resolve'};
          pairs.push(attrMap[chunk] || null);
        }
        c.archetypeAttrChoice = pairs;
      } else if (raw.startsWith('AS')) {
        const val = raw.substring(2);
        const pairs = [];
        for (let j = 0; j < val.length; j += 2) {
          const chunk = val.substring(j, j+2);
          const skillMap = {MO:'move',FI:'fight',SN:'sneak',TA:'talk',OP:'operate',ST:'study',SU:'survive'};
          pairs.push(skillMap[chunk] || null);
        }
        c.archetypeSkillChoice = pairs;
      } else if (raw.startsWith('OA')) {
        const val = raw.substring(2);
        if (val === '0') {
          c.originAbilityChoice = null;
          c.originAbilitiesChoice = [];
        } else {
          // Try to match 3-char codes to abilities
          const abilityKeys = Object.keys(DM_DATA.origins[c.origin].specialAbilities || {});
          const found = [];
          for (let j = 0; j < val.length; j += 3) {
            const chunk = val.substring(j, j+3).toLowerCase();
            const match = abilityKeys.find(k => k.substring(0,3).toLowerCase() === chunk);
            if (match) found.push(match);
          }
          if (found.length === 1) c.originAbilityChoice = found[0];
          else c.originAbilitiesChoice = found;
        }
      } else if (raw.startsWith('TA')) {
        const val = raw.substring(2);
        const attrMap = {MI:'might',QU:'quickness',IN:'insight',RE:'resolve'};
        c.temperamentAttrBoost = attrMap[val] || null;
      } else if (raw.startsWith('TS')) {
        const val = raw.substring(2);
        const skillMap = {MO:'move',FI:'fight',SN:'sneak',TA:'talk',OP:'operate',ST:'study',SU:'survive'};
        c.temperamentSkillBoost = skillMap[val] || null;
      } else if (raw.startsWith('NM')) {
        const val = raw.substring(2);
        try { c.name = b64decodeSafe(val); } catch(e) { c.name = ''; }
      } else if (raw.startsWith('PR')) {
        const val = raw.substring(2);
        try { c.pronouns = b64decodeSafe(val); } catch(e) { c.pronouns = ''; }
      } else if (raw.startsWith('SG')) {
        const val = raw.substring(2);
        try { c.shortTermGoal = b64decodeSafe(val); } catch(e) { c.shortTermGoal = ''; }
      } else if (raw.startsWith('LG')) {
        const val = raw.substring(2);
        try { c.longTermGoal = b64decodeSafe(val); } catch(e) { c.longTermGoal = ''; }
      } else if (raw.startsWith('GW')) {
        c.growthPool = parseInt(raw.substring(2)) || 0;
      }
    }

    const payloadPart = parts.find(p => p.startsWith('CP'));
    if (payloadPart) {
      try {
        const val = payloadPart.substring(2);
        const payload = JSON.parse(b64decodeSafe(val));
        Object.assign(c, getDefaultCharacter(), payload);
      } catch (e) {
        // Ignore malformed payload and fall back to older fields.
      }
    }

    return { character: c };
  } catch(e) {
    return { error: 'Failed to parse character code: ' + e.message };
  }
}




// ============================================================
// CATALOGUE FLOATING TOOLTIPS
// ============================================================
let activeFloatingTip = null;
let activeFloatingTipSource = null;

function removeCatalogueFloatingTip() {
  if (activeFloatingTip && activeFloatingTip.parentNode) activeFloatingTip.parentNode.removeChild(activeFloatingTip);
  activeFloatingTip = null;
  activeFloatingTipSource = null;
}

function showCatalogueFloatingTip(sourceEl) {
  const body = sourceEl ? sourceEl.querySelector('.dm-tip-body') : null;
  if (!body) return;
  removeCatalogueFloatingTip();

  const tip = document.createElement('div');
  tip.className = 'dm-floating-tip';
  tip.innerHTML = body.innerHTML;
  document.body.appendChild(tip);

  const sourceRect = sourceEl.getBoundingClientRect();
  const tipRect = tip.getBoundingClientRect();
  const gap = 10;
  let left = sourceRect.left + (sourceRect.width / 2) - (tipRect.width / 2);
  left = Math.max(8, Math.min(left, window.innerWidth - tipRect.width - 8));

  let top = sourceRect.bottom + gap;
  let above = false;
  if (top + tipRect.height > window.innerHeight - 8) {
    top = sourceRect.top - tipRect.height - gap;
    above = true;
  }
  if (top < 8) top = 8;

  const arrowLeft = Math.max(16, Math.min(sourceRect.left + sourceRect.width / 2 - left, tipRect.width - 16));
  tip.style.left = `${left}px`;
  tip.style.top = `${top}px`;
  tip.style.setProperty('--tip-arrow-left', `${arrowLeft}px`);
  tip.classList.toggle('tip-above', above);

  activeFloatingTip = tip;
  activeFloatingTipSource = sourceEl;
}

function handleCatalogueTipEnter(event) {
  const source = event.target.closest ? event.target.closest('.catalogue-grid .dm-tip') : null;
  if (!source) return;
  showCatalogueFloatingTip(source);
}

function handleCatalogueTipLeave(event) {
  const source = event.target.closest ? event.target.closest('.catalogue-grid .dm-tip') : null;
  if (!source) return;
  const related = event.relatedTarget;
  if (related && source.contains(related)) return;
  if (activeFloatingTipSource === source) removeCatalogueFloatingTip();
}

document.addEventListener('mouseover', handleCatalogueTipEnter);
document.addEventListener('mouseout', handleCatalogueTipLeave);
document.addEventListener('focusin', handleCatalogueTipEnter);
document.addEventListener('focusout', handleCatalogueTipLeave);
document.addEventListener('scroll', removeCatalogueFloatingTip, true);
window.addEventListener('resize', removeCatalogueFloatingTip);

// ============================================================
// LOCAL CHARACTER LIBRARY
// ============================================================
const LOCAL_LIBRARY_KEY = 'dm_character_creator_library_v1';

function readLocalLibrary() {
  try { return JSON.parse(localStorage.getItem(LOCAL_LIBRARY_KEY) || '[]'); }
  catch (e) { return []; }
}

function writeLocalLibrary(list) {
  localStorage.setItem(LOCAL_LIBRARY_KEY, JSON.stringify(list));
}

function summarizeCharacterForLibrary(c) {
  const origin = c.origin && DM_DATA.origins[c.origin] ? DM_DATA.origins[c.origin].name : 'No origin';
  const archetype = c.archetype && (DM_DATA.archetypes[c.archetype] || DM_DATA.advancedArchetypes[c.archetype]) ? (DM_DATA.archetypes[c.archetype] || DM_DATA.advancedArchetypes[c.archetype]).name : 'No archetype';
  return `${origin} • ${archetype}`;
}

function saveCharacterLocal(silent = false) {
  const c = state.character;
  if (!c.localSaveId) c.localSaveId = 'dmchar-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
  const list = readLocalLibrary();
  const now = new Date().toISOString();
  const record = {
    id: c.localSaveId,
    name: c.name || 'Unnamed Wanderer',
    summary: summarizeCharacterForLibrary(c),
    updatedAt: now,
    code: buildCharacterCode(),
    character: c
  };
  const idx = list.findIndex(x => x.id === record.id);
  if (idx >= 0) list[idx] = record;
  else list.unshift(record);
  writeLocalLibrary(list);
  if (!silent) alert('Character saved locally in this browser.');
  renderLocalLibrary();
}

function loadCharacterLocal(id) {
  const rec = readLocalLibrary().find(x => x.id === id);
  if (!rec) return;
  const result = rec.code ? parseCharacterCode(rec.code) : { character: rec.character };
  if (result.error) { alert(result.error); return; }
  state.character = { ...getDefaultCharacter(), ...result.character, localSaveId: id };
  document.getElementById('importSection').style.display = 'none';
  state.currentStep = STEPS.indexOf('summary');
  normalizeCurrentValues();
  renderAll();
}

function deleteCharacterLocal(id) {
  if (!confirm('Delete this locally saved character from this browser?')) return;
  const list = readLocalLibrary().filter(x => x.id !== id);
  writeLocalLibrary(list);
  if (state.character.localSaveId === id) state.character.localSaveId = null;
  renderLocalLibrary();
}

function renderLocalLibraryHTML() {
  const list = readLocalLibrary();
  if (!list.length) return '<div class="dim small">No locally saved characters yet.</div>';
  return list.map(rec => {
    const date = rec.updatedAt ? new Date(rec.updatedAt).toLocaleString() : 'Unknown date';
    return `<div class="local-character-row">
      <div class="local-character-main">
        <div class="local-character-name">${escHtml(rec.name || 'Unnamed Wanderer')}</div>
        <div class="local-character-meta">${escHtml(rec.summary || '')} • Saved ${escHtml(date)}</div>
      </div>
      <div class="local-character-actions">
        <button class="mini-btn" onclick="loadCharacterLocal('${escHtml(rec.id)}')">Load</button>
        <button class="mini-btn danger" onclick="deleteCharacterLocal('${escHtml(rec.id)}')">Delete</button>
      </div>
    </div>`;
  }).join('');
}

function renderLocalLibrary() {
  const el = document.getElementById('localCharacterList');
  if (el) el.innerHTML = renderLocalLibraryHTML();
}

// ============================================================
// NAVIGATION
// ============================================================
function startNew() {
  state.character = getDefaultCharacter();
  document.getElementById('importSection').style.display = 'none';
  state.currentStep = 0;
  renderAll();
}

function importCharacter() {
  const code = document.getElementById('importInput').value.trim();
  const result = parseCharacterCode(code);
  if (result.error) {
    document.getElementById('importError').textContent = '⚠ ' + result.error;
    return;
  }
  state.character = { ...getDefaultCharacter(), ...result.character };
  document.getElementById('importSection').style.display = 'none';
  state.currentStep = STEPS.indexOf('summary');
  normalizeCurrentValues();
  renderAll();
}

function goToStep(idx) {
  if (idx < 0 || idx >= STEPS.length) return;
  state.character.finalized = false;
  state.currentStep = idx;
  renderAll();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function nextStep() { goToStep(state.currentStep + 1); }
function prevStep() { goToStep(state.currentStep - 1); }

function canProceed() {
  const c = state.character;
  const step = STEPS[state.currentStep];
  switch(step) {
    case 'origin': return !!c.origin;
    case 'originOptions': return validateOriginOptions();
    case 'archetype': return !!c.archetype;
    case 'archetypeDistribute': return validateArchetypeDistribute();
    case 'talent': return !!c.talent;
    case 'temperament': return !!c.temperament && !!c.temperamentAttrBoost && !!c.temperamentSkillBoost;
    case 'info': return !!String(c.name || '').trim();
    case 'bonds': return c.bonds.length > 0 && c.bonds.every(b => b.name && b.type);
    case 'growth': return true;
    case 'summary': return true;
    default: return true;
  }
}

function validateOriginOptions() {
  const c = state.character;
  const originData = DM_DATA.origins[c.origin];

  if (c.origin === 'everan') {
    if (c.originAttrBoosts.length !== 2) return false;
    if (!c.originAbilityChoice) return false;
  }
  if (c.origin === 'dreamer') {
    if ((c.originAbilitiesChoice || []).length !== 2) return false;
  }
  if (c.origin === 'archivist') {
    return true; // just forced ability
  }
  if (c.origin === 'spear') {
    if (!c.originAttrBoostChoice) return false;
    if (!c.originAbilityChoice) return false;
  }
  if (c.origin === 'river') {
    if ((c.originAbilitiesChoice || []).length !== 2) return false;
  }
  return true;
}

function validateArchetypeDistribute() {
  const c = state.character;
  const archetypeData = DM_DATA.archetypes[c.archetype] || DM_DATA.advancedArchetypes[c.archetype];
  if (!archetypeData) return false;

  const attrChoices = c.archetypeAttrChoice || [];
  const skillChoices = c.archetypeSkillChoice || [];

  // Need 3 unique attrs chosen and 3 unique skills chosen
  if (attrChoices.filter(Boolean).length < 3) return false;
  if (new Set(attrChoices.filter(Boolean)).size < 3) return false;

  if (skillChoices.filter(Boolean).length < 3) return false;
  if (new Set(skillChoices.filter(Boolean)).size < 3) return false;

  return true;
}

// ============================================================
// RENDER ENGINE
// ============================================================
function renderAll() {
  normalizeCurrentValues();
  renderProgress();
  renderStep();
}

function renderProgress() {
  const bar = document.getElementById('progressBar');
  if (state.currentStep < 0 || state.character.finalized) { bar.style.display = 'none'; bar.innerHTML = ''; return; }
  bar.style.display = 'flex';
  const stepNames = ['Origin','Options','Archetype','Distribute','Talent','Temperament','Info','Bonds','Growth','Summary'];
  bar.innerHTML = stepNames.map((name, i) => {
    let cls = 'step-indicator';
    let dotCls = 'step-dot';
    if (i === state.currentStep) { cls += ' active'; dotCls += ' active'; }
    else if (i < state.currentStep) { cls += ' completed'; dotCls += ' completed'; }

    const connector = i < stepNames.length - 1 ? '<div class="step-connector"></div>' : '';
    return `<div class="${cls}" onclick="goToStep(${i})">
      <div class="${dotCls}">${i < state.currentStep ? '✓' : (i+1)}</div>
      <span class="step-label">${name}</span>
    </div>${connector}`;
  }).join('');
}

// ============================================================
// RE-RENDER CONTINUITY (v1.10)
// ------------------------------------------------------------
// renderStep() rebuilds the whole step by assigning innerHTML. That keeps rendering
// a pure function of state, which is worth keeping, but it costs continuity: every
// <details> reverts to its markup default and the document gets shorter, so any
// button that triggers a re-render — Equip, Discharge, a rest, a confirm — snaps the
// player's open panels shut and jerks the viewport.
//
// The alternative was targeted DOM updates per action, which means tracking exactly
// which fragments each of ~30 handlers can touch and getting it wrong later. Instead
// the open/closed set and the scroll offset are captured immediately before the swap
// and reapplied immediately after, synchronously, so nothing paints in between.
//
// Keys are derived from content rather than position: summary text, the nearest
// labelled ancestor, and an occurrence counter for repeats. Position-based keys would
// shift the moment a list gains or loses a row, which is precisely the case this has
// to survive (adding an item, healing an injury, removing a truth).
// ============================================================
const SCOPE_SELECTOR = '.sheet-section, .cat-item, .owned-item, .limited-feature-card, .step-card';
const SCOPE_LABEL_SELECTOR = '.sheet-section-title, .cat-item-name, .owned-item-name, .limited-feature-name, .step-card-title';

function detailsStateKey(el, seen) {
  const summary = el.querySelector(':scope > summary');
  const label = summary ? summary.textContent.replace(/\s+/g, ' ').trim().slice(0, 80) : '';
  const scopeEl = el.parentElement ? el.parentElement.closest(SCOPE_SELECTOR) : null;
  let scope = '';
  if (scopeEl) {
    const title = scopeEl.querySelector(SCOPE_LABEL_SELECTOR);
    if (title) scope = title.textContent.replace(/\s+/g, ' ').trim().slice(0, 60);
  }
  // className is part of the key because a card's classes encode its state
  // (is-equipped, once-used); two cards with the same name but different state are
  // genuinely different rows and should not inherit each other's open flag.
  const base = `${scope}|${el.className}|${label}`;
  const n = seen.get(base) || 0;
  seen.set(base, n + 1);
  return `${base}#${n}`;
}

function snapshotDetailsState(root) {
  const seen = new Map();
  const map = new Map();
  root.querySelectorAll('details').forEach(el => { map.set(detailsStateKey(el, seen), el.open); });
  return map;
}

// Both directions are restored, not just the open ones: a <details open> in the
// markup that the player deliberately closed must stay closed through a re-render.
function restoreDetailsState(root, map) {
  if (!map || !map.size) return;
  const seen = new Map();
  root.querySelectorAll('details').forEach(el => {
    const key = detailsStateKey(el, seen);
    if (map.has(key)) el.open = map.get(key);
  });
}

let _lastRenderKey = null;

function renderStep() {
  const container = document.getElementById('stepsContainer');
  // Scroll is only worth preserving within the same view. Moving between steps, or
  // finalizing, legitimately changes what the player is looking at, and those paths
  // scroll to top themselves once this returns.
  const renderKey = state.currentStep < 0 ? 'none' : (state.character.finalized ? 'finalized' : STEPS[state.currentStep]);
  const sameView = renderKey === _lastRenderKey;
  const prevDetails = sameView ? snapshotDetailsState(container) : null;
  const prevScroll = window.scrollY;
  _lastRenderKey = renderKey;

  const settle = () => {
    if (prevDetails) restoreDetailsState(container, prevDetails);
    if (sameView) window.scrollTo(0, prevScroll);
  };

  if (state.currentStep < 0) { container.innerHTML = ''; return; }
  if (state.character.finalized) { container.innerHTML = renderFinalizedCharacterView(); settle(); return; }
  const step = STEPS[state.currentStep];
  let html = '';

  switch(step) {
    case 'origin': html = renderOriginStep(); break;
    case 'originOptions': html = renderOriginOptionsStep(); break;
    case 'archetype': html = renderArchetypeStep(); break;
    case 'archetypeDistribute': html = renderArchetypeDistributeStep(); break;
    case 'talent': html = renderTalentStep(); break;
    case 'temperament': html = renderTemperamentStep(); break;
    case 'info': html = renderInfoStep(); break;
    case 'bonds': html = renderBondsStep(); break;
    case 'growth': html = renderGrowthStep(); break;
    case 'summary': html = renderSummaryStep(); break;
    default: html = '<div class="step-card active"><div class="step-card-inner"><p>Unknown step.</p></div></div>';
  }

  container.innerHTML = html;
  settle();
  attachStepListeners(step);
}
