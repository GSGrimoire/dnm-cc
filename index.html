ty:Scary"}]},{"id":"heavy-protective-gear-tl3","name":"Heavy Protective Gear (Tech Level 3)","category":"armor","techLevel":3,"atomaCategory":"Industrial","qualities":["Bulky","Environment","Handy"],"protection":3,"breakerProtection":0,"cost":4,"rarity":4,"bookPage":150,"pdfPage":22,"description":"Heavy-duty industrial protective equipment for chemicals, radiation, electrical discharge, blunt trauma, and machinery hazards.","fullDescription":"Heavy-duty industrial protective gear is designed to protect from exposure to dangerous conditions, such as exposure to chemicals, radiation, electrical discharges, and blunt force trauma or lacerations from heavy machinery. Higher Tech Level versions use lighter, more durable materials. Tech Level 3 Heavy Protective Gear is Armor which provides Protection of 3. This Protection is ignored by attacks with the breaker keyword. Heavy Protective Gear is bulky and handy.","equipEffects":[{"id":"handy-max-supply-points-plus-2","name":"Handy","type":"resourceModifier","appliesWhen":"equipped","resource":"supplyPoints","property":"max","operation":"add","value":2,"stacking":"additive","label":"+2 Max Supply Points","rulesText":"Your maximum Supply Points increase by 2 while wearing this armor.","source":"quality:Handy"}],"situationalEffects":[{"id":"environment-hazard-resistance-difficulty","type":"difficultyModifier","appliesWhen":"equipped","attributeKeys":["might","quickness","resolve"],"skillKeys":["survive","move"],"modifier":-1,"label":"Environment: easier hazard resistance","rulesText":"Reduce Difficulty by 1 to avoid or resist gas, toxic dust, smoke, chemical fumes, and similar hazards. Powered versions reduce it by 2.","source":"quality:Environment"},{"id":"bulky-threat-move-difficulty","type":"difficultyModifier","appliesWhen":"equipped","attributeKeys":["quickness"],"skillKeys":["move"],"modifier":1,"label":"Bulky: GM may hinder Move","rulesText":"The Game Master may spend 1 Threat to add 1 Difficulty when you make Quickness (Move) tests while wearing this armor.","source":"quality:Bulky"}]},{"id":"heavy-protective-gear-tl4","name":"Heavy Protective Gear (Tech Level 4)","category":"armor","techLevel":4,"atomaCategory":"Industrial","qualities":["Bulky","Environment","Handy"],"protection":4,"breakerProtection":0,"cost":5,"rarity":5,"bookPage":150,"pdfPage":22,"description":"Heavy-duty industrial protective equipment for chemicals, radiation, electrical discharge, blunt trauma, and machinery hazards.","fullDescription":"Heavy-duty industrial protective gear is designed to protect from exposure to dangerous conditions, such as exposure to chemicals, radiation, electrical discharges, and blunt force trauma or lacerations from heavy machinery. Higher Tech Level versions use lighter, more durable materials. Tech Level 4 Heavy Protective Gear provides Protection 4. This Protection is ignored by attacks with the breaker keyword. Heavy Protective Gear is bulky and handy.","equipEffects":[{"id":"handy-max-supply-points-plus-2","name":"Handy","type":"resourceModifier","appliesWhen":"equipped","resource":"supplyPoints","property":"max","operation":"add","value":2,"stacking":"additive","label":"+2 Max Supply Points","rulesText":"Your maximum Supply Points increase by 2 while wearing this armor.","source":"quality:Handy"}],"situationalEffects":[{"id":"environment-hazard-resistance-difficulty","type":"difficultyModifier","appliesWhen":"equipped","attributeKeys":["might","quickness","resolve"],"skillKeys":["survive","move"],"modifier":-1,"label":"Environment: easier hazard resistance","rulesText":"Reduce Difficulty by 1 to avoid or resist gas, toxic dust, smoke, chemical fumes, and similar hazards. Powered versions reduce it by 2.","source":"quality:Environment"},{"id":"bulky-threat-move-difficulty","type":"difficultyModifier","appliesWhen":"equipped","attributeKeys":["quickness"],"skillKeys":["move"],"modifier":1,"label":"Bulky: GM may hinder Move","rulesText":"The Game Master may spend 1 Threat to add 1 Difficulty when you make Quickness (Move) tests while wearing this armor.","source":"quality:Bulky"}]},{"id":"light-armor-tl2","name":"Light Armor (Tech Level 2)","category":"armor","techLevel":2,"atomaCategory":"Security","qualities":["Handy"],"protection":2,"breakerProtection":1,"cost":3,"rarity":3,"bookPage":150,"pdfPage":22,"description":"Security-style armor with pouches and fixtures for carrying tools while preserving mobility.","fullDescription":"Light armor was typically worn by security personnel, those for whom combat is a risk, but not guaranteed, and by those unwilling to sacrifice mobility for protection. Light armor is commonly covered in pouches, belts, and other fixtures for carrying tools and other equipment. Tech Level 2 Light Armor is Armor which provides Protection of 2. This Protection is reduced to half, rounding up, by attacks with the breaker keyword. Light Armor is handy.","equipEffects":[{"id":"handy-max-supply-points-plus-2","name":"Handy","type":"resourceModifier","appliesWhen":"equipped","resource":"supplyPoints","property":"max","operation":"add","value":2,"stacking":"additive","label":"+2 Max Supply Points","rulesText":"Your maximum Supply Points increase by 2 while wearing this armor.","source":"quality:Handy"}]},{"id":"light-armor-tl3","name":"Light Armor (Tech Level 3)","category":"armor","techLevel":3,"atomaCategory":"Security","qualities":["Handy"],"protection":3,"breakerProtection":2,"cost":4,"rarity":4,"bookPage":150,"pdfPage":22,"description":"Security-style armor with pouches and fixtures for carrying tools while preserving mobility.","fullDescription":"Light armor was typically worn by security personnel, those for whom combat is a risk, but not guaranteed, and by those unwilling to sacrifice mobility for protection. Light armor is commonly covered in pouches, belts, and other fixtures for carrying tools and other equipment. Tech Level 3 Light Armor provides Protection 3. This Protection is reduced to half, rounding up, by attacks with the breaker keyword. Light Armor is handy.","equipEffects":[{"id":"handy-max-supply-points-plus-2","name":"Handy","type":"resourceModifier","appliesWhen":"equipped","resource":"supplyPoints","property":"max","operation":"add","value":2,"stacking":"additive","label":"+2 Max Supply Points","rulesText":"Your maximum Supply Points increase by 2 while wearing this armor.","source":"quality:Handy"}]},{"id":"protective-clothing-tl2","name":"Protective Clothing (Tech Level 2)","category":"armor","techLevel":2,"atomaCategory":"Domestic","qualities":["Mobile"],"protection":1,"breakerProtection":0,"cost":2,"rarity":2,"bookPage":150,"pdfPage":22,"description":"Padded or lightweight protective clothing used by riders, athletes, and others needing mobility.","fullDescription":"This represents clothing or personal protective equipment used to protect the wearer against minor injuries and reduce the effect of more serious injuries. It commonly consists of padding or lightweight plastic or polymer foam, and was used by those riding bikes or motorcycles, and by some kinds of athletes. Higher Tech Level versions use lighter, more durable materials. Protective clothing allows for a considerable range of motion and easy mobility while providing protection. Tech Level 2 Protective Clothing is Armor which provides Protection of 1. This Protection is ignored by attacks with the breaker keyword. Protective clothing is mobile.","situationalEffects":[{"id":"mobile-move-reroll-two-d20s","type":"rerollModifier","appliesWhen":"equipped","attributeKeys":["quickness"],"skillKeys":["move"],"label":"Mobile: better Move rerolls","rulesText":"When you spend Spirit to re-roll a d20 on a Move Skill Test, each Spirit spent lets you re-roll two d20s instead of one.","source":"quality:Mobile"}]},{"id":"protective-clothing-tl3","name":"Protective Clothing (Tech Level 3)","category":"armor","techLevel":3,"atomaCategory":"Domestic","qualities":["Mobile"],"protection":2,"breakerProtection":0,"cost":3,"rarity":3,"bookPage":150,"pdfPage":22,"description":"Padded or lightweight protective clothing used by riders, athletes, and others needing mobility.","fullDescription":"This represents clothing or personal protective equipment used to protect the wearer against minor injuries and reduce the effect of more serious injuries. It commonly consists of padding or lightweight plastic or polymer foam, and was used by those riding bikes or motorcycles, and by some kinds of athletes. Higher Tech Level versions use lighter, more durable materials. Protective clothing allows for a considerable range of motion and easy mobility while providing protection. Tech Level 3 Protective Clothing provides Protection 2. This Protection is ignored by attacks with the breaker keyword. Protective clothing is mobile.","situationalEffects":[{"id":"mobile-move-reroll-two-d20s","type":"rerollModifier","appliesWhen":"equipped","attributeKeys":["quickness"],"skillKeys":["move"],"label":"Mobile: better Move rerolls","rulesText":"When you spend Spirit to re-roll a d20 on a Move Skill Test, each Spirit spent lets you re-roll two d20s instead of one.","source":"quality:Mobile"}]},{"id":"salvage-armor-tl1","name":"Salvage Armor (Tech Level 1)","category":"armor","techLevel":1,"atomaCategory":"Hand-Made","qualities":[],"protection":1,"breakerProtection":1,"cost":1,"rarity":2,"bookPage":150,"pdfPage":22,"description":"Scrap metals, plastics, and other durable materials fitted together as basic armor.","fullDescription":"Collections of durable materials fastened together or to clothing can serve as basic protection. While still shaped and somewhat fitted to the wearer, much of this is made up of scrap metals, plastics, and other discarded materials. Tech Level 2 versions can shape and bond these materials together more effectively, making better armor overall. Tech Level 1 Salvage Armor is Armor which provides Protection of 1. This Protection is halved, rounding up, by attacks with the breaker keyword."},{"id":"salvage-armor-tl2","name":"Salvage Armor (Tech Level 2)","category":"armor","techLevel":2,"atomaCategory":"Hand-Made","qualities":[],"protection":2,"breakerProtection":1,"cost":2,"rarity":2,"bookPage":150,"pdfPage":22,"description":"Scrap metals, plastics, and other durable materials fitted together as basic armor.","fullDescription":"Collections of durable materials fastened together or to clothing can serve as basic protection. While still shaped and somewhat fitted to the wearer, much of this is made up of scrap metals, plastics, and other discarded materials. Tech Level 2 versions can shape and bond these materials together more effectively, making better armor overall. Tech Level 2 Salvage Armor provides Protection 2. This Protection is halved, rounding up, by attacks with the breaker keyword."},{"id":"bicycle","name":"Bicycle","category":"vehicle","techLevel":2,"atomaCategory":"Hand-Made","cost":6,"rarity":1,"bookPage":156,"pdfPage":28,"description":"Simple muscle-powered vehicle for covering ground quickly between settlements, but risky in dense terrain.","fullDescription":"A simple, muscle-powered vehicle. Useful for covering ground quickly, but risky to use in dense terrain. Unpowered bicycles became more common after the War to allow people to travel more quickly between distant communities."},{"id":"binoculars-tl2","name":"Binoculars (Tech Level 2)","category":"tech","techLevel":2,"atomaCategory":"Domestic","cost":2,"rarity":2,"bookPage":156,"pdfPage":28,"description":"Optical magnification for distant observation; reduces Difficulty by 1 when studying distant details.","fullDescription":"A device that magnifies images of distant objects, allowing the user to pick out details more easily. Higher tech level versions incorporate additional functions, such as a rangefinder to provide an accurate distance to the target, as well as night vision and thermal imaging for finding targets in dark or obscured conditions. Using binoculars reduces the Difficulty of Skill Tests by 1 when observing or studying details of distant objects, creatures, or places.","situationalEffects":[{"id":"binoculars-distant-study-difficulty","type":"difficultyModifier","appliesWhen":"equipped","attributeKeys":["insight"],"skillKeys":["study"],"modifier":-1,"label":"Binoculars: -1 Difficulty for distant details","rulesText":"Reduce the Difficulty of Skill Tests by 1 when observing or studying details of distant objects, creatures, or places."}]},{"id":"binoculars-tl3","name":"Binoculars (Tech Level 3)","category":"tech","techLevel":3,"atomaCategory":"Security","cost":4,"rarity":3,"bookPage":156,"pdfPage":28,"description":"Advanced binoculars with rangefinding, night vision, and thermal imaging; reduces distant observation Difficulty and ignores darkness, smoke, dust, and similar obscuring factors.","fullDescription":"A device that magnifies images of distant objects, allowing the user to pick out details more easily. Higher tech level versions incorporate additional functions, such as a rangefinder to provide an accurate distance to the target, as well as night vision and thermal imaging for finding targets in dark or obscured conditions. Using binoculars reduces the Difficulty of Skill Tests by 1 when observing or studying details of distant objects, creatures, or places. A Tech Level 3 set of binoculars also allows the user to ignore Difficulty increases from darkness, smoke, dust clouds, and similar obscuring factors.","situationalEffects":[{"id":"advanced-binoculars-distant-obscured-study","type":"difficultyModifier","appliesWhen":"equipped","attributeKeys":["insight"],"skillKeys":["study"],"modifier":-1,"label":"Advanced Binoculars: distant and obscured study","rulesText":"Reduce the Difficulty of distant observation by 1, and ignore Difficulty increases from darkness, smoke, dust clouds, and similar obscuring factors."}]},{"id":"bolt-cutters","name":"Bolt Cutters","category":"gear","techLevel":1,"atomaCategory":"Industrial","cost":2,"rarity":2,"bookPage":156,"pdfPage":28,"description":"Heavy shears for cutting bolts, cables, locks, damaged vehicle sections, and similar metal fastenings; enables Might (Operate) tests for such tasks.","fullDescription":"A heavy-duty set of shears or scissors, designed for cutting through metal bolts, cables, and other solid fastenings. Also useful for breaking heavy physical locks or cutting away damaged sections of vehicles and similar in an emergency. This allows a character to break heavy metal fastenings and similar objects with a Might (Operate) Skill Test.","situationalEffects":[{"id":"bolt-cutters-heavy-fastenings","type":"enableTest","appliesWhen":"equipped","attributeKeys":["might"],"skillKeys":["operate"],"label":"Bolt Cutters: heavy metal fastenings","rulesText":"Allows a character to break heavy metal fastenings and similar objects with a Might (Operate) Skill Test."}]},{"id":"bypass-kit","name":"Bypass Kit","category":"tech","techLevel":4,"atomaCategory":"Security","qualities":["Powered (Break)"],"cost":5,"rarity":4,"bookPage":156,"pdfPage":28,"description":"Powered tools for defeating locks and security systems, including scramblers, jammers, dazzlers, and nanotech lockpicks.","fullDescription":"Once used by security and emergency services to bypass locks and other security systems in an emergency, these tools, including electromagnetic scramblers, radio frequency jammers, infrared dazzlers, nanotech lockpicks, and similar devices to blind, overwhelm, or confuse security systems, were also extremely useful to those with more illicit intentions. Today, they are a valuable tool for anyone trying to get into secured sections of ancient ruins. A bypass kit allows a character to attempt a Skill Test to unlock a locked door or disable a security system. A bypass kit is a powered device which recharges after a Break rest.","situationalEffects":[{"id":"bypass-kit-locks-security","type":"enableTest","appliesWhen":"equipped","attributeKeys":["quickness","insight"],"skillKeys":["sneak","operate"],"label":"Bypass Kit: locks and security systems","rulesText":"Allows a character to attempt a Skill Test to unlock a locked door or disable a security system."}]},{"id":"climbing-gear","name":"Climbing Gear","category":"gear","techLevel":3,"atomaCategory":"Industrial","supplyPointCost":3,"cost":4,"rarity":2,"bookPage":157,"pdfPage":29,"description":"Climbing axe, pitons, synth rope, and grip-gloves; reduces Might (Move) climbing Difficulty by 1 and permits climbs that might otherwise be impossible.","fullDescription":"A collection of tools and devices to aid in climbing sheer surfaces, mountains, cliffs, and collapsing ruins. It contains a sturdy climbing axe, several pitons that can be wedged into cracks, a length of synth-rope, and a pair of grip-gloves that enhance the wearer's grip and allow them to hold on to objects and surfaces more effectively. These reduce the Difficulty of all Might (Move) tests to climb by 1 and allow a character to attempt a Skill Test to climb surfaces that might not be possible to climb otherwise.","situationalEffects":[{"id":"climbing-gear-climb-difficulty","type":"difficultyModifier","appliesWhen":"equipped","attributeKeys":["might"],"skillKeys":["move"],"modifier":-1,"label":"Climbing Gear: -1 Difficulty climbing","rulesText":"Reduce the Difficulty of all Might (Move) tests to climb by 1 and permit climbs that might otherwise be impossible."}]},{"id":"combat-automed","name":"Combat Automed","category":"tech","techLevel":5,"atomaCategory":"Military","qualities":["Powered (Break)"],"cost":6,"rarity":5,"bookPage":157,"pdfPage":29,"description":"Under-armor automated medical system. When the wearer suffers an Injury, it discharges, treats that Injury immediately, and the wearer may add 1 to Threat to self-revive.","fullDescription":"A collection of linked sensors and automated medical devices designed to be worn under armor. These respond to significant changes in the wearer's vital signs and administer aid immediately upon detecting an Injury. A Combat Automed operates automatically. When the wearer suffers an Injury, the Automed immediately discharges its power supply, and treats that Injury immediately. The wearer may then add +1 to Threat to self-revive and cease being defeated. A Combat Automed is powered and recharges after a Break rest. A Weaver with an Interface Lens can override the automated processes of a Combat Automed, and remotely operate them as if they were an Emergency Trauma Kit.","wearableUnderArmor":true,"itemActions":[{"id":"combat-automed-self-revive-threat","type":"manualResourceChange","resource":"threat","operation":"add","value":1,"label":"Self-revive after Automed treatment","rulesText":"When the wearer suffers an Injury and the Automed treats it, the wearer may add 1 to Threat to self-revive and cease being defeated."}]},{"id":"combat-medkit","name":"Combat Medkit","category":"gear","techLevel":4,"atomaCategory":"Military","qualities":["Powered (Break)"],"cost":6,"rarity":5,"bookPage":157,"pdfPage":29,"description":"Combat medical kit for treating injuries and long-term care; can treat damage rating up to 6 and spend 1 Momentum to wake a defeated character after treatment.","fullDescription":"A collection of tools and supplies for patching up injuries, specialized to help patch up soldiers injured during combat. The main tool is a wand-like device which uses nanotech to seal wounds and stimulate natural healing processes, along with a number of modular attachments that help dealing with specific types of combat injury, and which are capable of stimulating adrenaline production to get a wounded soldier back on their feet fast. A Combat Medkit allows a character to treat Injuries a character has suffered, as well as providing the means to provide longer-term care to heal treated injuries. Further, when used to treat an Injury, the user may spend 1 Momentum to immediately wake a defeated character, allowing them to act once more. A Combat Medkit can treat Injuries with a damage rating of up to 6. Combat Medkits are powered and recharge after a Break rest.","situationalEffects":[{"id":"combat-medkit-treat-injuries-combat","type":"enableTest","appliesWhen":"equipped","attributeKeys":["insight","resolve"],"skillKeys":["survive","operate"],"label":"Combat Medkit: treat severe Injuries","rulesText":"Allows treatment of Injuries up to damage rating 6 and provides longer-term care."}],"itemActions":[{"id":"combat-medkit-wake-defeated-momentum","type":"manualResourceChange","resource":"momentum","operation":"spend","value":1,"label":"Wake defeated character","rulesText":"When used to treat an Injury, spend 1 Momentum to immediately wake a defeated character."}]},{"id":"communicator","name":"Communicator","category":"tech","techLevel":3,"atomaCategory":"Domestic","qualities":["Powered (Break)"],"cost":3,"rarity":2,"bookPage":158,"pdfPage":30,"description":"Handheld digital radio for audio, images, video, and text within roughly one kilometer. Sending a message adds 1 to Threat because hostile machines may detect the signal.","fullDescription":"A small electronic device, small enough to fit into the palm of the hand, which can send and receive digital radio signals over a distance. With no communications infrastructure available, these signals only work over a limited distance, no more than a kilometer, and are often interrupted by terrain like hills. Two or more of these devices touched together will pair them, so that they send and receive on the same frequency. They can send and receive audio, still images, video, and text, and can read such information from a linked data storage device, but they have very little storage capacity themselves. However, radio signals are risky, and digital ones especially so, for they could be detected by Wakers. Each time a message is sent using a Communicator, add 1 to Threat. Communicators are powered, and recharge after a Break rest, but there are very few situations where a communicator would need to use all its power all at once.","itemActions":[{"id":"communicator-send-message-threat","type":"manualResourceChange","resource":"threat","operation":"add","value":1,"label":"Send Communicator message","rulesText":"Each time a message is sent using a Communicator, add 1 to Threat."}]},{"id":"covert-cloak","name":"Covert Cloak","category":"tech","techLevel":4,"atomaCategory":"Security","qualities":["Powered (Break)"],"cost":5,"rarity":4,"bookPage":158,"pdfPage":30,"description":"Sensor-baffling camouflage cloak. Adds +1 success to opposed hiding tests against searchers and allows hiding without other cover or concealment.","fullDescription":"A long, hooded cloak made of an advanced metallic polymer, embedded with pigment-shifting nanoparticles. A kinetic battery is mounted in the clasp. The cloak is large enough that it can cover a person's entire body. When active, the cloak shifts color to blend in with the surroundings, absorbs the wearer's body heat, and diffuses and refracts active sensors. A Covert Cloak adds +1 success to the wearer's Skill Tests in an opposed Test when an enemy is searching for them, and it allows a character to hide even without any other available cover or concealment. A covert cloak is a powered device, which recharges after a Break rest.","situationalEffects":[{"id":"covert-cloak-opposed-hiding-success","type":"successModifier","appliesWhen":"equipped","attributeKeys":["quickness"],"skillKeys":["sneak"],"successes":1,"label":"Covert Cloak: +1 success when hiding","rulesText":"Adds +1 success to opposed hiding tests against searchers and allows hiding without other cover or concealment."}]},{"id":"data-storage-device","name":"Data Storage Device","category":"tech","techLevel":3,"atomaCategory":"Domestic","qualities":["Powered (Break)"],"cost":3,"rarity":3,"bookPage":159,"pdfPage":31,"description":"Thumb-sized data storage device that magnetically connects to computers. A Weaver with a reader lens can browse and move stored data more easily.","fullDescription":"These tiny devices can store large amounts of data from computer systems and similar devices. Most are short, blank oval or rectangular devices about the size of a human thumb, and the term 'thumb drive' has been used to describe them for as long as anyone can remember. Most will magnetically fasten to the outer case of a computer, connecting to the computer in the process, at which point data can be transferred to or from the storage device. A Weaver with a reader lens can allow a user to see a list of the contents: file names, types of data, and so forth, and can normally move data to and from a storage device more easily than a non-Weaver. Data Storage Devices are powered, and recharge after a Break rest, but there are very few situations where it would need to use all its power all at once. The data stored within remains intact while recharging but cannot be accessed."},{"id":"demolitions-kit","name":"Demolitions Kit","category":"gear","techLevel":5,"atomaCategory":"Military","cost":6,"rarity":5,"bookPage":159,"pdfPage":31,"description":"Micro-fabricator and scanners for creating, placing, detonating, and disarming explosive charges. Charges normally use Insight (Operate) and can inflict Burned injuries with high damage.","fullDescription":"A case containing a micro-fabricator and a collection of scanners, designed for carrying out demolitions work. The scanners can survey a standing structure and detect weak points and load-bearing elements, as well as calculating the necessary explosive yield to place at each point to achieve the desired destruction. The fabricator then produces stable explosives fitted with detonators and serves as a remote detonator for these charges. The device also contains tools to defuse explosive charges. This kit allows a character to make Skill Tests to create, plant, set, and disarm explosive charges. These will normally be Insight (Operate) tests. An explosive charge cannot easily be used during combat, as they need to be planted and set in place before they can be detonated. An explosive charge will inflict Injuries of burned [x2] 5 to any character, creature, or vehicle within the same zone, though it only counts as a breaker attack against a target which the explosive is fixed to.","situationalEffects":[{"id":"demolitions-kit-explosive-charges","type":"enableTest","appliesWhen":"equipped","attributeKeys":["insight"],"skillKeys":["operate"],"label":"Demolitions Kit: create, plant, set, and disarm charges","rulesText":"Allows Skill Tests, normally Insight (Operate), to create, plant, set, and disarm explosive charges."}]},{"id":"emergency-trauma-kit","name":"Emergency Trauma Kit","category":"gear","techLevel":4,"atomaCategory":"Industrial","qualities":["Powered (Bed)"],"cost":5,"rarity":4,"bookPage":159,"pdfPage":31,"description":"Advanced medical scanner and nanotech tools that can heal a single Injury with an Insight (Operate) test at Difficulty equal to damage rating minus 2; non-Weavers add 1 to Threat.","fullDescription":"An advanced set of medical tools for rapidly stabilizing serious injuries. It contains a diagnosis wand to scan the patient to determine the nature and extent of their injuries. This is designed to broadcast the information to a reader lens, making them difficult for non-Weavers to use. Once it has diagnosed the patient, a small assortment of nanotech tissue regenerators and similar devices allow broken bones to be fixed, burnt or torn flesh to be healed, and so forth. An Emergency Trauma kit can completely heal any single Injury with a successful Insight (Operate) Test with a Difficulty equal to the Injury's damage rating -2. An Emergency Trauma Kit is powered, and recharges after a Bed rest. Due to the reliance on a reader lens, a non-Weaver attempting to use an Emergency Trauma Kit adds 1 to Threat.","situationalEffects":[{"id":"emergency-trauma-kit-heal-injury","type":"enableTest","appliesWhen":"equipped","attributeKeys":["insight"],"skillKeys":["operate"],"label":"Emergency Trauma Kit: heal one Injury","rulesText":"Can completely heal any single Injury with a successful Insight (Operate) Test at Difficulty equal to the Injury damage rating minus 2."}],"itemActions":[{"id":"emergency-trauma-kit-non-weaver-threat","type":"manualResourceChange","resource":"threat","operation":"add","value":1,"label":"Non-Weaver use","rulesText":"A non-Weaver attempting to use an Emergency Trauma Kit adds 1 to Threat."}]},{"id":"fire-suppression-kit","name":"Fire Suppression Kit","category":"gear","techLevel":3,"atomaCategory":"Industrial","qualities":["Powered (Bed)"],"cost":4,"rarity":4,"bookPage":160,"pdfPage":32,"description":"Cylinder and trigger unit that sprays cold oxygen-binding foam to extinguish fire with a Quickness (Operate) test.","fullDescription":"A bulky cylinder affixed to a trigger unit, a fire suppression kit is designed to spray a fire with an extremely cold expanding foam which binds oxygen in the surrounding air, starving the fire of heat and oxygen, extinguishing it rapidly. The cylinder continually refills over time. A Fire Suppression Kit allows a character to make a Quickness (Operate) Test to extinguish a fire; the Difficulty is determined by the size of the fire and how much fuel it has. A Fire Suppression Kit is powered, and recharges after a Bed rest.","situationalEffects":[{"id":"fire-suppression-kit-extinguish-fire","type":"enableTest","appliesWhen":"equipped","attributeKeys":["quickness"],"skillKeys":["operate"],"label":"Fire Suppression Kit: extinguish fire","rulesText":"Allows a Quickness (Operate) Test to extinguish a fire. Difficulty depends on fire size and fuel."}]},{"id":"first-aid-kit-tl2","name":"First Aid Kit (Tech Level 2)","category":"gear","techLevel":2,"atomaCategory":"Domestic","qualities":[],"cost":2,"rarity":2,"bookPage":160,"pdfPage":32,"description":"First aid supplies for treating injuries. Treats Injuries with damage rating up to Tech Level + 1. This version has three uses before its supplies are spent.","fullDescription":"A collection of tools and supplies for patching up injuries. Tech Level 2 versions include simple tools, such as bandages, dressings, sutures, antiseptics, adhesives to seal wounds, and secure bandages designed to fit snugly over wounds with minimal risk of coming loose. A First Aid Kit allows a character to treat Injuries a character has suffered. A kit can treat Injuries with a cost of the kit's tech level +1. A Tech Level 2 kit can be used three times before the supplies are used up.","uses":3,"situationalEffects":[{"id":"first-aid-kit-treat-injuries","type":"enableTest","appliesWhen":"equipped","attributeKeys":["insight","resolve"],"skillKeys":["survive","operate"],"label":"First Aid Kit: treat Injuries","rulesText":"Allows a character to treat Injuries. A kit can treat Injuries with a damage rating up to the kit Tech Level plus 1."}]},{"id":"first-aid-kit-tl3","name":"First Aid Kit (Tech Level 3)","category":"gear","techLevel":3,"atomaCategory":"Domestic","qualities":["Powered (Break)"],"cost":3,"rarity":2,"bookPage":160,"pdfPage":32,"description":"First aid supplies for treating injuries. Treats Injuries with damage rating up to Tech Level + 1. This version is powered and recharges after a Break rest.","fullDescription":"A collection of tools and supplies for patching up injuries. Tech Level 3 versions include a digital diagnosis and assistant device and attached tools that dispense chemical treatments that form a seal over wounds and stimulate natural healing. A First Aid Kit allows a character to treat Injuries a character has suffered. A kit can treat Injuries with a cost of the kit's tech level +1. Tech Level 3 kits are powered and recharge after a Break rest.","situationalEffects":[{"id":"first-aid-kit-treat-injuries","type":"enableTest","appliesWhen":"equipped","attributeKeys":["insight","resolve"],"skillKeys":["survive","operate"],"label":"First Aid Kit: treat Injuries","rulesText":"Allows a character to treat Injuries. A kit can treat Injuries with a damage rating up to the kit Tech Level plus 1."}]},{"id":"first-aid-kit-tl4","name":"First Aid Kit (Tech Level 4)","category":"gear","techLevel":4,"atomaCategory":"Domestic","qualities":["Powered (Break)"],"cost":4,"rarity":2,"bookPage":160,"pdfPage":32,"description":"First aid supplies for treating injuries. Treats Injuries with damage rating up to Tech Level + 1. This version is powered and recharges after a Break rest.","fullDescription":"A collection of tools and supplies for patching up injuries. Tech Level 4 versions contain the entire kit within a single wand-like nanotech device which can reknit torn flesh and broken bone, soothe burned tissues, and ease pain. A First Aid Kit allows a character to treat Injuries a character has suffered. A kit can treat Injuries with a cost of the kit's tech level +1. Tech Level 4 kits are powered and recharge after a Break rest.","situationalEffects":[{"id":"first-aid-kit-treat-injuries","type":"enableTest","appliesWhen":"equipped","attributeKeys":["insight","resolve"],"skillKeys":["survive","operate"],"label":"First Aid Kit: treat Injuries","rulesText":"Allows a character to treat Injuries. A kit can treat Injuries with a damage rating up to the kit Tech Level plus 1."}]},{"id":"food-and-water-1-day","name":"Food and Water (1 day)","category":"gear","techLevel":1,"atomaCategory":["Domestic","Hand-Made"],"cost":1,"rarity":1,"bookPage":160,"pdfPage":32,"description":"Food and drink sufficient to sustain one person for one day; may be local provisions or Atoma-made ration and water.","fullDescription":"Sufficient food and drink to sustain a single person for a single day. The specifics of this depend entirely on the source. Each community has their own traditional recipes, staples, and delicacies, and the kinds of food that are obtained for traveling are different to those which are traded to be cooked and prepared at home later. Atoma-made food tends to be bland, but filling, delivered as a nutrient-dense ration brick that can be stored for months. Atomas can also produce bottles of pure water."},{"id":"hand-scanner","name":"Hand Scanner","category":"tech","techLevel":4,"atomaCategory":"Security","qualities":["Powered (Break)"],"cost":5,"rarity":4,"bookPage":161,"pdfPage":33,"description":"Handheld or wrist-mounted scanner that reduces search or study Difficulty by 1 and can detect clues beyond normal human senses.","fullDescription":"A compact handheld or wrist-mounted device which can broadcast, receive, and analyze a variety of signals, allowing it to scan and study the environment in detailed ways that human eyesight alone cannot. They are invaluable for intensive, even forensic analysis of an area, and for finding secrets which would otherwise be undetectable. Hand scanners can interface with a reader lens, providing a detailed augmented-reality overlay of an environment, and thus they are often sought-after by Weavers. A Hand Scanner reduces the Difficulty of any Skill Test to search or study an area, object, or person by 1, or allows a character to attempt to search for things which are not detectable by normal human sight, smell, hearing, etc. A hand scanner is a powered device, which recharges after a Break rest.","situationalEffects":[{"id":"hand-scanner-search-study-difficulty","type":"difficultyModifier","appliesWhen":"equipped","attributeKeys":["insight"],"skillKeys":["study","operate"],"modifier":-1,"label":"Hand Scanner: -1 Difficulty searching or studying","rulesText":"Reduce Difficulty by 1 when searching or studying an area, object, or person, or attempt searches beyond normal human senses."}]},{"id":"heavy-vehicle-components","name":"Heavy Vehicle Components","category":"gear","techLevel":3,"atomaCategory":"Industrial","cost":5,"rarity":3,"bookPage":161,"pdfPage":33,"description":"Spare and replacement parts for repairing routine wear on large industrial cargo vehicles; not enough to build a complete vehicle.","fullDescription":"Components to repair a large industrial cargo vehicle. This is not sufficient to construct a complete vehicle, but rather provides a kit of common spare and replacement parts to perform routine maintenance and repairs on a large vehicle. These are engine and propulsion components that typically wear out fastest, requiring routine replacement."},{"id":"illuminator","name":"Illuminator","category":"tech","techLevel":3,"atomaCategory":"Domestic","qualities":["Powered (Breather)"],"supplyPointCost":3,"cost":3,"rarity":1,"bookPage":161,"pdfPage":33,"description":"Simple bright light device usable by any character regardless of Tech Level. It cannot normally be discharged intentionally.","fullDescription":"A simple device that shines a bright light over an area. These come in a variety of different forms and styles. They are relatively easy to assemble from spare parts, and simple enough that anyone can use them. Illuminators are powered, but they cannot be discharged normally. They may still be discharged because of environmental effects, complications, or similar, but there is no real way to use an illuminator in such a way that the entire kinetic battery is emptied all at once. If discharged, they recharge after a Breather rest. A character can always use an Illuminator regardless of their Tech Level."},{"id":"inductive-charger","name":"Inductive Charger","category":"tech","techLevel":3,"atomaCategory":"Domestic","qualities":["Powered (Bed)"],"cost":3,"rarity":2,"bookPage":162,"pdfPage":34,"description":"Small battery charger. When discharged, it immediately recharges a Breather item, lets a Break item recharge at the next Breather, or lets a Bed item recharge at the next Break.","fullDescription":"A small black disc or ring containing a kinetic battery, often with an illuminated rim, intended to transfer the charge of its own battery into another kinetic battery, reducing the time until the item is fully charged. An Inductive Charger is a powered item which recharges after a Bed rest, but it does not do anything unless it is discharged. When discharged, it recharges a Powered (Breather) item as if the item had received a Breather rest. A Powered (Break) item will recharge during the next Breather. A Powered (Bed) item will recharge during the next Break."},{"id":"inductive-charger-industrial","name":"Inductive Charger, Industrial","category":"tech","techLevel":4,"atomaCategory":"Industrial","qualities":["Powered (Bed)"],"cost":5,"rarity":4,"bookPage":162,"pdfPage":34,"description":"High-capacity charger. When discharged, it recharges up to three Breather items or one Break item as if they had rested; a Bed item recharges at the next Breather.","fullDescription":"A large box containing a heavy-duty kinetic battery, intended to transfer the charge of its own battery into another kinetic battery, reducing the time until the item is fully charged. These are much larger and have a much higher capacity than conventional inductive chargers, allowing them to charge more power-hungry items, or several smaller items. They are often mounted in the back of large vehicles or placed at the heart of a workplace where they can be easily accessed by people recharging their tools. An industrial inductive charger is a powered item which recharges after a Bed rest, but it does not do anything unless it is discharged. When discharged, it recharges up to three Powered (Breather) items or up to one Powered (Break) item as if the items had received the appropriate rest. A Powered (Bed) item will recharge during the next Breather."},{"id":"industrial-plasma-cutter","name":"Industrial Plasma Cutter","category":"tech","techLevel":4,"atomaCategory":"Industrial","qualities":["Powered (Bed)"],"cost":5,"rarity":4,"bookPage":162,"pdfPage":34,"description":"Bulky plasma beam tool for cutting or welding solid objects. Complex, resistant, or hurried work may require a Quickness (Operate) test.","fullDescription":"A bulky device which produces a small, intense plasma beam that can cut through most substances. The device contains stabilizers to help the wielder hold the heavy device steady and make smooth cuts, but the size, weight, and the small cutting beam make industrial plasma cutters almost impossible to use as weapons. With a few minor adjustments, the beam can be diffused to function as a welder, melting two surfaces together, though this is not as efficient. An industrial plasma cutter allows the user to cut through solid objects with ease. Complex cuts, cuts through tough or resistant materials, welding, or hurried work, may require a Quickness (Operate) Skill Test. An industrial plasma cutter is powered, and recharges after a Bed rest.","situationalEffects":[{"id":"industrial-plasma-cutter-cut-weld","type":"enableTest","appliesWhen":"equipped","attributeKeys":["quickness"],"skillKeys":["operate"],"label":"Industrial Plasma Cutter: cut or weld objects","rulesText":"Allows cutting through solid objects. Complex cuts, resistant materials, welding, or hurried work may require a Quickness (Operate) Skill Test."}]},{"id":"light-vehicle-components","name":"Light Vehicle Components","category":"gear","techLevel":3,"atomaCategory":"Industrial","cost":3,"rarity":3,"bookPage":163,"pdfPage":35,"description":"Spare and replacement parts for routine maintenance and repairs on small civilian or commercial vehicles; not enough to build a complete vehicle.","fullDescription":"Components to repair a small civilian or commercial vehicle. This is not sufficient to construct a complete vehicle, but rather provides a kit of common spare and replacement parts to perform routine maintenance and repairs on a small vehicle. These are engine and propulsion components that typically wear out fastest, requiring routine replacement."},{"id":"medical-kit-tl3","name":"Medical Kit (Tech Level 3)","category":"gear","techLevel":3,"atomaCategory":"Industrial","qualities":["Powered (Breather)"],"cost":4,"rarity":4,"bookPage":163,"pdfPage":35,"description":"Expanded medical supplies for treating injuries and providing longer-term care. Can treat Injuries with damage rating up to Tech Level + 1.","fullDescription":"A collection of tools and supplies for patching up injuries. Versions exist at various tech levels, with different kinds of tools at each, similar to first aid kits but with a wider range of supplies and tools. A Medical Kit allows a character to treat Injuries a character has suffered, as well as providing the means to provide longer-term care to heal treated injuries. A kit can treat Injuries with a damage rating of the kit's Tech Level +1. Medical kits are powered and recharge after a Breather rest.","situationalEffects":[{"id":"medical-kit-treat-injuries-long-term-care","type":"enableTest","appliesWhen":"equipped","attributeKeys":["insight","resolve"],"skillKeys":["survive","operate"],"label":"Medical Kit: treatment and long-term care","rulesText":"Allows treatment of Injuries and provides longer-term care. A kit can treat Injuries with a damage rating up to the kit Tech Level plus 1."}]},{"id":"medical-kit-tl4","name":"Medical Kit (Tech Level 4)","category":"gear","techLevel":4,"atomaCategory":"Industrial","qualities":["Powered (Breather)"],"cost":5,"rarity":4,"bookPage":163,"pdfPage":35,"description":"Expanded medical supplies for treating injuries and providing longer-term care. Can treat Injuries with damage rating up to Tech Level + 1.","fullDescription":"A collection of tools and supplies for patching up injuries. Versions exist at various tech levels, with different kinds of tools at each, similar to first aid kits but with a wider range of supplies and tools. A Medical Kit allows a character to treat Injuries a character has suffered, as well as providing the means to provide longer-term care to heal treated injuries. A kit can treat Injuries with a damage rating of the kit's Tech Level +1. Medical kits are powered and recharge after a Breather rest.","situationalEffects":[{"id":"medical-kit-treat-injuries-long-term-care","type":"enableTest","appliesWhen":"equipped","attributeKeys":["insight","resolve"],"skillKeys":["survive","operate"],"label":"Medical Kit: treatment and long-term care","rulesText":"Allows treatment of Injuries and provides longer-term care. A kit can treat Injuries with a damage rating up to the kit Tech Level plus 1."}]},{"id":"medium-vehicle-components","name":"Medium Vehicle Components","category":"gear","techLevel":3,"atomaCategory":"Industrial","cost":4,"rarity":3,"bookPage":163,"pdfPage":35,"description":"Spare and replacement parts for routine maintenance and repairs on medium civilian or commercial vehicles; not enough to build a complete vehicle.","fullDescription":"Components to repair a medium civilian or commercial vehicle. This is not sufficient to construct a complete vehicle, but rather provides a kit of common spare and replacement parts to perform routine maintenance and repairs on a medium vehicle. These are engine and propulsion components that typically wear out fastest, requiring routine replacement."},{"id":"nanogram-controller","name":"Nanogram Controller","category":"tech","techLevel":4,"atomaCategory":"Industrial","qualities":["Powered (Break)"],"cost":5,"rarity":3,"bookPage":163,"pdfPage":35,"description":"Wrist-mounted housing and charger for a nanogram swarm. The wearer gains a Nanogram Genius as a companion non-player character.","fullDescription":"A small metallic wristband, bracelet, watch, or cuff, which acts as the housing and charging unit for a nanogram swarm. When not in use, the nanogram swarm resides within a compartment within the device, charging from an internal kinetic battery. The wearer of a Nanogram Controller gains a Nanogram Genius as a Companion NPC. This is a powered device, which recharges after a Break rest."},{"id":"privacy-cloak","name":"Privacy Cloak","category":"tech","techLevel":4,"atomaCategory":"Security","qualities":["Powered (Bed)"],"cost":5,"rarity":4,"bookPage":164,"pdfPage":36,"description":"Portable umbrella-like device that projects a short-lived opaque and soundproof barrier large enough for two people close together.","fullDescription":"Looking almost like an umbrella without any canopy stretched between the ribs, a privacy cloak is an ingenious piece of technology. Once the central rod has been extended and the ribs unfolded, it projects a thin energy barrier, large enough for two people to stand close together within it, which is nearly opaque and entirely soundproof from the outside, preventing anyone outside from seeing or hearing into the space. Those within can still see and hear outside of it. The field lasts for no more than five minutes, after which the device's battery is drained. The device recharges after a Bed rest."},{"id":"restraints","name":"Restraints","category":"gear","techLevel":1,"atomaCategory":"Security","cost":2,"rarity":3,"bookPage":164,"pdfPage":36,"description":"Lockable metal bracelets linked by chain or cable. Bound characters are physically impaired; breaking them requires Might (Survive) Difficulty 4.","fullDescription":"A pair of lockable metal bracelets linked by a short chain or cable. A key or other means of unlocking the restraints is included with any set of restraints produced by an Atoma, though sets of restraints found in the ruins may have been separated from their keys long ago. A new key can normally be fashioned by spending 1 Supply Point. A character wearing restraints has their hands bound closely together, in front of them or behind them, at the discretion of the character applying the restraints, and finds their physical actions impaired. It requires a Might (Survive) Test with a Difficulty of 4 to break restraints while wearing them."},{"id":"rope-20m","name":"Rope (20m)","category":"gear","techLevel":1,"atomaCategory":"Hand-Made","cost":1,"rarity":1,"bookPage":164,"pdfPage":36,"description":"Twenty meters of tightly woven natural-fiber rope.","fullDescription":"A tightly-woven bundle of strands made from natural fibers. Normally produced in 20 meter lengths. The strands are twisted and braided together to increase the rope's effectiveness and durability."},{"id":"short-ranged-digital-communicator-hub","name":"Short-ranged Digital Communicator Hub","category":"tech","techLevel":4,"atomaCategory":"Miscellaneous","qualities":["Powered (Special)"],"cost":6,"rarity":4,"bookPage":165,"pdfPage":37,"description":"Generator-powered antenna and signal processor that links communicators within about ten kilometers, terrain permitting.","fullDescription":"While portable communicators are useful, they were designed to connect to a much larger communications network that stretched further than any modern Everan has ever traveled. This network no longer exists, however, having been destroyed during the war. Still, for more local communication needs, scavengers occasionally find short-ranged communication hubs, which combine an antenna and signal-processing systems to connect together numerous communicators. The communicator hub can connect to communicators up to 10 kilometers away, limited by terrain. A hub in the middle of a valley will be limited by surrounding hills. Any communicator linked to the hub can communicate with any other communicator linked to it. Individual communicators are assigned an identifier, a name or number, to speed up connecting to specific people. A communicator hub is powered and must be connected to a persistent power source, a generator of some sort. It cannot recharge on its own."},{"id":"stylus","name":"Stylus","category":"tech","techLevel":4,"atomaCategory":"Domestic","qualities":["Powered"],"cost":3,"rarity":2,"bookPage":165,"pdfPage":37,"description":"Nanotech pigment applicator used to mark or erase durable color on surfaces, including GLIFs. Usable by any character regardless of Tech Level.","fullDescription":"The humble Stylus is a slim gray or black metallic cylinder somewhat longer than a person's middle finger, which can apply a durable nanometer-thick layer of pigment of any color to any surface quickly and precisely. This pigment layer is normally set to degrade over time, usually 24 or 48 hours, but can be set to last far longer, and the Stylus can erase the pigment as desired. Even aside from their use with GLIFs, they are useful for coloring clothing and decorating dwellings, leaving messages for others, marking resource claims or highlighting hazards in the wilds and the ruins, and a variety of other incidental uses. A Stylus is powered by a tiny kinetic battery cell, and essentially never runs out of pigment, meaning that it continues functioning basically forever. While not abundant, it is not uncommon to find them in the ruins of the old cities, and most large communities and nomadic groups are likely to have one or two available, particularly Archivist enclaves who use these devices to mark GLIFs. A Stylus can be used by any character, regardless of Tech Level, as their controls are designed to be as simple and intuitive as possible.","situationalEffects":[{"id":"stylus-glif-marking","type":"enableTest","appliesWhen":"equipped","attributeKeys":["insight","quickness"],"skillKeys":["operate","study"],"label":"Stylus: mark and erase GLIFs","rulesText":"Can apply or erase durable pigment on surfaces, including GLIF markings, and can be used regardless of Tech Level."}]},{"id":"surveillance-kit","name":"Surveillance Kit","category":"tech","techLevel":3,"atomaCategory":"Security","qualities":["Powered (Break)"],"cost":4,"rarity":4,"bookPage":166,"pdfPage":38,"description":"Case of small cameras and microphones that can be placed to covertly record or transmit information from an area.","fullDescription":"A storage case containing an assortment of devices useful for covertly observing a location. This consists of several small cameras and microphones, all of which can record information individually or be set to send that information back to a computer in the case. A surveillance kit can be set up in a specific area with a Skill Test, allowing them to gather information covertly from that area. Failure on the Test may mean that the devices are detected or not placed where they can gather information properly. A Surveillance Kit is a powered device which recharges after a Break rest."},{"id":"survival-kit-tl2","name":"Survival Kit (Tech Level 2)","category":"gear","techLevel":2,"atomaCategory":"Industrial","qualities":[],"cost":3,"rarity":2,"bookPage":166,"pdfPage":38,"description":"Tent, water filter, and fire-starting kit. Reduces the Difficulty of wilderness shelter tests by 1; Tech Level 3 adds thermal shelter, improved filtration, and electric cooking.","fullDescription":"A pack containing a compact tent, a water filter, and a lighter to start fires. The Tech Level 3 version adds thermal filaments to the tent to maintain a comfortable temperature, a more advanced water filtration system, and an electric heater/cooker as an alternative to a campfire. The Survival Kit reduces the Difficulty of any Skill Test to find shelter in the wilderness by 1.","situationalEffects":[{"id":"survival-kit-shelter-difficulty","type":"difficultyModifier","appliesWhen":"equipped","attributeKeys":["insight","resolve"],"skillKeys":["survive"],"modifier":-1,"label":"Survival Kit: -1 Difficulty finding shelter","rulesText":"Reduce the Difficulty of any Skill Test to find shelter in the wilderness by 1."}]},{"id":"survival-kit-tl3","name":"Survival Kit (Tech Level 3)","category":"gear","techLevel":3,"atomaCategory":"Industrial","qualities":["Powered (Break)"],"cost":4,"rarity":4,"bookPage":166,"pdfPage":38,"description":"Tent, water filter, and fire-starting kit. Reduces the Difficulty of wilderness shelter tests by 1; Tech Level 3 adds thermal shelter, improved filtration, and electric cooking.","fullDescription":"A pack containing a compact tent, a water filter, and a lighter to start fires. The Tech Level 3 version adds thermal filaments to the tent to maintain a comfortable temperature, a more advanced water filtration system, and an electric heater/cooker as an alternative to a campfire. The Survival Kit reduces the Difficulty of any Skill Test to find shelter in the wilderness by 1. A Tech Level 3 Survival Kit is also a powered item which recharges after a Break rest.","situationalEffects":[{"id":"survival-kit-shelter-difficulty","type":"difficultyModifier","appliesWhen":"equipped","attributeKeys":["insight","resolve"],"skillKeys":["survive"],"modifier":-1,"label":"Survival Kit: -1 Difficulty finding shelter","rulesText":"Reduce the Difficulty of any Skill Test to find shelter in the wilderness by 1."}]},{"id":"synth-rope-20m","name":"Synth Rope (20m)","category":"gear","techLevel":2,"atomaCategory":"Industrial","cost":2,"rarity":2,"bookPage":166,"pdfPage":38,"description":"Twenty meters of tough synthetic polymer rope, more durable than natural rope.","fullDescription":"A tightly-woven bundle of strands made from a tough synthetic polymer. Normally produced in 20 meter lengths when manufactured by an Atoma. The strands are twisted and braided together to increase the rope's effectiveness and durability, and the materials used are more durable and hard-wearing than naturally-made ropes."},{"id":"tactical-lens","name":"Tactical Lens","category":"tech","techLevel":4,"atomaCategory":"Military","cost":6,"rarity":4,"bookPage":166,"pdfPage":38,"description":"Combat reader lens. Re-roll one d20 on aimed ranged attacks or attacks against weak spots; may add 1 to Threat to send a five-word tactical message to an ally with a lens.","fullDescription":"A specialized form of reader lens, a tactical lens provides a heads-up display suited to combat uses. Before and during the War, these were issued to whole squads of soldiers, passing information back and forth silently. They are somewhat riskier to use now, as the signals they communicate with can be tracked by hostile machines. The wearer of a Tactical Lens may re-roll 1d20 on any ranged attack made when you spend time aiming, or when your target has a Truth which represents a weak spot. Further, when you take an action, you may add 1 to Threat to message to one ally also wearing a Tactical Lens. This message may include up to five words of text and mark a location or enemy you can see. This can be used to pass Truths representing information, such as knowledge of weaknesses, between characters.","situationalEffects":[{"id":"tactical-lens-aimed-ranged-reroll","type":"rerollModifier","appliesWhen":"equipped","attributeKeys":["quickness","insight"],"skillKeys":["fight"],"label":"Tactical Lens: reroll aimed ranged attacks","rulesText":"May re-roll one d20 on any ranged attack made when aiming, or when the target has a Truth representing a weak spot."}],"itemActions":[{"id":"tactical-lens-message-threat","type":"manualResourceChange","resource":"threat","operation":"add","value":1,"label":"Send tactical message","rulesText":"When taking an action, the wearer may add 1 to Threat to send a five-word message and mark a visible location or enemy for an ally also wearing a Tactical Lens."}]},{"id":"toolkit-tl1","name":"Toolkit (Tech Level 1)","category":"gear","techLevel":1,"atomaCategory":"Domestic","qualities":[],"supplyPointCost":2,"cost":1,"rarity":1,"bookPage":167,"pdfPage":39,"description":"Assorted tools for maintaining and repairing devices. Can repair technology up to one Tech Level higher than the kit.","fullDescription":"A box, bag, or other storage case containing an assortment of precise tools for performing maintenance and repairs on devices. Versions exist at various tech levels, with different kinds of tools at each: a Tech Level 1 kit may consist of wrenches, screwdrivers, pliers, and similar items, while a Tech Level 3 kit may contain precision devices suitable for working on microelectronics. A toolkit allows a character to repair a damaged piece of technology. A toolkit can repair technology with a Tech Level 1 higher than that of the toolkit.","situationalEffects":[{"id":"toolkit-repair-technology","type":"enableTest","appliesWhen":"equipped","attributeKeys":["insight","quickness"],"skillKeys":["operate"],"label":"Toolkit: repair technology","rulesText":"Allows a character to repair damaged technology with a Tech Level up to one higher than the toolkit."}]},{"id":"toolkit-tl2","name":"Toolkit (Tech Level 2)","category":"gear","techLevel":2,"atomaCategory":"Domestic","qualities":[],"supplyPointCost":3,"cost":2,"rarity":2,"bookPage":167,"pdfPage":39,"description":"Assorted tools for maintaining and repairing devices. Can repair technology up to one Tech Level higher than the kit.","fullDescription":"A box, bag, or other storage case containing an assortment of precise tools for performing maintenance and repairs on devices. Versions exist at various tech levels, with different kinds of tools at each: a Tech Level 1 kit may consist of wrenches, screwdrivers, pliers, and similar items, while a Tech Level 3 kit may contain precision devices suitable for working on microelectronics. A toolkit allows a character to repair a damaged piece of technology. A toolkit can repair technology with a Tech Level 1 higher than that of the toolkit.","situationalEffects":[{"id":"toolkit-repair-technology","type":"enableTest","appliesWhen":"equipped","attributeKeys":["insight","quickness"],"skillKeys":["operate"],"label":"Toolkit: repair technology","rulesText":"Allows a character to repair damaged technology with a Tech Level up to one higher than the toolkit."}]},{"id":"toolkit-tl3","name":"Toolkit (Tech Level 3)","category":"gear","techLevel":3,"atomaCategory":"Domestic","qualities":["Powered (Break)"],"supplyPointCost":4,"cost":3,"rarity":3,"bookPage":167,"pdfPage":39,"description":"Assorted tools for maintaining and repairing devices. Can repair technology up to one Tech Level higher than the kit.","fullDescription":"A box, bag, or other storage case containing an assortment of precise tools for performing maintenance and repairs on devices. Versions exist at various tech levels, with different kinds of tools at each: a Tech Level 1 kit may consist of wrenches, screwdrivers, pliers, and similar items, while a Tech Level 3 kit may contain precision devices suitable for working on microelectronics. A toolkit allows a character to repair a damaged piece of technology. A toolkit can repair technology with a Tech Level 1 higher than that of the toolkit. Tech Level 3 kits are powered and recharge after a Break rest.","situationalEffects":[{"id":"toolkit-repair-technology","type":"enableTest","appliesWhen":"equipped","attributeKeys":["insight","quickness"],"skillKeys":["operate"],"label":"Toolkit: repair technology","rulesText":"Allows a character to repair damaged technology with a Tech Level up to one higher than the toolkit."}]},{"id":"underwater-breathing-apparatus","name":"Underwater Breathing Apparatus","category":"tech","techLevel":3,"atomaCategory":"Industrial","cost":4,"rarity":3,"bookPage":167,"pdfPage":39,"description":"Compact mouth-worn device that produces breathable air from water; usable by any character regardless of Tech Level.","fullDescription":"A compact device, designed to be worn over the mouth, which produces breathable air from water flowing through it. This device allows the wearer to breathe underwater. The device is designed to be extremely simple to use, and thus can be used by any character, regardless of Tech Level.","situationalEffects":[{"id":"underwater-breathing-apparatus-breathe-underwater","type":"environmentAccess","appliesWhen":"equipped","attributeKeys":["might","quickness"],"skillKeys":["move","survive"],"label":"Underwater Breathing Apparatus: breathe underwater","rulesText":"Allows the wearer to breathe underwater and can be used regardless of Tech Level."}]},{"id":"weaver-lens","name":"Weaver Lens","category":"tech","techLevel":4,"atomaCategory":"Domestic","qualities":["Powered"],"cost":4,"rarity":3,"bookPage":167,"pdfPage":39,"description":"Reader lens that displays an interactive information layer for Weaving. Weavers can use it regardless of Tech Level; it is powered but cannot be discharged.","fullDescription":"Also commonly called a reader lens, Weaver Lenses are so named because they are most commonly used by Weavers, who rely on the information they provide in order to carry out their trade. A Weaver Lens is a simple eyepiece, visor, pair of spectacles, or even hand-held lens, similar to a magnifying glass, which displays an interactive three-dimensional information layer over whatever is viewed through the lens. The display is controlled by eye movements, vocal commands, and gestures made within the lens' field of view, though the secrets to these control methods are typically known only to Weavers. Any Weaver can use a Weaver Lens regardless of their Tech Level. Other characters can view whatever information is already displayed, but may find it difficult or even impossible to interact with that information in any consistent or useful way. A Weaver Lens is powered but cannot be discharged.","situationalEffects":[{"id":"weaver-lens-weaving-interface","type":"enableTest","appliesWhen":"equipped","attributeKeys":["insight","resolve"],"skillKeys":["operate","study"],"label":"Weaver Lens: Weaving interface","rulesText":"Displays an interactive information layer used for Weaving. Weavers can use it regardless of Tech Level."}]},{"id":"wireless-computer-hub","name":"Wireless Computer Hub","category":"tech","techLevel":5,"atomaCategory":"Miscellaneous","qualities":["Powered (Special)"],"cost":7,"rarity":4,"bookPage":168,"pdfPage":40,"description":"Central processor, storage, network, and wireless charger for nearby devices. Requires a persistent power source and can shorten recharge rest requirements for connected devices.","fullDescription":"A large, and moderately powerful computer system designed to serve as a central processor, storage device, and power supply for other devices in the vicinity. This can link to reader lenses, communicators, portable data storage, local terminals fixed nearby, and portable computers brought close to it. It wirelessly transmits and receives data within its network, as well as wirelessly charging the batteries of nearby devices. The maximum range is only a few hundred meters, limited by obstructions such as dense walls and other environmental factors, but within that range it provides an extremely fast and efficient connection. Some Archivist communities possess such a computer hub to aid their work, and many others would pay handsomely to obtain one. The hub must be connected to a persistent power source, a generator of some sort, but allows connected devices to recharge more quickly, requiring the next shortest type of rest. Items that recharge with Bed rest can recharge over a Break, while items that recharge with a Break can recharge with a Breather. The recharging item must remain within range of the hub for the entire rest."},{"id":"car","name":"Car","category":"vehicle","techLevel":2,"qualities":[],"protection":"2 (1)","cost":8,"rarity":3,"bookPage":177,"pdfPage":49,"description":"Rebuilt civilian road vehicle assembled from salvaged wrecks; works best on smooth roads.","fullDescription":"The highways and the ruins of the Old World are littered with long-inactive cars, trucks, and other vehicles. While most are damaged beyond repair, enterprising sorts can find enough working parts to rebuild a single functioning vehicle from a few dozen wrecks. Still, they are designed to travel along smooth roads, and do not always fare well when off-road.","cover":"Covered 1","passengers":5,"scale":2,"speed":2,"truths":["Rebuilt Civilian Car"]},{"id":"groundwheel","name":"Groundwheel","category":"vehicle","techLevel":3,"qualities":["High-Performance"],"protection":"0 (0)","cost":9,"rarity":4,"bookPage":177,"pdfPage":49,"description":"One-wheeled stabilized motorbike, compact and quick but fragile.","fullDescription":"Appearing similar to a motorbike missing the rear wheel, the Groundwheel relies on powerful stabilizers to let it balance reliably on a single wheel. Extremely compact and quick, but somewhat fragile, a skilled rider on a Groundwheel can weave through the densest terrain and get to their destination swiftly.","cover":"Exposed","passengers":1,"scale":1,"speed":3,"truths":["Agile, Stabilized monowheel"]},{"id":"explorer-transport-buggy","name":"Explorer Transport Buggy","category":"vehicle","techLevel":3,"qualities":["Rugged"],"protection":"3 (2)","cost":11,"rarity":4,"bookPage":178,"pdfPage":50,"description":"Six-wheeled all-terrain transport that carries more passengers or salvage than an Explorer Rover.","fullDescription":"A larger form of the Explorer Rover, sporting six wheels and able to carry more passengers or more salvage.","cover":"Covered 2","passengers":7,"scale":3,"speed":2,"truths":["All-Terrain Vehicle"]},{"id":"grav-bike","name":"Grav-Bike","category":"vehicle","techLevel":4,"qualities":["Single-Seat","High-Performance","Hover"],"protection":"2 (1)","cost":12,"rarity":4,"bookPage":178,"pdfPage":50,"description":"Fast single-seat anti-gravity bike; many can support a passenger and may mount a forward weapon.","fullDescription":"A single-seater vehicle, though most can support a passenger seated behind the rider, suspended a short distance above the ground by suspensor pads. Extremely fast, but also somewhat temperamental. Many are fitted with a forward-mounted weapon, such as a plasma repeater, operated by the rider.","cover":"Exposed","passengers":2,"scale":1,"speed":3,"truths":["Anti-grav Bike"]},{"id":"security-cart","name":"Security Cart","category":"vehicle","techLevel":3,"qualities":[],"protection":"1 (1)","cost":7,"rarity":4,"bookPage":178,"pdfPage":50,"description":"Light buggy for quickly moving security personnel around clear streets.","fullDescription":"A lightweight buggy designed for rapidly moving security personnel around a city. Ill-suited for driving through the wilderness, but quick on clear streets.","cover":"Exposed","passengers":3,"scale":1,"speed":3,"truths":["Light Passenger Vehicle"]},{"id":"dark-city-buggy","name":"Dark City Buggy","category":"vehicle","techLevel":4,"qualities":["Rugged"],"protection":"4 (2)","cost":13,"rarity":5,"bookPage":179,"pdfPage":51,"description":"Small rugged scout vehicle used by Dark City agents, often with a gunner position and plasma repeater.","fullDescription":"Small, rugged vehicles used by the agents of the Dark City. They tend to have a gunner position fitted with a plasma repeater or similar weapon.","cover":"Covered 2","passengers":4,"scale":2,"speed":3,"truths":["All-Terrain Scout Vehicle"]},{"id":"trailbike","name":"Trailbike","category":"vehicle","techLevel":2,"qualities":[],"protection":"0 (0)","cost":7,"rarity":3,"bookPage":180,"pdfPage":52,"description":"Compact off-road motorcycle small enough to be carried by larger vehicles.","fullDescription":"A compact, lightweight motorcycle designed to operate effectively off-road. A single trailbike takes up a space about the same size as a passenger in most vehicles, allowing larger vehicles to carry a smaller scout bike or two.","cover":"Exposed","passengers":1,"scale":1,"speed":3,"truths":["Light All-Terrain Motorbike"]},{"id":"explorer-rover","name":"Explorer Rover","category":"vehicle","techLevel":3,"qualities":["Rugged"],"protection":"3 (2)","cost":9,"rarity":3,"bookPage":180,"pdfPage":52,"description":"Rugged all-terrain rover for traveling through wilderness and ruins.","fullDescription":"A rugged, all-terrain vehicle, ideal for traversing the wilderness and the ruins alike.","cover":"Covered 1","passengers":3,"scale":2,"speed":2,"truths":["All-Terrain Vehicle"]},{"id":"scout-skimmer-light-weapons","name":"Scout Skimmer (Light Weapons)","category":"vehicle","techLevel":4,"qualities":["High-Performance"],"protection":"5 (3)","cost":18,"rarity":5,"bookPage":180,"pdfPage":52,"description":"Fast anti-gravity scout vehicle fitted with three independently mounted plasma repeaters.","fullDescription":"An anti-grav scout vehicle common during the War, these craft are fast, but not especially durable, relying on speed, surprise, and evasion to survive enemy fire. They are fitted with three plasma repeaters, on independent mounts, allowing them to attack targets of opportunity.","cover":"Covered 2","passengers":6,"scale":3,"speed":3,"truths":["Anti-grav Scout Vehicle"]},{"id":"attract","name":"Attract","category":"glif","complexity":2,"bookPage":183,"pdfPage":55,"description":"Machine attempts to move within a few meters of the marked object or person.","fullDescription":"Complexity: 2. Upon seeing the GLIF, the machine attempts to move to within a few meters of the marked object or person."},{"id":"discharge","name":"Discharge","category":"glif","complexity":1,"bookPage":183,"pdfPage":55,"description":"Machine safely discharges its powered tools and weapons, preventing their use until they recharge.","fullDescription":"Complexity: 1. Upon seeing this GLIF, the machine safely discharges its powered tools and weapons, preventing them from being used until they are recharged."},{"id":"forbid","name":"Forbid","category":"glif","complexity":1,"bookPage":184,"pdfPage":56,"description":"Machine will not cross a marked threshold or approach a marked object or person; ends if it detects a threat or suffers hostile action.","fullDescription":"Complexity: 1. Once it has seen this GLIF, the machine will not cross a threshold, such as a doorway, tunnel entrance, or similar, marked with this GLIF, or approach within a few meters of an object or person wearing this GLIF. This effect ends when the machine detects a threat or a hostile action is taken against the machine."},{"id":"glitch","name":"Glitch","category":"glif","complexity":2,"bookPage":184,"pdfPage":56,"description":"Machine seizes up from junk data and logic errors and must spend its next action clearing the problem.","fullDescription":"Complexity: 2. Upon seeing the GLIF, the machine seizes up, its processes overwhelmed by a burst of junk data and logic errors. It must spend its next action clearing errors and problems."},{"id":"hazard","name":"Hazard","category":"glif","complexity":2,"bookPage":185,"pdfPage":57,"description":"Machine treats the marked object, person, or location as dangerous; it avoids or destroys the target depending on what is marked.","fullDescription":"Complexity: 2. Upon seeing the GLIF, the machine regards the object or person as dangerous. In the case of a marked object, the machine will attempt to destroy the object from a safe distance if possible, or avoid it otherwise. In the case of a marked structure or location, the machine will seek to avoid the location. In the case of a marked person, it will attempt to destroy them, prioritising them above other threats."},{"id":"ignore","name":"Ignore","category":"glif","complexity":1,"bookPage":185,"pdfPage":57,"description":"Machine ignores marked objects or people until it detects a threat or hostile action is taken against it.","fullDescription":"Complexity: 1. This is a developed form of the Spears' GLIF-markings. Upon seeing this GLIF, the machine ignores any objects or people marked with the GLIF. This effect ends when the machine detects a threat or a hostile action is taken against the machine."},{"id":"reset","name":"Reset","category":"glif","complexity":3,"bookPage":186,"pdfPage":58,"description":"Machine hard reboots, spends its next action restarting, then treats the situation as a new scene; it regains spent Personal Threat and adds more for existing Injuries.","fullDescription":"Complexity: 3. Upon seeing the GLIF, the machine is compelled to hard reboot, shutting down and restarting itself. The machine spends its next action rebooting. After that, it treats the situation as a brand-new scene, and it can be affected by GLIFs it had already been affected by, as a result of the reboot. However, the machine regains any spent Personal Threat, and adds +2 to that Personal Threat pool for each Injury it has suffered."},{"id":"protect","name":"Protect","category":"glif","complexity":3,"bookPage":186,"pdfPage":58,"description":"Machine prioritizes the marked object or person, guards them, warns unknown or hostile approaches once, then attacks those who do not withdraw.","fullDescription":"Complexity: 3. Upon seeing the GLIF, the machine is compelled to prioritize the safety of the marked object or person. It will move near the marked object or person to guard it. If anyone it regards as unknown or hostile approaches the marked object or person too closely, such as entering the same zone or entering combat, it will attempt to intimidate them the first time, and then attack any who do not withdraw. It can only accept a Protect order from one GLIF at a time, and a Protect GLIF does not mean the machine regards a marked creature as friendly, only as someone who needs to be protected, more akin to a valuable target that needs to be subdued or captured rather than killed."}],

    customItems: [],

    knowledgeFragments: [],

    growthSkillIncreases: [], // {skill, cost}

    growthTruthChanges: 0,

    limitedUseAbilities: {
