  {
    key: 'createTruth', name: 'Create Truth', badge: '2 Momentum',
    desc: `After a successful Test, spend 2 Momentum to establish a new Truth or to change or remove an existing Truth. The change must relate to the successful Test and be something the character could reasonably have achieved.`
  },
  {
    key: 'askQuestion', name: 'Ask a Question', badge: '1 Momentum',
    desc: `Spend 1 Momentum to ask the gamemaster a question about the scene or something in it. The answer reflects what your character can perceive or deduce and must be truthful, though it may be incomplete or cryptic. If the answer is “you do not know,” the Momentum is returned. You may hear each answer before buying another question.`
  },
  {
    key: 'damage', name: 'Damage', badge: '1 Momentum Each',
    desc: `After a successful attack, increase the damage rating of the Injury you inflict by +1 for each Momentum spent.`
  },
  {
    key: 'reduceTime', name: 'Reduce Time', badge: '2 Momentum',
    desc: `If the completed action would take a long time, spend Momentum to reduce its duration. As a rule of thumb, spending 2 Momentum halves the time required.`
  },
  {
    key: 'followUp', name: 'Follow-Up', badge: '2 Momentum',
    desc: `After succeeding at a Test, spend 2 Momentum to act again before another character can act or respond. If the additional action requires a Test, increase its Difficulty by 1. A Follow-Up action cannot generate another Follow-Up action.`
  }
];

function isOncePerSceneUsed(key) {
  return (state.character.oncePerSceneUsed || []).includes(key);
}

function markOncePerSceneUsed(key) {
  if (!Array.isArray(state.character.oncePerSceneUsed)) state.character.oncePerSceneUsed = [];
  if (!state.character.oncePerSceneUsed.includes(key)) state.character.oncePerSceneUsed.push(key);
}

function isSceneEffectActive(key) {
  return (state.character.activeSceneEffects || []).includes(key);
}

function activateSceneEffect(key) {
  if (!Array.isArray(state.character.activeSceneEffects)) state.character.activeSceneEffects = [];
  if (!state.character.activeSceneEffects.includes(key)) state.character.activeSceneEffects.push(key);
}

function useAdrenalineRush(points) {
  if (isOncePerSceneUsed('adrenalineRush')) return;
  const amount = clampNumber(points, 1, 3);
  const maxSpirit = getResourceMaxes().spirit;
  const before = getEffectiveResource('spirit');
  if (maxSpirit - before < amount) {
    showToast(`You need at least ${amount} lost Spirit to choose this option.`, 'error');
    return;
  }

  const bonuses = [];
  if (isSceneEffectActive('spearsBlend')) bonuses.push({ name: `Spear's Blend`, amount: 1 });
  if (characterHasTalent('bold')) bonuses.push({ name: 'Bold', amount: 1 });
  const bonusTotal = bonuses.reduce((sum, bonus) => sum + bonus.amount, 0);
  state.character.currentSpirit = clampNumber(before + amount + bonusTotal, 0, maxSpirit);
  markOncePerSceneUsed('adrenalineRush');
  saveCharacterLocal(true);
  renderAll();

  const gained = state.character.currentSpirit - before;
  const threat = { 1: 1, 2: 3, 3: 6 }[amount];
  const bonusText = bonuses.length ? ` Bonus sources before the Spirit maximum: ${bonuses.map(b => `+${b.amount} from ${b.name}`).join(' and ')}.` : '';
  const rivalryText = (state.character.bonds || []).some(b => b.type === 'rivalry') ? ' Your rivalry-bonded ally also gains 1 Spirit.' : '';
  showToast(`Adrenaline Rush restored ${gained} Spirit. Add ${threat} Threat.${bonusText}${rivalryText}`, 'success');
}

function useSecondWind(points, target) {
  const amount = clampNumber(points, 1, 3);
  const cost = { 1: 1, 2: 3, 3: 6 }[amount];
  if ((state.character.currentMomentum || 0) < cost) {
    showToast(`Second Wind needs ${cost} Momentum.`, 'error');
    return;
  }
  if (target === 'self') {
    const maxSpirit = getResourceMaxes().spirit;
    const before = getEffectiveResource('spirit');
    if (maxSpirit - before < amount) {
      showToast(`You need at least ${amount} lost Spirit to choose this option.`, 'error');
      return;
    }
    state.character.currentSpirit = before + amount;
  }
  state.character.currentMomentum -= cost;
  saveCharacterLocal(true);
  renderAll();
  const supportiveText = target === 'ally' && (state.character.bonds || []).some(b => b.type === 'supportive')
    ? ' If this is your Supportive-Bonded ally, they regain +1 additional Spirit.'
    : '';
  showToast(`Spent ${cost} Momentum. ${target === 'self' ? `You regain ${amount} Spirit.` : `The selected ally regains ${amount} Spirit.`}${supportiveText}`, 'success');
}

function spendMomentumForAction(key, cost) {
  const labels = {
    counterattack: 'Counterattack', askQuestion: 'Ask a Question', damage: 'Damage +1',
    reduceTime: 'Reduce Time', followUp: 'Follow-Up'
  };
  if ((state.character.currentMomentum || 0) < cost) {
    showToast(`${labels[key] || 'This action'} needs ${cost} Momentum.`, 'error');
    return;
  }
  state.character.currentMomentum -= cost;
  saveCharacterLocal(true);
  renderAll();
  showToast(`Spent ${cost} Momentum for ${labels[key] || key}.`, 'success');
}

function createTruthWithMomentum() {
  const cost = 2;
  if ((state.character.currentMomentum || 0) < cost) {
    showToast('Create Truth needs 2 Momentum.', 'error');
    return;
  }
  normalizeEditableLists();
  state.character.currentMomentum -= cost;
  state.character.truths.push('');
  saveCharacterLocal(true);
  renderAll();
  showToast('Spent 2 Momentum. A new Truth field has been added.', 'success');
}

function defineTruthFromAction() {
  normalizeEditableLists();
  state.character.truths.push('');
  saveCharacterLocal(true);
  renderAll();
  showToast('A new Truth field has been added. Resolve the Skill Test at the table.', 'info');
}

function activateSpearsBlend() {
  if (!characterHasOriginAbility('spearsBlend') || isSceneEffectActive('spearsBlend')) return;
  if (getEffectiveResource('supply') < 1) {
    showToast(`Spear's Blend needs 1 Supply Point.`, 'error');
    return;
  }
  state.character.currentSupply = getEffectiveResource('supply') - 1;
  activateSceneEffect('spearsBlend');
  saveCharacterLocal(true);
  renderAll();
  showToast(`Spear's Blend administered. Adrenaline Rush restores +1 additional Spirit this scene.`, 'success');
}

function actionConfirmButton(label, command, armedLabel, disabled = false) {
  return `<button class="confirm-btn" type="button" ${disabled ? 'disabled' : ''} onclick="confirmClick(this, () => ${command}, '${armedLabel}')">${label}</button>`;
}

function renderActionControls(action) {
  const momentum = state.character.currentMomentum || 0;
  const maxSpirit = getResourceMaxes().spirit;
  const missingSpirit = Math.max(0, maxSpirit - getEffectiveResource('spirit'));
  const used = action.key === 'adrenalineRush' && isOncePerSceneUsed('adrenalineRush');

  if (action.key === 'counterattack') {
    return `<div class="action-controls">${actionConfirmButton('Spend 2 Momentum', `spendMomentumForAction('counterattack', 2)`, 'Spend 2?', momentum < 2)}</div>`;
  }
  if (action.key === 'defineTruth') {
    return `<div class="action-controls"><button class="confirm-btn" type="button" onclick="defineTruthFromAction()">Add Truth Field</button></div>`;
  }
  if (action.key === 'adrenalineRush') {
    return `<div class="action-controls">${[1,2,3].map(points => {
      const threat = {1:1,2:3,3:6}[points];
      return actionConfirmButton(`+${points} Spirit / +${threat} Threat`, `useAdrenalineRush(${points})`, `Add ${threat} Threat?`, used || missingSpirit < points);
    }).join('')}</div>${used ? '<div class="action-note">Used this scene. End Scene refreshes it.</div>' : ''}`;
  }
  if (action.key === 'secondWind') {
    const costs = {1:1,2:3,3:6};
    const group = target => `<div class="action-controls-group"><div class="action-controls-label">${target === 'self' ? 'Restore your Spirit' : `Restore an ally's Spirit`}</div><div class="action-controls">${[1,2,3].map(points => actionConfirmButton(`+${points} / −${costs[points]} Momentum`, `useSecondWind(${points}, '${target}')`, `Spend ${costs[points]}?`, momentum < costs[points] || (target === 'self' && missingSpirit < points))).join('')}</div></div>`;
    return `<div class="action-controls">${group('self')}${group('ally')}</div>`;
  }
  if (action.key === 'createTruth') {
    return `<div class="action-controls">${actionConfirmButton('Spend 2 & Create Truth', 'createTruthWithMomentum()', 'Spend 2?', momentum < 2)}</div>`;
  }
  if (action.key === 'askQuestion') {
    return `<div class="action-controls">${actionConfirmButton('Spend 1 Momentum', `spendMomentumForAction('askQuestion', 1)`, 'Spend 1?', momentum < 1)}</div>`;
  }
  if (action.key === 'damage') {
    return `<div class="action-controls">${actionConfirmButton('Spend 1 for +1 Damage', `spendMomentumForAction('damage', 1)`, 'Spend 1?', momentum < 1)}</div>`;
  }
  if (action.key === 'reduceTime') {
    return `<div class="action-controls">${actionConfirmButton('Spend 2 to Halve Time', `spendMomentumForAction('reduceTime', 2)`, 'Spend 2?', momentum < 2)}</div>`;
  }
  if (action.key === 'followUp') {
    return `<div class="action-controls">${actionConfirmButton('Spend 2 Momentum', `spendMomentumForAction('followUp', 2)`, 'Spend 2?', momentum < 2)}</div>`;
  }
  return '';
}

function renderActionCard(action) {
  const controls = renderActionControls(action);
  const used = action.key === 'adrenalineRush' && isOncePerSceneUsed('adrenalineRush');
  const classes = [controls ? 'interactive' : 'reference', used ? 'once-used' : ''].filter(Boolean).join(' ');
  return `<details class="action-card ${classes}">
    <summary title="${escHtml(action.desc)}"><span class="action-name">${escHtml(action.name)}</span><span class="action-badge">${used ? 'Used This Scene' : escHtml(action.badge)}</span></summary>
    <div class="action-body"><div class="action-description">${escHtml(action.desc)}</div>${controls}</div>
  </details>`;
}

function renderSpearsBlendActionCard() {
  if (!characterHasOriginAbility('spearsBlend')) return '';
  const active = isSceneEffectActive('spearsBlend');
  const disabled = active || getEffectiveResource('supply') < 1;
  return `<details class="action-card interactive ${active ? 'scene-active' : ''}">
    <summary title="Administer the Spear's Blend for 1 Supply Point at the start of a conflict scene."><span class="action-name">Administer Spear's Blend</span><span class="action-badge">${active ? 'Active This Scene' : '1 Supply Point'}</span></summary>
    <div class="action-body">
      <div class="action-description">At the start of a conflict scene, spend 1 Supply Point to administer the blend. During that scene, you regain +1 additional Spirit whenever you use Adrenaline Rush.</div>
      <div class="action-controls">${actionConfirmButton(active ? 'Active' : 'Spend 1 Supply Point', 'activateSpearsBlend()', 'Spend 1?', disabled)}</div>
    </div>
  </details>`;
}

function limitedUseConfirmButton(label, command, armedLabel, disabled = false, title = '') {
  const disabledTitle = disabled && !title ? 'This feature is already used or its required resource is unavailable.' : title;
  const click = disabled ? '' : `onclick="confirmClick(this, () => ${command}, '${armedLabel}')"`;
  return `<button class="confirm-btn" type="button" ${disabled ? 'disabled' : ''} ${disabledTitle ? `title="${escHtml(disabledTitle)}"` : ''} ${click}>${escHtml(label)}</button>`;
}

function renderLimitedUseControls(key) {
  const feature = LIMITED_USE_FEATURES[key];
  if (!feature) return '';
  const used = isLimitedFeatureUsed(key);
  const resetText = limitedUseResetText(feature.reset);
  if (used) {
    return `<div class="action-controls">${limitedUseConfirmButton('Used', '', 'Used', true, `Used. Refreshes with ${resetText}.`)}</div>
      <div class="action-note">Used. Refreshes with ${escHtml(resetText)}.</div>`;
  }

  if (key === 'justWhatTheyNeed') {
    const supply = getEffectiveResource('supply');
    const buttons = [1, 2, 3].map(spend => limitedUseConfirmButton(
      `Spend ${spend} Supply Point${spend === 1 ? '' : 's'}`,
      `useLimitedFeature('justWhatTheyNeed', ${spend})`,
      `Spend ${spend}?`,
      supply < spend,
      supply < spend ? `Requires ${spend} Supply Point${spend === 1 ? '' : 's'}.` : `Spend ${spend} Supply Point${spend === 1 ? '' : 's'} and mark the ability used.`
    )).join('');
    return `<div class="action-controls">${buttons}${limitedUseConfirmButton('Mark Used Only', `useLimitedFeature('justWhatTheyNeed', 0)`, 'Mark used?', false, 'Mark the ability used without changing Supply Points, for example if the cost was already recorded.')}</div>`;
  }

  if (key === 'iKnowAGuy') {
    const momentum = getEffectiveResource('momentum');
    return `<div class="action-controls">
      ${limitedUseConfirmButton('Spend 2 Momentum', `useLimitedFeature('iKnowAGuy', 'momentum')`, 'Spend 2?', momentum < 2, momentum < 2 ? 'Requires 2 Momentum.' : 'Spend 2 Momentum and mark the ability used.')}
      ${limitedUseConfirmButton('Add 2 Threat', `useLimitedFeature('iKnowAGuy', 'threat')`, 'Add 2 Threat?', false, 'Threat is adjusted at the table; the sheet marks the ability used.')}
    </div>`;
  }

  const label = key === 'ambush' || key === 'tough' ? 'Mark Triggered' : `Use ${feature.name}`;
  return `<div class="action-controls">${limitedUseConfirmButton(label, `useLimitedFeature('${key}')`, key === 'ambush' || key === 'tough' ? 'Trigger?' : 'Use?', false, `Marks ${feature.name} used until ${resetText}.`)}</div>`;
}

function renderTrackedFeature(key, feature, options = {}) {
  const limited = LIMITED_USE_FEATURES[key];
  if (!limited) return '';
  const used = isLimitedFeatureUsed(key);
  const tag = options.tag ? `<span class="limited-feature-source">${escHtml(options.tag)}</span>` : '';
  return `<div class="limited-feature-card ${options.tone || ''} ${used ? 'is-used' : ''}">
    <div class="limited-feature-head">
      <div class="limited-feature-name">${escHtml(feature.name)} ${tag}</div>
      <span class="action-badge">${escHtml(used ? limited.usedBadge : limited.readyBadge)}</span>
    </div>
    <div class="action-description">${escHtml(feature.description)}</div>
    ${renderLimitedUseControls(key)}
  </div>`;
}

// Actions, Talents & Abilities. The outer section is default-open while the action
// cards themselves stay compact until the player expands the rule they need.
function renderActionsTalentsAbilitiesSection(c, archetypeData, abilities) {
  let right = '';

  if (abilities.length) {
    right += `<div class="sheet-section">
      <div class="sheet-section-title">Origin Abilities</div>
      ${abilities.map(ab => LIMITED_USE_FEATURES[ab.key]
        ? renderTrackedFeature(ab.key, ab, { tone: 'origin' })
        : `<div style="margin-bottom:12px;">
            <div style="font-family:var(--font-display);font-size:0.95rem;font-weight:600;color:var(--text-bright);margin-bottom:4px;">${escHtml(ab.name)}</div>
            <div style="font-size:0.78rem;color:var(--text-dim);line-height:1.5;">${escHtml(ab.description)}</div>
          </div>`).join('')}
    </div>`;
  }

  right += `<div class="sheet-section">
    <div class="sheet-section-title">Talents &amp; Abilities</div>`;

  if (archetypeData.forcedTalent && archetypeData.talents[archetypeData.forcedTalent]) {
    const t = archetypeData.talents[archetypeData.forcedTalent];
    right += LIMITED_USE_FEATURES[archetypeData.forcedTalent]
      ? renderTrackedFeature(archetypeData.forcedTalent, t, { tone: 'forced', tag: 'AUTO' })
      : `<div style="margin-bottom:14px;padding:12px;background:rgba(255,107,53,0.05);border-left:2px solid var(--accent);">
      <div style="font-family:var(--font-display);font-size:0.95rem;font-weight:600;color:var(--text-bright);margin-bottom:4px;">${t.name} <span style="font-family:var(--font-mono);font-size:0.6rem;color:var(--accent);">AUTO</span></div>
      <div style="font-size:0.78rem;color:var(--text-dim);line-height:1.5;">${t.description}</div>
    </div>`;
  }

  if (c.talent) {
    const talentKeys = Array.isArray(c.talent) ? c.talent : [c.talent];
    talentKeys.forEach(tKey => {
      const allTalents = {...archetypeData.talents, ...DM_DATA.generalTalents};
      const t = allTalents[tKey];
      if (t && !t.forced) {
        right += LIMITED_USE_FEATURES[tKey]
          ? renderTrackedFeature(tKey, t, { tone: 'talent' })
          : `<div style="margin-bottom:14px;padding:12px;background:var(--teal-faint);border-left:2px solid var(--teal);">
          <div style="font-family:var(--font-display);font-size:0.95rem;font-weight:600;color:var(--text-bright);margin-bottom:4px;">${t.name}</div>
          <div style="font-size:0.78rem;color:var(--text-dim);line-height:1.5;">${t.description}</div>
        </div>`;
      }
    });
  }

  (c.growthExtraTalents || []).forEach(tKey => {
    const allTalents = {};
    Object.values(DM_DATA.archetypes).forEach(a => Object.assign(allTalents, a.talents));
    Object.values(DM_DATA.advancedArchetypes).forEach(a => Object.assign(allTalents, a.talents));
    Object.assign(allTalents, DM_DATA.generalTalents);
    const t = allTalents[tKey];
    if (t) {
      right += LIMITED_USE_FEATURES[tKey]
        ? renderTrackedFeature(tKey, t, { tone: 'growth', tag: 'GROWTH' })
        : `<div style="margin-bottom:14px;padding:12px;background:rgba(255,209,102,0.04);border-left:2px solid var(--warning);">
        <div style="font-family:var(--font-display);font-size:0.95rem;font-weight:600;color:var(--text-bright);margin-bottom:4px;">${t.name} <span style="font-family:var(--font-mono);font-size:0.6rem;color:var(--warning);">GROWTH</span></div>
        <div style="font-size:0.78rem;color:var(--text-dim);line-height:1.5;">${t.description}</div>
      </div>`;
    }
  });

  right += '</div>';

  const left = renderActionsColumn();

  return `<details class="sheet-collapse" id="actionsTalentsBlock" open>
    <summary class="sheet-collapse-summary">Actions, Talents &amp; Abilities</summary>
    <div class="sheet-cols">
      <div>${left}</div>
      <div>${right}</div>
    </div>
  </details>`;
}

function renderActionsColumn() {
  return `<div class="sheet-section">
    <div class="sheet-section-title">Actions</div>
    <div class="action-list">${renderSpearsBlendActionCard()}${ACTION_DEFINITIONS.map(renderActionCard).join('')}</div>
  </div>`;
}

function renderSummaryStep() {
  const c = state.character;
  const stats = computeStats();
  if (!stats) return wrapStep('Character Sheet', 'Something went wrong computing stats.', '', { showNext: false, showPrev: true });

  const originData = DM_DATA.origins[c.origin];
  const archetypeData = DM_DATA.archetypes[c.archetype] || DM_DATA.advancedArchetypes[c.archetype];
  const temperamentData = c.temperament ? DM_DATA.temperaments[c.temperament] : null;
  const abilities = getAbilities();

  const code = buildCharacterCode();
  const sheetPortrait = renderSheetPortrait(c.portraitUrl);

  let html = '';

  // Action buttons
  html += `<div class="finalized-toolbar no-print">
    ${c.finalized ? '<span class="finalized-badge">Finalized</span>' : '<button class="btn btn-primary" onclick="finalizeCharacter()">Finalize Character</button>'}
    <button class="btn btn-secondary" onclick="printSheet()">Download Dark PDF</button>
    <button class="btn btn-secondary" onclick="printSheet(true)">Download Light PDF</button>
    <button class="btn btn-secondary" onclick="editCharacter()">Edit Character</button>
    <button class="btn btn-secondary" onclick="saveCharacterLocal(false)">Save Local</button>
  </div>`;

  // THE ACTUAL CHARACTER SHEET
  html += `<div class="char-sheet" id="charSheet">`;

  // ============================================================
  // SHEET LAYOUT (rebuilt in v1.09)
  // ------------------------------------------------------------
  // Reading order now follows how the sheet is actually used at the table:
  //   1. Identity band      — name, Goals & Archetype, Tech Level, play controls
  //   2. Bonds / Temperament — who you are to other people
  //   3. Exhaustion          — four cards, mirroring the four Attributes below
  //   4. Truths / Injuries   — the mutable facts about you
  //   5. Attributes, Skills, Resources — the numbers you roll against
  //   6. Actions, Talents & Abilities  — what you can do with them
  //   7. Inventory, Dice, Growth, Share Code
  //
  // The Goals block used to sit near the bottom, below the two-column region, which
  // buried the one piece of text a player rereads every session. Promoting it into
  // the header band puts it beside the name where it reads as part of the identity.
  // ============================================================

  html += renderSheetIdentityBand(c, stats, originData, archetypeData, temperamentData, sheetPortrait);
  html += renderSheetBondsTemperamentRow(c, temperamentData);
  html += renderSheetExhaustionSection(c);
  html += renderSheetTruthsInjuriesRow();
  html += renderSheetAttributesSection(stats);
  html += renderSheetSkillsSection(stats);
  html += renderSheetResourcesSection(c);
  html += renderActionsTalentsAbilitiesSection(c, archetypeData, abilities);

  // ---- Inventory: owned catalogue items (#3) ----
  html += renderInventorySection();

  // ---- Dice Roller + Shared Room (#5/#6) ----
  html += renderDicePanel();

  // ---- Growth summary: second to last ----
  html += renderGrowthSummarySection();

  // ---- Character Share Code: final section ----
  html += renderShareCodeSection(code);

  html += '</div>'; // end char-sheet

  if (c.finalized) return html;

  return wrapStep('Character Sheet', 'Review the character, then finalize when ready.',
    html,
    { showNext: false, showPrev: true }
  );
}

function renderFinalizedCharacterView() {
  return renderSummaryStep();
}

function renderShareCodeSection(code) {
  return `<details class="code-collapse" id="shareCodeBlock">
    <summary>Character Share Code</summary>
    <div class="code-string" id="charCode">${code}</div>
    <button class="btn btn-secondary no-print" style="margin-top:12px;" onclick="copyCode()">Copy Code</button>
    <button class="btn btn-secondary no-print" style="margin-top:12px;margin-left:8px;" onclick="saveCharacterLocal(false)">Save Local</button>
    <div class="validation-msg no-print" id="copyMsg" style="color:var(--teal);"></div>
  </details>`;
}

function renderGrowthSummarySection() {
  const c = state.character;
  if (!((c.growthPool || 0) > 0 || (c.growthPurchases || []).length)) {
    return `<div class="sheet-section" style="border-top:1px solid var(--border);padding-top:20px;">
      <div class="sheet-section-title">Growth — Available: 0 / Max: 10</div>
      <div style="font-size:0.8rem;color:var(--text-dim);">No Growth available or spent.</div>
    </div>`;
  }
  return `<div class="sheet-section" style="border-top:1px solid var(--border);padding-top:20px;">
    <div class="sheet-section-title">Growth — Available: ${getGrowthRemaining()} / Max: 10 / Spent: ${getGrowthSpent()}</div>
    ${(c.growthPurchases || []).map(p => `<div style="font-size:0.8rem;color:var(--text-dim);margin-bottom:4px;">◆ ${p.label}${p.detail ? ': ' + p.detail : ''} <span style="color:var(--warning);">(${p.cost}g)</span></div>`).join('') || '<div style="font-size:0.8rem;color:var(--text-dim);">No Growth spent.</div>'}
  </div>`;
}

function finalizeCharacter() {
  state.character.finalized = true;
  state.currentStep = STEPS.indexOf('summary');
  // v1.09: seed before normalize so the clamp has real values to work with.
  seedResourcesOnFinalize();
  normalizeCurrentValues();
  saveCharacterLocal(true);
  renderAll();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function editCharacter() {
  state.character.finalized = false;
  state.currentStep = STEPS.indexOf('summary');
  renderAll();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============================================================
// WRAPPER UTIL
// ============================================================
function wrapStep(title, desc, content, { showNext = true, showPrev = true, nextLabel = 'Continue →' } = {}) {
  const valid = canProceed();
  return `<div class="step-card active">
    <div class="step-card-inner">
      <div class="step-number">// Step ${state.currentStep + 1} of ${STEPS.length}</div>
      <div class="step-title">${title}</div>
      <div class="step-desc">${desc}</div>
      ${content}
      <div class="btn-row no-print">
        ${showPrev ? '<button class="btn btn-secondary" onclick="prevStep()">← Back</button>' : '<div></div>'}
        ${showNext ? `<button class="btn btn-primary ${!valid ? 'btn-secondary' : ''}" onclick="handleStepAdvance()">${nextLabel}</button>` : ''}
      </div>
    </div>
  </div>`;
}

function handleStepAdvance() {
  if (canProceed()) {
    nextStep();
  } else {
    showValidationError();
  }
}

function showValidationError() {
  const step = STEPS[state.currentStep];
  const msgs = {
    origin: 'Please select an Origin.',
    originOptions: 'Please complete all origin selections.',
    archetype: 'Please select an Archetype.',
    archetypeDistribute: 'Please assign all attribute and skill points.',
    talent: 'Please choose a talent.',
    temperament: 'Please select a temperament and all bonus choices.',
    info: 'Please enter a character name.',
    bonds: 'Please add at least one bond with a name and type.',
  };
  alert(msgs[step] || 'Please complete this step before continuing.');
}

// ============================================================
// INTERACTION HANDLERS
// ============================================================
function selectOrigin(key) {
  const prev = state.character.origin;
  state.character.origin = key;
  // Reset origin-specific choices if changed
  if (prev !== key) {
    state.character.originAttrBoosts = [];
    state.character.originAttrBoostChoice = null;
    state.character.originAbilityChoice = null;
    state.character.originAbilitiesChoice = [];
  }
  renderAll();
}

function toggleOriginAttrBoost(attr) {
  const boosts = state.character.originAttrBoosts || [];
  if (boosts.includes(attr)) {
    state.character.originAttrBoosts = boosts.filter(a => a !== attr);
  } else if (boosts.length < 2) {
    state.character.originAttrBoosts = [...boosts, attr];
  }
  renderAll();
}

function toggleOriginAbilityMulti(key, max) {
  const arr = state.character.originAbilitiesChoice || [];
  if (arr.includes(key)) {
    state.character.originAbilitiesChoice = arr.filter(k => k !== key);
  } else if (arr.length < max) {
    state.character.originAbilitiesChoice = [...arr, key];
  }
  renderAll();
}

function selectArchetype(key) {
  const prev = state.character.archetype;
  state.character.archetype = key;
  if (prev !== key) {
    state.character.archetypeAttrChoice = [null, null, null];
    state.character.archetypeSkillChoice = [null, null, null];
    state.character.talent = null;
  }
  renderAll();
}

function setAttrChoice(slotIndex, attr) {
  const choices = state.character.archetypeAttrChoice || [null, null, null];
  choices[slotIndex] = attr;
  state.character.archetypeAttrChoice = choices;
  renderAll();
}

function setSkillChoice(slotIndex, skill) {
  const choices = state.character.archetypeSkillChoice || [null, null, null];
  choices[slotIndex] = skill;
  state.character.archetypeSkillChoice = choices;
  renderAll();
}

function selectTemperament(key) {
  state.character.temperament = key;
  state.character.temperamentAttrBoost = null;
  state.character.temperamentSkillBoost = null;
  renderAll();
}

function toggleFirebrandTalent(key) {
  const arr = Array.isArray(state.character.talent) ? state.character.talent : [];
  if (arr.includes(key)) {
    state.character.talent = arr.filter(k => k !== key);
  } else if (arr.length < 2) {
    state.character.talent = [...arr, key];
  }
  renderAll();
}

function addBond() {
  state.character.bonds.push({ name: '', type: '' });
  renderAll();
}

function removeBond(i) {
  state.character.bonds.splice(i, 1);
  renderAll();
}

function addGrowthSimple(type, label, cost, detail) {
  if (getGrowthRemaining() < cost) { alert('Not enough Growth remaining!'); return; }
  state.character.growthPurchases.push({ type, label, cost, detail });
  // Track numeric counters
  if (type === 'increaseSpirit') state.character.growthSpiritIncreases = (state.character.growthSpiritIncreases || 0) + 1;
  if (type === 'increaseSupply') state.character.growthSupplyIncreases = (state.character.growthSupplyIncreases || 0) + 1;
  if (type === 'increaseTech') state.character.growthTechIncreases = (state.character.growthTechIncreases || 0) + 1;
  renderAll();
}

function addGrowthBond() {
  const cost = 2;
  if (getGrowthRemaining() < cost) { alert('Not enough Growth remaining!'); return; }
  const name = prompt('Bond with whom? (enter character name)') || '';
  const type = confirm('Click OK for Supportive Bond, Cancel for Rivalry Bond') ? 'supportive' : 'rivalry';
  if (!name) return;
  state.character.growthPurchases.push({ type: 'createBond', label: `New ${type} bond`, cost, detail: name });
  state.character.growthBonds = [...(state.character.growthBonds || []), { name, type }];
  renderAll();
}

function addGrowthSkill(skill) {
  const cost = 2;
  if (getGrowthRemaining() < cost) { alert('Not enough Growth remaining!'); return; }
  state.character.growthPurchases.push({ type: 'increaseSkill', label: `Increase ${skill} +1`, cost, detail: skill });
  state.character.growthSkillIncreases = [...(state.character.growthSkillIncreases || []), { skill }];
  renderAll();
}

function addGrowthAttr(attr, cost) {
  if (getGrowthRemaining() < cost) { alert('Not enough Growth remaining!'); return; }
  state.character.growthPurchases.push({ type: 'increaseAttr', label: `Increase ${attr} +1`, cost, detail: attr });
  state.character.growthAttrIncreases = [...(state.character.growthAttrIncreases || []), { attr }];
  renderAll();
}

function addGrowthArchetype(key, name) {
  const cost = 3;
  if (getGrowthRemaining() < cost) { alert('Not enough Growth remaining!'); return; }
  if (state.character.growthPurchases.some(p => p.type === 'addArchetype')) {
    alert('You can only add one second archetype!'); return;
  }
  state.character.growthPurchases.push({ type: 'addArchetype', label: `Learn ${name} archetype`, cost, detail: name });
  state.character.growthSecondArchetype = key;
  renderAll();
}

function addGrowthTalent(key, name, source, cost) {
  if (getGrowthRemaining() < cost) { alert('Not enough Growth remaining!'); return; }
  state.character.growthPurchases.push({ type: 'addTalent', label: `Learn talent: ${name}`, cost, detail: key });
  state.character.growthExtraTalents = [...(state.character.growthExtraTalents || []), key];
  renderAll();
}

function removeGrowthPurchase(i) {
  const p = state.character.growthPurchases[i];
  // Reverse numeric counters
  if (p.type === 'increaseSpirit') state.character.growthSpiritIncreases = Math.max(0, (state.character.growthSpiritIncreases || 0) - 1);
  if (p.type === 'increaseSupply') state.character.growthSupplyIncreases = Math.max(0, (state.character.growthSupplyIncreases || 0) - 1);
  if (p.type === 'increaseTech') state.character.growthTechIncreases = Math.max(0, (state.character.growthTechIncreases || 0) - 1);
  if (p.type === 'increaseSkill') {
    const idx = state.character.growthSkillIncreases.findIndex(x => x.skill === p.detail);
    if (idx !== -1) state.character.growthSkillIncreases.splice(idx, 1);
  }
  if (p.type === 'increaseAttr') {
    const idx = state.character.growthAttrIncreases.findIndex(x => x.attr === p.detail);
    if (idx !== -1) state.character.growthAttrIncreases.splice(idx, 1);
  }
  if (p.type === 'addArchetype') state.character.growthSecondArchetype = null;
  if (p.type === 'addTalent') {
    const idx = state.character.growthExtraTalents.indexOf(p.detail);
    if (idx !== -1) state.character.growthExtraTalents.splice(idx, 1);
  }
  state.character.growthPurchases.splice(i, 1);
  renderAll();
}

// ============================================================
// ITEM CATALOGUE (#3)
// ============================================================
const CATALOGUE_CATEGORIES = [
  { key: 'all', label: 'All' },
  { key: 'weapon', label: 'Weapons' },
  { key: 'armor', label: 'Armor' },
  { key: 'gear', label: 'Gear' },
  { key: 'tech', label: 'Tech' },
  { key: 'vehicle', label: 'Vehicles' },
  { key: 'glif', label: 'GLIFs' }
];

const catalogueUI = { filter: 'all', subfilter: 'all', search: '' };

function getItemById(id) {
  return (DM_DATA.items || []).find(it => it.id === id) || null;
}

function equipmentLookupKey(raw) {
  return String(raw)
    .trim()
    .toLowerCase()
    .replace(/[()]/g, '')
    .replace(/\s+/g, '-')
    .replace(/[^a-z0-9-]/g, '')
    .replace(/-+/g, '-')
    .replace(/^-|-$/g, '');
}

function getEquipmentTraitInfo(label, item = null) {
  const exactKey = equipmentLookupKey(label);
  if (exactKey === 'powered' || exactKey.startsWith('powered-')) {
    const powered = item ? getPoweredQuality(item) : null;
    const isWeapon = item?.category === 'weapon';
    let effect;
    if (powered?.recharge === 'continuous') {
      effect = 'This item remains powered in ordinary use and cannot normally be discharged.';
    } else if (item?.id === 'illuminator') {
      effect = 'An Illuminator cannot normally be discharged deliberately, but environmental effects, complications, sabotage, or similar events may discharge it.';
    } else {
      effect = isWeapon
        ? 'When discharged during an attack, the weapon inflicts one additional Injury of its listed type.'
        : 'When discharged during a Skill Test, set one die in the pool to 1. On a successful Test, this generates 2 bonus Momentum which cannot be saved.';
    }
    const armorNote = item?.category === 'armor' ? ' Powered armor is Bulky while discharged.' : '';
    let recharge = '';
    if (powered?.recharge === 'breather') recharge = ' It recharges after a Breather or any longer rest.';
    else if (powered?.recharge === 'break') recharge = ' It recharges after a Break or Bed rest.';
    else if (powered?.recharge === 'bed') recharge = ' It recharges after a Bed rest.';
    else if (powered?.recharge === 'special') recharge = ' It follows special recharge rules and must be marked charged manually.';
    else recharge = '';
    return {
      name: isWeapon ? String(label).replace(/^Powered/i, 'Powered Weapon') : String(label).replace(/^Powered/i, 'Powered Item'),
      desc: `${effect}${armorNote}${recharge}`
    };
  }
  const exact = DM_DATA.equipmentTraitInfo?.[exactKey];
  if (exact) return exact;

  // Fallback for parameterized vehicle traits such as Tough 2 or Resilient 3.
  const baseKey = exactKey.replace(/-\d+$/, '');
  return DM_DATA.equipmentTraitInfo?.[baseKey] || null;
}

function getManufacturingCategoryInfo(label) {
  return DM_DATA.manufacturingCategoryInfo?.[equipmentLookupKey(label)] || null;
}

function getCoverInfo(label) {
  const key = equipmentLookupKey(label).replace(/-\d+$/, '');
  return DM_DATA.coverInfo?.[key] || null;
}

function renderTooltipTag(label, info, className = 'cat-tag') {
  if (!info) return `<span class="${className}">${escHtml(label)}</span>`;
  return `<span class="${className} dm-tip" tabindex="0">${escHtml(label)}<span class="dm-tip-body"><span class="dm-tip-title">${escHtml(info.name)}</span><span class="dm-tip-desc">${escHtml(info.desc)}</span></span></span>`;
}

function renderPropertyTag(label, propertyKey, className = 'cat-tag') {
  return renderTooltipTag(label, DM_DATA.equipmentPropertyInfo?.[propertyKey], className);
}

function renderTraitTag(label, className = 'cat-tag qual', item = null) {
  return renderTooltipTag(label, getEquipmentTraitInfo(label, item), className);
}

function renderAtomaCategoryTags(value) {
  const cats = Array.isArray(value) ? value : (value ? [value] : []);
  return cats.map(cat => renderTooltipTag(cat, getManufacturingCategoryInfo(cat), 'cat-tag')).join('');
}

function itemMetaTags(item) {
  const tags = [];

  if (item.category) {
    const info = DM_DATA.itemCategoryInfo?.[item.category];
    tags.push(renderTooltipTag(item.category, info, 'cat-tag'));
  }
  if (item.atomaCategory) tags.push(renderAtomaCategoryTags(item.atomaCategory));
  if (item.category !== 'glif' && item.techLevel != null) tags.push(renderTooltipTag(`TL ${item.techLevel}`, getTechLevelInfo(item.techLevel), 'cat-tag'));
  if (item.category === 'glif' && item.complexity != null) tags.push(renderPropertyTag(`CPLX ${item.complexity}`, 'complexity'));
  if (item.type) tags.push(renderPropertyTag(item.type, 'type'));
  if (item.damage != null) {
    const injury = item.injury ? ` ${item.injury}${item.injuryCount ? ' x' + item.injuryCount : ''}` : '';
    tags.push(renderPropertyTag(`DMG ${item.damage}${injury}`, 'damage', 'cat-tag dmg'));
  }
  if (item.damageOptions) tags.push(renderPropertyTag('Multi-mode', 'damageOptions', 'cat-tag dmg'));
  if (item.protection != null) tags.push(renderPropertyTag(`PROT ${item.protection}`, 'protection'));
  if (item.breakerProtection != null) tags.push(renderPropertyTag(`BRK ${item.breakerProtection}`, 'breakerProtection'));
  if (item.cover) tags.push(renderTooltipTag(item.cover, getCoverInfo(item.cover), 'cat-tag'));
  if (item.scale != null) tags.push(renderPropertyTag(`Scale ${item.scale}`, 'scale'));
  if (item.passengers != null) tags.push(renderPropertyTag(`${item.passengers} pax`, 'passengers'));
  if (item.speed != null) tags.push(renderPropertyTag(`Speed ${item.speed}`, 'speed'));
  if (item.quantity != null) tags.push(renderPropertyTag(`Qty ${item.quantity}`, 'quantity'));
  if (item.supplyPointCost != null) tags.push(renderPropertyTag(`${item.supplyPointCost} SP to craft`, 'supplyPointCost'));
  if (item.cost != null) tags.push(renderPropertyTag(`${item.cost} coin`, 'cost'));
  else if (item.costNotListed) tags.push(renderPropertyTag('cost n/a', 'costNotListed'));
  if (item.rarity != null) tags.push(renderTooltipTag(`Rarity ${item.rarity}`, getRarityInfo(item.rarity), 'cat-tag'));
  (item.qualities || []).forEach(q => tags.push(renderTraitTag(q, 'cat-tag qual', item)));

  return tags.filter(Boolean).join('');
}


function getCatalogueSubtype(item) {
  if (!item) return 'Other';
  if (Array.isArray(item.atomaCategory)) return item.atomaCategory[0] || 'Other';
  if (item.atomaCategory) return item.atomaCategory;
  if (item.category === 'weapon') return item.type || 'Other';
  if (item.category === 'armor') return item.protection != null ? `Protection ${item.protection}` : 'Armor';
  if (item.category === 'vehicle') return item.scale != null ? `Scale ${item.scale}` : 'Vehicle';
  if (item.category === 'glif') return item.complexity != null ? `Complexity ${item.complexity}` : 'GLIF';
  return 'Other';
}

function getCatalogueSubfilters() {
  if (catalogueUI.filter === 'all') return [];
  const values = [...new Set((DM_DATA.items || [])
    .filter(it => it.category === catalogueUI.filter)
    .map(getCatalogueSubtype)
    .filter(Boolean))].sort((a,b) => String(a).localeCompare(String(b)));
  return values;
}

function setCatalogueFilter(cat) {
  catalogueUI.filter = cat;
  catalogueUI.subfilter = 'all';
  refreshCatalogue();
}

function setCatalogueSubfilter(sub) {
  catalogueUI.subfilter = sub;
  refreshCatalogue();
}

function clearCatalogueSearch() {
  catalogueUI.search = '';
  catalogueUI.filter = 'all';
  catalogueUI.subfilter = 'all';
  refreshCatalogue();
}

function renderCatalogueBlock() {
  const subfilters = getCatalogueSubfilters();
  return `<div class="catalogue-block no-print" id="catalogueBlock">
    <div class="catalogue-toolbar">
      <input class="dm-input" id="catSearch" placeholder="Search items..." value="${escHtml(catalogueUI.search)}"
        oninput="updateCatalogueSearch(this.value);" style="max-width:240px;">
      <button class="cat-filter-btn cat-clear-btn" type="button" onclick="clearCatalogueSearch()">Clear Search</button>
      ${CATALOGUE_CATEGORIES.map(cat =>
        `<button class="cat-filter-btn ${catalogueUI.filter===cat.key?'active':''}" onclick="setCatalogueFilter('${cat.key}')">${cat.label}</button>`
      ).join('')}
    </div>
    ${subfilters.length ? `<div class="subfilter-row">
      <button class="cat-filter-btn ${catalogueUI.subfilter==='all'?'active':''}" onclick="setCatalogueSubfilter('all')">All</button>
      ${subfilters.map(sub => `<button class="cat-filter-btn ${catalogueUI.subfilter===sub?'active':''}" onclick="setCatalogueSubfilter(${JSON.stringify(sub).replace(/"/g, '&quot;')})">${escHtml(sub)}</button>`).join('')}
    </div>` : ''}
    <div class="catalogue-grid" id="catalogueGrid">${renderCatalogueItems()}</div>
  </div>`;
}
function updateCatalogueSearch(value) {
  catalogueUI.search = value || '';
  refreshCatalogueItems();
}

function refreshCatalogueItems() {
  const grid = document.getElementById('catalogueGrid');
  if (grid) grid.innerHTML = renderCatalogueItems();
}

function renderCatalogueItems() {
  const search = catalogueUI.search.trim().toLowerCase();
  let list = (DM_DATA.items || []).filter(it => {
    if (catalogueUI.filter !== 'all' && it.category !== catalogueUI.filter) return false;
    if (catalogueUI.subfilter !== 'all' && getCatalogueSubtype(it) !== catalogueUI.subfilter) return false;
    if (search) {
      const hay = (it.name + ' ' + (it.description||'') + ' ' + (it.fullDescription||'') + ' ' + (it.qualities||[]).join(' ')).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
  list.sort((a,b) => a.name.localeCompare(b.name));
  if (!list.length) return `<div class="cat-empty">No items match your filter.</div>`;
  return list.map(it => `
    <div class="cat-item">
      <div class="cat-item-head">
        <div class="cat-item-name">${escHtml(it.name)}</div>
      </div>
      <div class="cat-item-meta">${itemMetaTags(it)}</div>
      <div class="cat-item-desc">${escHtml(it.description || '')}</div>
      ${it.fullDescription && it.fullDescription !== it.description ? `<details class="cat-full-details"><summary class="cat-add-btn cat-details-btn">Full Description</summary><div class="cat-full-description">${escHtml(it.fullDescription)}</div></details>` : ''}
      <button class="cat-add-btn" onclick="addItemToSheet('${it.id}')">+ Add to Sheet</button>
    </div>
  `).join('');
}

function refreshCatalogue() {
  const block = document.getElementById('catalogueBlock');
  if (block) {
    block.outerHTML = renderCatalogueBlock();
    return;
  }
  const grid = document.getElementById('catalogueGrid');
  if (grid) grid.innerHTML = renderCatalogueItems();
}

function addItemToSheet(id) {
  if (!state.character.items) state.character.items = [];
  const existing = state.character.items.find(x => x.id === id);
  if (existing) existing.qty += 1;
  else state.character.items.push({ id, qty: 1, equipped: false, discharged: false });
  saveCharacterLocal(true);
  refreshInventory();
}

function changeItemQty(id, delta) {
  const entry = (state.character.items || []).find(x => x.id === id);
  if (!entry) return;
  entry.qty += delta;
  if (entry.qty <= 0) {
    state.character.items = state.character.items.filter(x => x.id !== id);
  }
  normalizeCurrentValues();
  saveCharacterLocal(true);
  renderAll();
}

function toggleItemEquipped(id) {
  normalizeInventoryEntries();
  const entry = (state.character.items || []).find(x => x.id === id);
  const item = getItemById(id);
  if (!entry || !item) return;
  const next = !entry.equipped;
  if (next && item.category === 'armor') {
    (state.character.items || []).forEach(other => {
      const otherItem = getItemById(other.id);
      if (otherItem && otherItem.category === 'armor') other.equipped = false;
    });
  }
  entry.equipped = next;
  normalizeCurrentValues();
  saveCharacterLocal(true);
  renderAll();
}

function renderInventorySection() {
  const c = state.character;
  const originData = c.origin ? DM_DATA.origins[c.origin] : null;
  const archetypeData = c.archetype ? (DM_DATA.archetypes[c.archetype] || DM_DATA.advancedArchetypes[c.archetype]) : null;
  const items = c.items || [];
  let body;
  if (!items.length) {
    body = `<div style="font-size:0.78rem;color:var(--text-dim);">No catalogue items added yet. Use the catalogue in this section to add equipment, weapons, vehicles, or GLIFs.</div>`;
  } else {
    body = items.map(entry => {
      const it = getItemById(entry.id);
      if (!it) return '';
      const metaHtml = itemMetaTags(it);
      const expandedDescription = it.fullDescription || it.description || 'No description available.';
      const powered = getPoweredQuality(it);
      const poweredToggle = powered?.trackDischarge
        ? `<button class="powered-toggle ${entry.discharged ? 'discharged' : 'charged'} no-print" onclick="event.stopPropagation(); toggleItemDischarged('${it.id}')">${entry.discharged ? 'Discharged' : 'Charged'}</button><span class="powered-print-state owned-item-meta">${entry.discharged ? 'DISCHARGED' : 'CHARGED'}</span>`
        : '';
      return `<div class="owned-item ${entry.equipped ? 'is-equipped' : ''} ${entry.discharged ? 'is-discharged' : ''}">
        <details>
          <summary>
            <div style="display:flex;align-items:center;gap:10px;">
              <div style="flex:1;min-width:0;">
                <div class="owned-name-row"><span class="owned-toggle" aria-hidden="true"></span><span class="owned-item-name">${escHtml(it.name)}</span></div>
                <div class="owned-item-meta">${metaHtml}</div>
              </div>
              ${poweredToggle}
              <button class="mini-btn equip-btn ${entry.equipped ? 'active' : 'inactive'} no-print" onclick="event.stopPropagation(); toggleItemEquipped('${it.id}')">${entry.equipped ? 'Equipped' : 'Equip'}</button>
              <div class="owned-qty no-print" onclick="event.stopPropagation();">
                <button onclick="changeItemQty('${it.id}',-1)">−</button>
                <span class="owned-qty-val">${entry.qty}</span>
                <button onclick="changeItemQty('${it.id}',1)">+</button>
              </div>
              <div class="owned-item-meta" style="display:none;" data-print-qty>×${entry.qty}</div>
            </div>
          </summary>
          <div class="owned-description">${escHtml(expandedDescription)}</div>
          ${entry.discharged ? `<div class="owned-description powered-status-note"><strong>Status:</strong> Discharged${powered?.recharge === 'special' ? '. Special recharge rules apply; clear this state manually when recharged.' : '.'}</div>` : ''}
          ${renderItemEffectNotes(it)}
          ${it.rulesNote ? `<div class="owned-description"><strong>Rules note:</strong> ${escHtml(it.rulesNote)}</div>` : ''}
          ${it.availabilityNote ? `<div class="owned-description"><strong>Availability:</strong> ${escHtml(it.availabilityNote)}</div>` : ''}
        </details>
      </div>`;
    }).join('');
  }
  return `<div class="sheet-section" style="border-top:1px solid var(--border);padding-top:20px;">
    <div class="sheet-section-title inventory-section-title">Inventory & Equipment</div>
    <details class="collapsible-section no-print" open>
      <summary>Item Catalogue</summary>
      ${renderCatalogueBlock()}
    </details>
    <details class="collapsible-section" open>
      <summary>Starting Equipment</summary>
      <div style="font-size:0.82rem;color:var(--text-dim);">${archetypeData ? archetypeData.equipment : '—'}</div>
      ${originData && originData.specialNote ? `<div style="font-size:0.82rem;color:var(--warning);margin-top:8px;">⚠ ${originData.specialNote}</div>` : ''}
    </details>
    <details class="collapsible-section" open>
      <summary>Owned Items</summary>
      <div id="inventoryList">${body}</div>
    </details>
    <details class="collapsible-section" open>
      <summary>Custom Items</summary>
      <div class="custom-items-block" style="border-top:none;margin-top:0;padding-top:0;">
        <div style="font-size:0.76rem;color:var(--text-dim);line-height:1.5;margin-bottom:10px;">Anything you picked up in play that the catalogue does not cover: a keepsake, a scrap of a map, a thing the module handed you. Plain text, no rules attached.</div>
        ${renderAutoGrowList('customItems')}
      </div>
    </details>
  </div>`;
}
function refreshInventory() {
  const list = document.getElementById('inventoryList');
  if (list) {
    // Re-render just the inner body of the inventory section
    const tmp = document.createElement('div');
    tmp.innerHTML = renderInventorySection();
    list.innerHTML = tmp.querySelector('#inventoryList').innerHTML;
  }
}

// ============================================================
// DICE ROLLER + SHARED ROOM (#5 / #6)
// Wire format aligned with Ro's /api/roll contract:
//   POST { from, room, d20count, attribute, skill, attrValue, skillValue, dice, successes, complications }
// ============================================================
const ATTR_KEYS = ['might','quickness','insight','resolve'];
const SKILL_KEYS = ['fight','move','operate','sneak','study','survive','talk'];

// Configurable API base. Empty string = same origin as the page.
const DM_API_BASE = ''; // e.g. 'https://ro-server.example.com'

const diceUI = { attr: 'might', skill: 'fight', count: 2, lastResult: null };
const roomState = { connected: false, source: null, feed: [] };

function rollDie() { return 1 + Math.floor(Math.random() * 20); }

function classifyDie(value, attrValue, skillValue) {
  // D&M: <= attribute is a success; <= skill is a critical (2 successes); 20 is a complication
  if (value === 20) return 'complication';
  if (value <= skillValue) return 'crit';
  if (value <= attrValue) return 'success';
  return 'fail';
}

function renderDicePanel() {
  const c = state.character;
  const stats = computeStats();
  const attrName = DM_DATA.attributeInfo[diceUI.attr].name;
  const skillName = DM_DATA.skillInfo[diceUI.skill].name;
  const selectedAttrExhausted = isAttrExhausted(diceUI.attr);

  return `<div class="sheet-section no-print" style="border-top:1px solid var(--border);padding-top:20px;">
    <div class="sheet-section-title">Dice Roller</div>
    <div class="dice-panel">
      <div class="dice-controls">
        <div class="dice-field">
          <label>Dice</label>
          <input type="number" class="dice-num" id="diceCount" min="1" max="5" value="${diceUI.count}"
            oninput="diceUI.count=Math.max(1,Math.min(5,parseInt(this.value)||1));">
        </div>
        <div class="dice-field">
          <label>Attribute</label>
          <select class="dice-select" id="diceAttr" onchange="diceUI.attr=this.value;renderAll();">
            ${ATTR_KEYS.map(a => {
              const exhausted = isAttrExhausted(a);
              return `<option value="${a}" class="${exhausted ? 'exhausted-option' : ''}" ${exhausted ? 'disabled' : ''} ${diceUI.attr===a?'selected':''}>${exhausted ? '~~ ' : ''}${DM_DATA.attributeInfo[a].name} (${stats.attrs[a]||6})${exhausted ? ' ~~' : ''}</option>`;
            }).join('')}
          </select>
        </div>
        <div class="dice-field">
          <label>Skill</label>
          <select class="dice-select" id="diceSkill" onchange="diceUI.skill=this.value;renderAll();">
            ${SKILL_KEYS.map(s => `<option value="${s}" ${diceUI.skill===s?'selected':''}>${DM_DATA.skillInfo[s].name} (${stats.skills[s]||1})</option>`).join('')}
          </select>
        </div>
        <div class="dice-field">
          <label>&nbsp;</label>
          <button class="dice-roll-btn" onclick="doRoll()" ${selectedAttrExhausted ? 'disabled' : ''}>Roll</button>
        </div>
      </div>
      ${selectedAttrExhausted ? `<div class="dice-disabled-note">${attrName} is shut down by an active Exhaustion state. Rolls using this attribute are disabled.</div>` : ''}
      ${renderDiceContextNotes(diceUI.attr, diceUI.skill)}
      <div id="diceResultArea">${diceUI.lastResult ? renderDiceResult(diceUI.lastResult) : ''}</div>
    </div>

    <div style="margin-top:18px;">
      <div class="sheet-section-title">Shared Roll Room</div>
      <div class="room-bar">
        <div class="dice-field" style="flex:1;min-width:160px;">
          <label>Room Code (share with party)</label>
          <input class="dm-input" id="roomCodeInput" placeholder="e.g. our-tuesday-game" value="${escHtml(c.roomCode||'')}"
            oninput="state.character.roomCode=this.value;">
        </div>
        <button class="btn btn-secondary" onclick="joinRoom()" style="align-self:flex-end;">Connect</button>
        <span class="room-status ${roomState.connected?'online':'offline'}" id="roomStatus">${roomState.connected?'● Connected':'○ Offline'}</span>
      </div>
      <div style="font-family:var(--font-mono);font-size:0.62rem;color:var(--text-dim);line-height:1.5;margin-bottom:4px;">
        Everyone who connects with the same room code shares a roll feed. Rolls also post to the server log.
        A standalone view is available at <span class="teal">/room/&lt;code&gt;</span>.
      </div>
      <div class="room-feed" id="roomFeed">${renderFeed()}</div>
    </div>
  </div>`;
}

function updateDiceLabels() {
  // No full re-render needed; selects already hold values.
}

function renderDiceResult(res) {
  const dice = res.dice.map(d => {
    const cls = classifyDie(d, res.attrValue, res.skillValue);
    return `<div class="die ${cls}">${d}</div>`;
  }).join('');
  const compTxt = res.complications > 0 ? ` <span class="comp">+ ${res.complications} Complication${res.complications>1?'s':''}</span>` : '';
  return `<div class="dice-result">
    <div class="dice-result-target">${res.attrName} ${res.attrValue} (${res.skillName} ${res.skillValue}) — ${res.d20count}d20</div>
    <div class="dice-faces">${dice}</div>
    <div class="dice-summary"><span class="succ">${res.successes} success${res.successes===1?'':'es'}</span>${compTxt}</div>
  </div>`;
}

function computeRoll(d20count, attr, skill) {
  const stats = computeStats();
  const attrValue = stats.attrs[attr] || 6;
  const skillValue = stats.skills[skill] || 1;
  const dice = [];
  for (let i = 0; i < d20count; i++) dice.push(rollDie());
  let successes = 0, complications = 0;
  dice.forEach(d => {
    const cls = classifyDie(d, attrValue, skillValue);
    if (cls === 'crit') successes += 2;
    else if (cls === 'success') successes += 1;
    else if (cls === 'complication') complications += 1;
  });
  return {
    attr, skill,
    attrName: DM_DATA.attributeInfo[attr].name,
    skillName: DM_DATA.skillInfo[skill].name,
    attrValue, skillValue, d20count, dice, successes, complications
  };
}

function doRoll() {
  if (isAttrExhausted(diceUI.attr)) {
    const area = document.getElementById('diceResultArea');
    const attrName = DM_DATA.attributeInfo[diceUI.attr].name;
    if (area) area.innerHTML = `<div class="dice-result" style="border-left-color:var(--accent);"><div class="dice-summary"><span class="comp">${attrName} is shut down by Exhaustion. This roll is disabled.</span></div></div>`;
    return;
  }
  const res = computeRoll(diceUI.count, diceUI.attr, diceUI.skill);
  diceUI.lastResult = res;
  const area = document.getElementById('diceResultArea');
  if (area) area.innerHTML = renderDiceResult(res);

  // Add to local feed immediately (optimistic)
  const from = state.character.name || 'Unnamed';
  pushFeedEntry({ from, ...res, mine: true, time: Date.now() });

  // Post to server (Ro's /api/roll)
  postRoll(from, res);
}

// ---- Networking ----
function postRoll(from, res) {
  const room = (state.character.roomCode || '').trim();
  if (!room) return; // not in a room; local-only roll
  const payload = {
    from,
    room,
    d20count: res.d20count,
    attribute: res.attrName,
    skill: res.skillName,
    attrValue: res.attrValue,
    skillValue: res.skillValue,
    dice: res.dice,
    successes: res.successes,
    complications: res.complications
  };
  fetch(DM_API_BASE + '/api/roll', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).catch(err => console.warn('Roll post failed (server offline?):', err));
}

function joinRoom() {
  const room = (state.character.roomCode || '').trim();
  const statusEl = document.getElementById('roomStatus');
  if (!room) {
    if (statusEl) { statusEl.textContent = '○ Enter a room code'; statusEl.className = 'room-status offline'; }
    return;
  }
  // Close any existing stream
  if (roomState.source) { try { roomState.source.close(); } catch(e){} roomState.source = null; }

  // Try Server-Sent Events first (Ro can implement /api/stream?room=CODE).
  try {
    const es = new EventSource(DM_API_BASE + '/api/stream?room=' + encodeURIComponent(room));
    roomState.source = es;
    es.onopen = () => { roomState.connected = true; updateRoomStatus(); };
    es.onmessage = (ev) => {
      try {
        const data = JSON.parse(ev.data);
        // Don't double-show our own optimistic entries: server may echo; mark mine by name match within 2s
        pushFeedEntry({ ...normalizeIncoming(data), mine: false, time: data.time || Date.now() });
      } catch(e) { /* plain-text line fallback */ pushFeedEntryRaw(ev.data); }
    };
    es.onerror = () => {
      roomState.connected = false; updateRoomStatus();
      // SSE failed — fall back to polling the tail endpoint
      startPolling(room);
    };
  } catch(e) {
    startPolling(room);
  }
}

let pollTimer = null;
let lastTailLength = 0;
function startPolling(room) {
  if (pollTimer) clearInterval(pollTimer);
  roomState.connected = true; updateRoomStatus();
  const poll = () => {
    fetch(DM_API_BASE + '/api/tail?room=' + encodeURIComponent(room) + '&since=' + lastTailLength)
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(data => {
        // Expect { lines: [...], length: N } or { entries: [...] }
        if (Array.isArray(data.entries)) {
          data.entries.forEach(e => pushFeedEntry({ ...normalizeIncoming(e), mine:false, time:e.time||Date.now() }));
        } else if (Array.isArray(data.lines)) {
          data.lines.forEach(line => pushFeedEntryRaw(line));
        }
        if (data.length != null) lastTailLength = data.length;
      })
      .catch(() => { roomState.connected = false; updateRoomStatus(); });
  };
  poll();
  pollTimer = setInterval(poll, 2500);
}

function normalizeIncoming(data) {
  // Accept either structured roll objects or Ro's string format
  if (typeof data === 'string') return parseRollString(data);
  return {
    from: data.from || '?',
    attrName: data.attribute || data.attrName || '',
    attrValue: data.attrValue,
    skillName: data.skill || data.skillName || '',
    skillValue: data.skillValue,
    d20count: data.d20count,
    dice: data.dice || [],
    successes: data.successes,
    complications: data.complications
  };
}

function parseRollString(line) {
  // Best-effort parse of Ro's format:
  // "{from}: {AttrName} {AttrVal} ({SkillName} {SkillVal}) {n}d20 => {successes} ({d1} {d2}...)"
  const m = line.match(/^(.*?):\s*(\w+)\s+(\d+)\s*\(([\w\s]+?)\s+(\d+)\)\s*(\d+)d20\s*=>\s*(\d+)\s*\(([\d\s]+)\)/);
  if (!m) return { from: 'feed', raw: line };
  return {
    from: m[1], attrName: m[2], attrValue: +m[3], skillName: m[4].trim(), skillValue: +m[5],
    d20count: +m[6], successes: +m[7], dice: m[8].trim().split(/\s+/).map(Number), complications: 0
  };
}

function updateRoomStatus() {
  const el = document.getElementById('roomStatus');
  if (el) { el.textContent = roomState.connected ? '● Connected' : '○ Offline'; el.className = 'room-status ' + (roomState.connected?'online':'offline'); }
}

function pushFeedEntry(entry) {
  roomState.feed.push(entry);
  if (roomState.feed.length > 60) roomState.feed.shift();
  redrawFeed();
}
function pushFeedEntryRaw(line) {
  if (!line || !line.trim()) return;
  roomState.feed.push({ raw: line.trim(), time: Date.now(), mine: false });
  if (roomState.feed.length > 60) roomState.feed.shift();
  redrawFeed();
}

function renderFeed() {
  if (!roomState.feed.length) return `<div class="feed-empty">No rolls yet. Connect to a room and roll the dice.</div>`;
  return roomState.feed.slice().reverse().map(e => {
    const t = new Date(e.time || Date.now());
    const time = t.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
    if (e.raw) return `<div class="feed-entry ${e.mine?'mine':''}"><span class="feed-time">${time}</span>${escHtml(e.raw)}</div>`;
    const diceStr = (e.dice||[]).join(' ');
    const comp = e.complications > 0 ? ` <span class="c">+${e.complications} comp</span>` : '';
    const succ = e.successes != null ? `<span class="s">${e.successes} success${e.successes===1?'':'es'}</span>${comp}` : '';
    return `<div class="feed-entry ${e.mine?'mine':''}">
      <span class="feed-time">${time}</span>
      <span class="feed-who">${escHtml(e.from)}</span>
      <span class="feed-detail"> — ${escHtml(e.attrName||'')} ${e.attrValue!=null?e.attrValue:''} (${escHtml(e.skillName||'')} ${e.skillValue!=null?e.skillValue:''}) ${e.d20count!=null?e.d20count+'d20':''}</span>
      <div class="feed-result">${succ}${diceStr?` <span class="feed-detail">[${diceStr}]</span>`:''}</div>
    </div>`;
  }).join('');
}

function redrawFeed() {
  const el = document.getElementById('roomFeed');
  if (el) el.innerHTML = renderFeed();
}


function copyCode() {
  const code = document.getElementById('charCode').textContent;
  navigator.clipboard.writeText(code).then(() => {
    const msg = document.getElementById('copyMsg');
    msg.textContent = '✓ Code copied to clipboard!';
    setTimeout(() => { msg.textContent = ''; }, 3000);
  });
}

function printSheet(lightBackground = false) {
  document.body.classList.toggle('print-light', lightBackground);
  // Force the collapsible share code open so it appears on the PDF (#7),
  // then restore its previous state afterwards.
  const codeDetails = document.querySelector('.code-collapse');
  const wasOpen = codeDetails ? codeDetails.open : null;
  if (codeDetails) codeDetails.open = true;
  setTimeout(() => {
    window.print();
    setTimeout(() => {
      document.body.classList.remove('print-light');
      if (codeDetails && wasOpen === false) codeDetails.open = false;
    }, 100);
  }, 50);
}

function attachStepListeners(step) {
  // Bond inputs need live listeners
  if (step === 'bonds') {
    document.querySelectorAll('.bond-entry input').forEach((input, idx) => {
      const bondIdx = Math.floor(idx);
      input.addEventListener('input', e => {
        if (state.character.bonds[bondIdx]) {
          state.character.bonds[bondIdx].name = e.target.value;
        }
      });
    });
  }
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

document.addEventListener('DOMContentLoaded', () => {
  // v1.10: the header link used to carry its version as literal markup, which had
  // already drifted a release behind APP_VERSION. Stamping it at boot makes the
  // constant the single source of truth, as the versioning policy above intended.
  const versionLink = document.getElementById('appVersion');
  if (versionLink) versionLink.textContent = `Version ${APP_VERSION}`;

  // Show import screen
  state.currentStep = -1;
  renderProgress();
  renderLocalLibrary();
});

</script>
